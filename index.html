<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --accent-cyan: #00f2ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        .btn-mmg { position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; background: white; border-radius: 22px; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); border: 3px solid var(--accent-cyan); animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .poster-card { transition: all 0.4s ease; aspect-ratio: 2/3; border-radius: 18px; overflow: hidden; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .poster-card:hover { transform: scale(1.05); border-color: var(--accent-cyan); }
        
        .tab-active { color: var(--accent-cyan) !important; position: relative; font-weight: 800; }
        .tab-active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--accent-cyan); border-radius: 10px; }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .skeleton { background: linear-gradient(90deg, #0f0f0f 25%, #1a1a1a 50%, #0f0f0f 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pt-44 pb-24">

    <button onclick="openDonation()" class="btn-mmg flex flex-col gap-0.5">
        <img src="mmg.svg" class="w-8 h-8" alt="MMG">
        <span class="text-[8px] font-black text-black uppercase">Donate</span>
    </button>

    <div id="donation-modal" class="modal px-6" onclick="closeDonation()">
        <div class="bg-zinc-900 border border-white/10 p-10 rounded-[40px] text-center max-w-xs w-full shadow-2xl" onclick="event.stopPropagation()">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center">
                <img src="mmg.svg" class="w-14 h-14">
            </div>
            <h3 class="text-white font-black uppercase text-xs tracking-widest mb-2">Support Nazareth Pro</h3>
            <p class="text-[10px] text-zinc-400 mb-6">Help us keep the servers alive and free for everyone.</p>
            <p class="text-[10px] font-black uppercase tracking-widest text-cyan-500 mb-1">MMG Number</p>
            <h2 class="text-5xl font-black italic tracking-tighter text-white mb-8">7005167</h2>
            <button onclick="closeDonation()" class="w-full py-4 bg-white text-black rounded-2xl font-black text-[10px] uppercase">Close</button>
        </div>
    </div>

    <nav class="p-5 fixed top-0 w-full z-50 flex flex-col gap-6 bg-zinc-950/80 backdrop-blur-xl border-b border-white/5"> 
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center">
                    <i data-lucide="clapperboard" class="text-black w-6 h-6"></i>
                </div>
                <h1 class="font-black text-xl italic tracking-tighter text-white uppercase">Guyana Digital</h1>
            </div>
            <div class="relative max-w-[140px] w-full">
                <input type="text" id="search" oninput="debounceSearch()" placeholder="Search..." class="w-full bg-zinc-900 border border-white/5 rounded-xl py-2 px-9 text-[10px] text-white outline-none focus:border-cyan-500">
                <i data-lucide="search" class="absolute left-3 top-2 w-3.5 h-3.5 text-zinc-500"></i>
            </div>
        </div>
        <div class="flex gap-8 overflow-x-auto no-scrollbar px-2">
            <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] uppercase">Movies</button>
            <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-[10px] font-bold uppercase">TV Series</button>
            <button onclick="changeMode('fav')" id="btn-fav" class="text-zinc-500 text-[10px] font-bold uppercase">My List</button>
        </div>
    </nav>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5 p-6"></main>

    <div id="player-modal" class="modal !justify-start !p-0">
        <div class="p-5 flex items-center justify-between w-full bg-black/90 backdrop-blur-2xl">
            <button onclick="closePlayer()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full border border-white/5"><i data-lucide="chevron-left"></i></button>
            <span class="font-black text-[10px] uppercase tracking-widest truncate px-4" id="m-title">Loading...</span>
            <button onclick="toggleFavorite()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full"><i data-lucide="heart" id="fav-icon" class="w-4 h-4"></i></button>
        </div>
        
        <div id="video-area" class="w-full aspect-video bg-black flex items-center justify-center relative">
            <div id="iframe-slot" class="w-full h-full"></div>
            <div id="player-loader" class="absolute inset-0 flex items-center justify-center bg-black z-0">
                <div class="w-8 h-8 border-4 border-cyan-500 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </div>

        <div class="p-8 max-w-xl mx-auto w-full">
            <div id="series-controls" class="hidden grid grid-cols-2 gap-4 mb-8">
                <select id="season" class="bg-zinc-900 text-white p-4 rounded-2xl text-[10px] font-bold border border-white/5 outline-none"></select>
                <select id="episode" class="bg-zinc-900 text-white p-4 rounded-2xl text-[10px] font-bold border border-white/5 outline-none"></select>
            </div>
            <button onclick="initPlay()" class="w-full py-5 rounded-2xl text-[10px] font-black uppercase bg-cyan-400 text-black shadow-lg mb-6">Play Now</button>
            <p id="m-desc" class="text-xs text-zinc-400 leading-relaxed italic bg-white/5 p-5 rounded-2xl"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [], favorites = JSON.parse(localStorage.getItem('gy_favs')) || [], currentMode = 'movie', activeId = null, searchTimer;

        async function load() {
            const grid = document.getElementById('grid');
            grid.innerHTML = Array(10).fill('<div class="poster-card skeleton"></div>').join('');
            if(currentMode === 'fav') return draw(favorites);
            try {
                const ep = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${ep}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { grid.innerHTML = "<p class='col-span-full text-center py-20 text-zinc-600'>API Error</p>"; }
        }

        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(performGlobalSearch, 500);
        }

        async function performGlobalSearch() {
            const query = document.getElementById('search').value.trim();
            if(!query) return load();
            try {
                const r = await fetch(`${API_URL}/buscar?q=${query}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error(e); }
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w500'+m.poster_path : ''}" class="w-full h-full object-cover" onerror="this.src='https://placehold.co/400x600/000/fff?text=No+Poster'">
                </div>
            `).join('');
        }

        function openDonation() { document.getElementById('donation-modal').classList.add('active'); }
        function closeDonation() { document.getElementById('donation-modal').classList.remove('active'); }

        function openPlayer(id) {
            const item = localData.find(m => m.id == id) || favorites.find(m => m.id == id);
            if(!item) return;
            activeId = id;
            
            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "No description.";
            
            // LÓGICA DE DETECCIÓN: Si tiene 'name' y NO tiene 'title', es una Serie
            const isTV = (item.name && !item.title) || item.first_air_date;
            document.getElementById('series-controls').classList.toggle('hidden', !isTV);
            
            if(isTV) {
                document.getElementById('season').innerHTML = Array.from({length:20}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:50}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            }
            
            document.getElementById('player-modal').classList.add('active');
            updateFavIcon();
            // Limpiar iframe anterior al abrir
            document.getElementById('iframe-slot').innerHTML = "";
        }

        function initPlay() {
            const isTV = !document.getElementById('series-controls').classList.contains('hidden');
            const s = document.getElementById('season').value || 1;
            const e = document.getElementById('episode').value || 1;
            
            // Construir URL del reproductor
            const type = isTV ? 'tv' : 'movie';
            const embedUrl = `https://vidsrc.xyz/embed/${type}?tmdb=${activeId}${isTV ? `&season=${s}&episode=${e}` : ''}`;
            
            // Inyectar el iframe con un pequeño truco para evitar el negro
            const slot = document.getElementById('iframe-slot');
            slot.innerHTML = `<iframe src="${embedUrl}" class="w-full h-full border-0 bg-black" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
        }

        function changeMode(m) {
            currentMode = m;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-zinc-500'));
            document.getElementById(`btn-${m}`).classList.add('tab-active');
            load();
        }

        function closePlayer() { 
            document.getElementById('player-modal').classList.remove('active'); 
            document.getElementById('iframe-slot').innerHTML = ""; 
        }

        function toggleFavorite() {
            const item = localData.find(m => m.id == activeId);
            const idx = favorites.findIndex(f => f.id == activeId);
            if(idx > -1) favorites.splice(idx, 1); else if(item) favorites.push(item);
            localStorage.setItem('gy_favs', JSON.stringify(favorites));
            updateFavIcon();
        }

        function updateFavIcon() {
            const isFav = favorites.some(f => f.id == activeId);
            const icon = document.getElementById('fav-icon');
            icon.style.fill = isFav ? "#00f2ff" : "none";
            icon.style.color = isFav ? "#00f2ff" : "white";
        }

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
