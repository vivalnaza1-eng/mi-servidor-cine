<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guyana Digital Cinema PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap');

body {
    background: radial-gradient(circle at top, #0a0a0a, #000);
    color: white;
    font-family: 'Plus Jakarta Sans', sans-serif;
}

/* NAV */
nav {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(40px);
}

/* HERO */
#hero {
    height: 75vh;
    position: relative;
}

#hero-bg {
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
}

#hero-bg::after {
    content:'';
    position:absolute;
    inset:0;
    background: linear-gradient(to top,#000 10%,transparent 60%);
}

#hero-content {
    position:absolute;
    bottom:40px;
    left:30px;
}

/* ROWS */
.row { margin-bottom: 30px; }

.row-title {
    font-size:14px;
    font-weight:800;
    margin-bottom:10px;
}

.row-scroll {
    display:flex;
    gap:12px;
    overflow-x:auto;
}

.row-scroll::-webkit-scrollbar { display:none; }

/* CARDS */
.poster-card {
    min-width:140px;
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
}

.poster-card:hover {
    transform: scale(1.25);
    z-index:10;
    box-shadow:0 20px 60px rgba(0,0,0,0.9);
}

.poster-card img {
    width:100%;
    height:100%;
    object-fit:cover;
    transition:0.4s;
}

.poster-card:hover img {
    transform:scale(1.1);
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    inset:0;
    background:black;
    z-index:2000;
}

.modal.active {
    display:block;
}

</style>
</head>

<body>

<nav class="p-4 flex justify-between items-center">
    <h1 class="font-black">GUYANA CINEMA</h1>
    <input id="search" placeholder="Search..." class="bg-zinc-900 px-3 py-1 rounded">
</nav>

<!-- HERO -->
<div id="hero">
    <div id="hero-bg"></div>
    <div id="hero-content">
        <h1 id="hero-title" class="text-4xl font-black"></h1>
        <button onclick="heroPlay()" class="mt-3 bg-white text-black px-5 py-2 rounded">▶ Play</button>
    </div>
</div>

<!-- ROWS -->
<main id="rows" class="p-6"></main>

<!-- PLAYER -->
<div id="player" class="modal">
    <button onclick="closePlayer()" class="p-4">⬅ Back</button>
    <div id="frame"></div>
</div>

<script>
const API = "https://mi-servidor-cine.onrender.com";

let data = [];
let heroItem = null;

/* LOAD */
async function load() {
    const res = await fetch(API + "/populares");
    const json = await res.json();
    data = json.results || json;

    draw(data);
    showHero(data[0]);
}

/* DRAW ROWS */
function draw(list) {
    const container = document.getElementById('rows');

    let rows = [];
    for (let i = 0; i < list.length; i += 10) {
        rows.push(list.slice(i, i + 10));
    }

    container.innerHTML = rows.map((row, i) => `
        <div class="row">
            <h3 class="row-title">${i==0?'🔥 Trending':'Popular'}</h3>

            <div class="row-scroll">
                ${row.map(m => `
                    <div class="poster-card" onclick="openPlayer(${m.id})">
                        <img src="https://image.tmdb.org/t/p/w500${m.poster_path}">
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');
}

/* HERO */
function showHero(item) {
    heroItem = item;

    document.getElementById('hero-bg').style.backgroundImage =
        `url(https://image.tmdb.org/t/p/original${item.backdrop_path})`;

    document.getElementById('hero-title').innerText =
        item.title || item.name;
}

function heroPlay() {
    if(heroItem) openPlayer(heroItem.id);
}

/* AUTO HERO */
let i = 0;
setInterval(()=>{
    if(!data.length) return;
    i = (i+1)%data.length;
    showHero(data[i]);
},8000);

/* PLAYER */
function openPlayer(id){
    document.getElementById('player').classList.add('active');

    document.getElementById('frame').innerHTML =
        `<iframe src="https://vidsrc.xyz/embed/movie?tmdb=${id}"
        width="100%" height="500" allowfullscreen></iframe>`;
}

function closePlayer(){
    document.getElementById('player').classList.remove('active');
    document.getElementById('frame').innerHTML="";
}

/* SEARCH */
document.getElementById('search').addEventListener('input', async e=>{
    const q = e.target.value;
    if(!q) return load();

    const res = await fetch(API + "/buscar?q=" + q);
    const json = await res.json();

    draw(json);
});

/* INIT */
load();
lucide.createIcons();
</script>

</body>
</html>
