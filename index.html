<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nazareth Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .poster-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); aspect-ratio: 2/3; border-radius: 12px; overflow: hidden; background: #111; position: relative; }
        .poster-card:active { transform: scale(0.92); }
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        .modal.active { display: flex; }
        #ad-layer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #ef4444; border-bottom: 2px solid #ef4444; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-20">

    <div id="ad-layer">
        <div class="text-center p-6">
            <i data-lucide="shield-check" class="w-16 h-16 text-red-600 mx-auto mb-6 animate-pulse"></i>
            <h2 class="text-2xl font-black mb-2 uppercase italic">Verificando Acceso</h2>
            <button id="skip-btn" onclick="closeAd()" class="bg-white text-black px-12 py-4 rounded-full font-black uppercase text-sm mt-4">Cargando...</button>
        </div>
    </div>

    <nav class="flex items-center justify-between p-5 sticky top-0 bg-black z-50">
        <div onclick="location.reload()" class="cursor-pointer">
            <h1 class="text-red-600 font-black text-2xl tracking-tighter uppercase italic">Nazareth</h1>
        </div>
        <div class="relative w-3/5">
            <input type="text" id="search" placeholder="Buscar..." class="w-full bg-zinc-900 rounded-full py-2 px-10 text-sm outline-none border border-zinc-800 focus:border-red-600">
            <i data-lucide="search" class="absolute left-3.5 top-2.5 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex items-center gap-6 px-5 mb-4 sticky top-[72px] bg-black z-40 py-2 border-b border-zinc-900">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active pb-1 text-xs font-black uppercase tracking-widest transition-all">Películas</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 pb-1 text-xs font-black uppercase tracking-widest transition-all">Series</button>
    </div>

    <div class="flex gap-3 px-5 overflow-x-auto no-scrollbar mb-6">
        <button onclick="filterByGenre(28)" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase whitespace-nowrap border border-zinc-800 active:bg-red-600">Acción</button>
        <button onclick="filterByGenre(27)" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase whitespace-nowrap border border-zinc-800 active:bg-red-600">Terror</button>
        <button onclick="filterByGenre(35)" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase whitespace-nowrap border border-zinc-800 active:bg-red-600">Comedia</button>
        <button onclick="filterByGenre(878)" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase whitespace-nowrap border border-zinc-800 active:bg-red-600">Sci-Fi</button>
        <button onclick="filterByGenre(10749)" class="bg-zinc-900 px-4 py-1.5 rounded-full text-[10px] font-bold uppercase whitespace-nowrap border border-zinc-800 active:bg-red-600">Romance</button>
    </div>

    <div id="loading" class="text-center py-10">
        <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-red-600 mx-auto"></div>
    </div>
    <main id="grid" class="grid grid-cols-3 gap-2 p-2 opacity-0 transition-opacity duration-500"></main>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-4 flex items-center bg-zinc-950">
            <button onclick="closePlayer()" class="p-2 bg-zinc-900 rounded-full"><i data-lucide="chevron-left"></i></button>
            <span class="font-bold truncate px-4 text-sm uppercase" id="m-title">Cargando...</span>
        </div>
        <div class="w-full aspect-video bg-black relative">
            <div id="video-container" class="w-full h-full"></div>
        </div>
        <div class="p-6">
            <div id="servers" class="flex gap-2 overflow-x-auto mb-6"></div>
            <p id="m-desc" class="text-sm text-zinc-400 leading-relaxed"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [];
        let currentMode = 'movie'; // 'movie' o 'tv'

        // INICIO
        async function loadContent() {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            loading.style.display = 'block';
            grid.classList.add('opacity-0');

            try {
                const endpoint = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${endpoint}`);
                localData = await r.json();
                draw(localData);
                grid.classList.remove('opacity-0');
                loading.style.display = 'none';
            } catch (e) { console.error("Error", e); }
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w342${m.poster_path}" class="w-full h-full object-cover">
                </div>
            `).join('');
            lucide.createIcons();
        }

        // CAMBIAR ENTRE PELIS Y SERIES
        function changeMode(mode) {
            currentMode = mode;
            document.getElementById('btn-movie').className = mode === 'movie' ? 'tab-active pb-1 text-xs font-black uppercase' : 'text-zinc-500 pb-1 text-xs font-black uppercase';
            document.getElementById('btn-tv').className = mode === 'tv' ? 'tab-active pb-1 text-xs font-black uppercase' : 'text-zinc-500 pb-1 text-xs font-black uppercase';
            document.getElementById('search').placeholder = mode === 'movie' ? 'Buscar película...' : 'Buscar serie...';
            loadContent();
        }

        // BUSCADOR ACTUALIZADO
        document.getElementById('search').addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length === 0) return draw(localData);
            if (query.length < 3) return;

            try {
                // Enviamos el tipo (movie o tv) al servidor
                const r = await fetch(`${API_URL}/buscar?q=${encodeURIComponent(query)}&type=${currentMode}`);
                const data = await r.json();
                draw(data);
            } catch (e) { console.error(e); }
        });

        // REPRODUCTOR
        async function openPlayer(id) {
            const item = localData.find(m => m.id == id) || { title: currentMode === 'movie' ? "Película" : "Serie", name: "Serie" };
            const title = item.title || item.name;
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-desc').innerText = item.overview || "Sin descripción.";

            await launchAd();

            // Lógica de URLs para Pelis vs Series
            const serversHTML = `
                <button onclick="playVideo('${id}', 'server1')" class="bg-red-600 px-6 py-3 rounded-xl text-[10px] font-black uppercase">Latino Pro</button>
                <button onclick="playVideo('${id}', 'server2')" class="bg-zinc-900 px-6 py-3 rounded-xl text-[10px] font-black uppercase border border-zinc-800">VIP Server</button>
                <a href="https://wa.me/5927005167?text=Error en: ${title}" target="_blank" class="bg-green-600/20 text-green-500 px-6 py-3 rounded-xl text-[10px] font-black uppercase border border-green-600">Reportar</a>
            `;
            document.getElementById('servers').innerHTML = serversHTML;
            playVideo(id, 'server1');
            document.getElementById('player-modal').classList.add('active');
        }

        function playVideo(id, server) {
            let url = "";
            if (currentMode === 'movie') {
                url = server === 'server1' ? `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1` : `https://embed.su/embed/movie/${id}`;
            } else {
                // Para series (por defecto temporada 1 cap 1 para empezar)
                url = server === 'server1' ? `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1&s=1&e=1` : `https://embed.su/embed/tv/${id}/1/1`;
            }

            const container = document.getElementById('video-container');
            container.innerHTML = `
                <div id="v-loader" class="flex flex-col items-center justify-center h-full bg-zinc-950">
                    <div class="animate-spin rounded-full h-8 w-8 border-t-2 border-red-600 mb-4"></div>
                    <p class="text-xs font-bold uppercase italic">Preparando servidor para ti 😘</p>
                </div>
                <iframe src="${url}" class="w-full h-full hidden" frameborder="0" allowfullscreen onload="this.classList.remove('hidden'); document.getElementById('v-loader').remove();"></iframe>
            `;
        }

        // --- LÓGICA DE ANUNCIOS Y CIERRE (IGUAL QUE ANTES) ---
        async function launchAd() { /* ... tu código de ads ... */ return new Promise(r => setTimeout(r, 0)); } // Simplificado para el ejemplo
        function closePlayer() { document.getElementById('player-modal').classList.remove('active'); document.getElementById('video-container').innerHTML = ""; }
        function closeAd() { document.getElementById('ad-layer').style.display = 'none'; }
        
        window.onload = loadContent;
    </script>
</body>
</html>
