<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap');
        :root { --gy-red: #ce1126; --gy-gold: #fcd116; --gy-green: #009e49; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Shimmer Effect para carga visual */
        .skeleton { background: linear-gradient(90deg, #0a0a0a 25%, #1a1a1a 50%, #0a0a0a 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        .poster-card { aspect-ratio: 2/3; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); background: #0a0a0a; transition: transform 0.2s; }
        .poster-card:active { transform: scale(0.95); }

        nav { background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        .modal.active { display: flex; }
        
        .gy-btn { background: #111; border: 1px solid rgba(255,255,255,0.1); padding: 12px 20px; border-radius: 10px; font-[9px] uppercase font-bold; color: #666; transition: 0.3s; }
        .gy-btn.active { background: var(--gy-gold); color: #000; border-color: var(--gy-gold); }

        iframe { width: 100%; height: 100%; border: none; background: #000; }
    </style>
</head>
<body class="pt-28">

    <nav class="fixed top-0 w-full z-50 p-4 flex items-center justify-between">
        <div class="flex flex-col" onclick="location.reload()">
            <h1 class="text-white font-black text-xl italic uppercase leading-none">Guyana Digital</h1>
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-bold text-green-500 uppercase tracking-widest">Cinema Pro</span>
                <span class="text-[8px] text-zinc-600 border-l border-zinc-800 pl-2 uppercase">by José Vival</span>
            </div>
        </div>
        <div class="relative w-1/2">
            <input type="text" id="search" onkeydown="if(event.key==='Enter') searchContent()" placeholder="Search movies or series..." class="w-full bg-zinc-900/50 rounded-full py-2.5 px-10 text-xs border border-white/10 outline-none focus:border-yellow-500 transition-all">
            <i data-lucide="search" class="absolute left-3.5 top-2.5 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-6 px-6 py-4 sticky top-[80px] z-40 bg-black">
        <button id="mode-movie" onclick="setMode('movie')" class="gy-btn active">Movies</button>
        <button id="mode-tv" onclick="setMode('tv')" class="gy-btn">TV Shows</button>
    </div>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-5 min-h-[70vh]"></main>

    <div id="player" class="modal overflow-y-auto">
        <div class="p-4 flex justify-between items-center bg-black">
            <button onclick="closePlayer()"><i data-lucide="arrow-left"></i></button>
            <span id="p-title" class="text-[10px] uppercase font-bold tracking-widest text-zinc-500">Playing</span>
            <div class="w-8"></div>
        </div>
        <div class="aspect-video bg-black" id="video-box"></div>
        <div class="p-6">
            <div id="series-opts" class="hidden grid grid-cols-2 gap-3 mb-6">
                <select id="s" onchange="refreshPlayer()" class="bg-zinc-900 p-3 rounded-lg text-xs outline-none border border-white/10"></select>
                <select id="e" onchange="refreshPlayer()" class="bg-zinc-900 p-3 rounded-lg text-xs outline-none border border-white/10"></select>
            </div>
            <p class="text-[10px] text-yellow-500 font-bold uppercase mb-3">Select Server:</p>
            <div id="server-list" class="flex gap-2 overflow-x-auto mb-8"></div>
            <div class="bg-zinc-900/50 p-4 rounded-xl border-l-2 border-green-600 text-sm italic text-zinc-400" id="p-desc"></div>
            <footer class="mt-12 text-center opacity-40 py-10">
                <p class="text-[10px] uppercase font-black tracking-[0.5em]">by José Vival</p>
            </footer>
        </div>
    </div>

    <script>
        const API_KEY = "ead4764062402287c2b60882e9b04751";
        let mode = 'movie';
        let currentId = null;

        // ESTRATEGIA: Función de carga con Timeout
        async function apiCall(path) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 8000); // 8 segundos de espera máx.

            try {
                const res = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?') ? '&' : '?'}api_key=${API_KEY}&language=en-US`, { signal: controller.signal });
                clearTimeout(timeoutId);
                return await res.json();
            } catch (err) {
                console.error("API Error o Timeout");
                return null;
            }
        }

        async function init() {
            const grid = document.getElementById('grid');
            grid.innerHTML = Array(12).fill('<div class="poster-card skeleton"></div>').join('');
            
            const data = await apiCall(mode === 'movie' ? '/movie/popular' : '/tv/popular');
            if (data && data.results) render(data.results);
            else grid.innerHTML = `<div class="col-span-full text-center py-20"><p class="text-zinc-500 mb-4">Content could not be loaded</p><button onclick="init()" class="bg-white text-black px-6 py-2 rounded-full text-xs font-bold uppercase">Retry Connection</button></div>`;
        }

        async function searchContent() {
            const q = document.getElementById('search').value;
            if(!q) return init();
            const data = await apiCall(`/search/${mode}?query=${encodeURIComponent(q)}`);
            if(data && data.results) render(data.results);
        }

        function render(items) {
            const grid = document.getElementById('grid');
            grid.innerHTML = items.map(i => `
                <div class="poster-card" onclick="openP(${i.id}, '${(i.title || i.name).replace(/'/g, "")}', '${(i.overview || "").replace(/'/g, "")}')">
                    <img src="${i.poster_path ? 'https://image.tmdb.org/t/p/w500'+i.poster_path : 'https://via.placeholder.com/500x750?text=No+Poster'}" class="w-full h-full object-cover">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function setMode(m) {
            mode = m;
            document.getElementById('mode-movie').classList.toggle('active', m === 'movie');
            document.getElementById('mode-tv').classList.toggle('active', m === 'tv');
            init();
        }

        function openP(id, title, desc) {
            currentId = id;
            document.getElementById('p-title').innerText = title.toUpperCase();
            document.getElementById('p-desc').innerText = desc || "No description available.";
            
            if(mode === 'tv') {
                document.getElementById('series-opts').classList.remove('hidden');
                document.getElementById('s').innerHTML = Array.from({length:20}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('e').innerHTML = Array.from({length:50}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-opts').classList.add('hidden');
            }
            
            refreshPlayer();
            document.getElementById('player').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function refreshPlayer() {
            const s = mode === 'tv' ? document.getElementById('s').value : 1;
            const e = mode === 'tv' ? document.getElementById('e').value : 1;
            
            const servers = [
                { n: "Server 1", u: mode === 'movie' ? `https://autoembed.to/movie/tmdb/${currentId}` : `https://autoembed.to/tv/tmdb/${currentId}/${s}/${e}` },
                { n: "Server 2", u: mode === 'movie' ? `https://www.2embed.cc/embed/${currentId}` : `https://www.2embed.cc/embedtv/${currentId}&s=${s}&e=${e}` }
            ];

            document.getElementById('server-list').innerHTML = servers.map((sv, idx) => `
                <button onclick="loadIframe('${sv.u}', this)" class="whitespace-nowrap px-6 py-3 rounded-lg border border-white/10 text-[10px] font-bold uppercase ${idx===0?'bg-yellow-500 text-black':'bg-zinc-900 text-zinc-400'}">
                    ${sv.n}
                </button>
            `).join('');
            loadIframe(servers[0].u);
        }

        function loadIframe(url, btn) {
            if(btn) {
                document.querySelectorAll('#server-list button').forEach(b => { b.className = "whitespace-nowrap px-6 py-3 rounded-lg border border-white/10 text-[10px] font-bold uppercase bg-zinc-900 text-zinc-400"; });
                btn.className = "whitespace-nowrap px-6 py-3 rounded-lg border border-white/10 text-[10px] font-bold uppercase bg-yellow-500 text-black";
            }
            document.getElementById('video-box').innerHTML = `<iframe src="${url}" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>`;
        }

        function closePlayer() {
            document.getElementById('player').classList.remove('active');
            document.getElementById('video-box').innerHTML = "";
            document.body.style.overflow = 'auto';
        }

        window.onload = init;
    </script>
</body>
</html>
