<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --accent-cyan: #00f2ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        nav { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        /* BOTÓN FLOTANTE MMG */
        .btn-mmg { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: white; border-radius: 20px; z-index: 1000; display: flex; items-center; justify-center; box-shadow: 0 10px 30px rgba(0, 242, 255, 0.3); transition: 0.3s; border: 2px solid var(--accent-cyan); animation: bounce 2s infinite; }
        .btn-mmg:active { transform: scale(0.9); }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

        .poster-card { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); aspect-ratio: 2/3; border-radius: 16px; overflow: hidden; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .poster-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(0, 242, 255, 0.1); border-color: var(--accent-cyan); }
        
        .tab-active { color: var(--accent-cyan) !important; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; animation: fadeIn 0.3s ease; }
        .modal.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .skeleton { background: linear-gradient(90deg, #0f0f0f 25%, #1a1a1a 50%, #0f0f0f 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pt-48 pb-24">

    <button onclick="openDonation()" class="btn-mmg">
        <img src="mmg.svg" class="w-10 h-10" alt="MMG">
    </button>

    <div id="donation-modal" class="modal px-6" onclick="closeDonation(event)">
        <div class="bg-white p-8 rounded-[40px] text-black text-center max-w-xs w-full shadow-[0_0_50px_rgba(255,255,255,0.2)]" onclick="event.stopPropagation()">
            <img src="mmg.svg" class="w-16 h-16 mx-auto mb-4">
            <p class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Merchant ID / Number</p>
            <h2 class="text-4xl font-black italic tracking-tighter my-2">7005167</h2>
            <p class="text-[9px] font-bold text-zinc-500 uppercase leading-tight">Thank you for supporting the digital cinema infrastructure.</p>
            <button onclick="closeDonation(null)" class="mt-6 w-full py-4 bg-black text-white rounded-2xl font-black text-[10px] uppercase">Close</button>
        </div>
    </div>

    <div class="fixed top-0 w-full z-[100] bg-zinc-950/95 backdrop-blur-md border-b border-white/10 py-3 px-4 text-center">
        <p class="text-[9px] md:text-[10px] font-medium text-zinc-300 italic tracking-wide">
            <span class="text-cyan-400 font-black mr-2 uppercase">STATUS:</span> Guyana Cinema is Online 🎬
        </p>
    </div>

    <nav class="p-5 fixed top-11 w-full z-50 flex flex-col gap-5"> 
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="mapa-guyana.png" class="w-8 h-8">
                <div>
                    <h1 class="font-black text-lg italic tracking-tighter text-white uppercase leading-none">Guyana Digital</h1>
                    <p class="text-[8px] font-bold text-cyan-400 uppercase tracking-[0.15em] mt-1">Essequibo belongs to Guyana</p>
                </div>
            </div>
            <div class="relative max-w-[130px]">
                <input type="text" id="search" oninput="fuzzySearch()" placeholder="Search..." class="w-full bg-zinc-900/50 rounded-xl py-2 px-8 text-[10px] outline-none border border-white/5 text-white">
                <i data-lucide="search" class="absolute left-2.5 top-2.5 w-3 h-3 text-zinc-500"></i>
            </div>
        </div>
        <div class="flex gap-6 overflow-x-auto no-scrollbar items-center">
            <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] font-bold uppercase whitespace-nowrap">Movies</button>
            <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">TV Series</button>
            <button onclick="changeMode('upcoming')" id="btn-upcoming" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">Upcoming</button>
            <button onclick="changeMode('fav')" id="btn-fav" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">My List</button>
        </div>
    </nav>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-6"></main>

    <div id="player-modal" class="modal !justify-start !p-0">
        <div class="p-5 flex items-center justify-between w-full bg-black/80 backdrop-blur-xl z-50">
            <button onclick="closePlayer()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full"><i data-lucide="chevron-left"></i></button>
            <span class="font-black text-[10px] uppercase tracking-widest truncate px-4" id="m-title">Loading...</span>
            <button onclick="toggleFavorite()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full"><i data-lucide="heart" id="fav-icon" class="w-4 h-4"></i></button>
        </div>
        <div id="video-area" class="w-full aspect-video bg-black shadow-2xl">
            <div id="iframe-slot" class="w-full h-full"></div>
        </div>
        <div class="p-6 max-w-xl mx-auto w-full">
            <div id="series-controls" class="hidden grid grid-cols-2 gap-3 mb-6">
                <select id="season" class="bg-zinc-900 text-white p-3 rounded-xl text-xs border border-white/5"></select>
                <select id="episode" class="bg-zinc-900 text-white p-3 rounded-xl text-xs border border-white/5"></select>
            </div>
            <button onclick="initPlay()" class="w-full py-4 rounded-2xl text-xs font-black uppercase bg-cyan-400 text-black shadow-lg mb-8">PLAY NOW</button>
            <p id="m-desc" class="text-xs text-zinc-400 leading-relaxed bg-white/5 p-4 rounded-xl"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [], favorites = JSON.parse(localStorage.getItem('gy_favs')) || [], currentMode = 'movie', activeId = null;

        async function load() {
            const grid = document.getElementById('grid');
            grid.innerHTML = Array(8).fill('<div class="poster-card skeleton"></div>').join('');
            if(currentMode === 'fav') return draw(favorites);
            try {
                const ep = currentMode === 'upcoming' ? '/proximamente' : (currentMode === 'movie' ? '/populares' : '/series');
                const r = await fetch(`${API_URL}${ep}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { grid.innerHTML = "<p class='col-span-full text-center py-20 text-zinc-600 uppercase'>Connection Error</p>"; }
        }

        // BUSCADOR MEJORADO (FUZZY LOGIC)
        function fuzzySearch() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            if(!query) return draw(localData);

            const filtered = localData.filter(item => {
                const title = (item.title || item.name || "").toLowerCase();
                // Lógica de aproximación: permite errores leves y busca en cualquier parte
                let queryIdx = 0;
                for (let n = 0; n < title.length && queryIdx < query.length; n++) {
                    if (title[n] === query[queryIdx]) queryIdx++;
                }
                return queryIdx === query.length || title.includes(query);
            });
            draw(filtered);
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            if(!list.length) { grid.innerHTML = "<p class='col-span-full text-center py-20 text-zinc-600 text-[10px] uppercase'>No results</p>"; return; }
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover">
                </div>
            `).join('');
        }

        // FUNCIONES MMG
        function openDonation() { document.getElementById('donation-modal').classList.add('active'); }
        function closeDonation(e) { document.getElementById('donation-modal').classList.remove('active'); }

        function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id) || favorites.find(m => m.id == id);
            if(!item) return;
            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "";
            document.getElementById('series-controls').classList.toggle('hidden', !(currentMode === 'tv' || item.name));
            if(currentMode === 'tv' || item.name) {
                document.getElementById('season').innerHTML = Array.from({length:15}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:30}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            }
            document.getElementById('player-modal').classList.add('active');
            updateFavIcon();
        }

        function initPlay() {
            const s = document.getElementById('season').value || 1, e = document.getElementById('episode').value || 1;
            const isTV = !document.getElementById('series-controls').classList.contains('hidden');
            const src = `https://vidsrc.xyz/embed/${isTV?'tv':'movie'}?tmdb=${activeId}${isTV?`&season=${s}&episode=${e}`:''}`;
            document.getElementById('iframe-slot').innerHTML = `<iframe src="${src}" allowfullscreen class="w-full h-full border-0"></iframe>`;
        }

        function changeMode(m) {
            currentMode = m;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-zinc-500'));
            document.getElementById(`btn-${m}`).classList.add('tab-active');
            load();
        }

        function closePlayer() { document.getElementById('player-modal').classList.remove('active'); document.getElementById('iframe-slot').innerHTML = ""; }
        function updateFavIcon() {
            const isFav = favorites.some(f => f.id == activeId);
            const icon = document.getElementById('fav-icon');
            icon.style.fill = isFav ? "#00f2ff" : "none";
            icon.style.color = isFav ? "#00f2ff" : "white";
        }

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
