<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap');
        
        :root {
            --gy-red: #ce1126;
            --gy-gold: #fcd116;
            --gy-green: #009e49;
        }

        body { 
            background: radial-gradient(circle at top right, #1a1a1a 0%, #000 100%); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
            margin: 0;
        }

        /* Botón del Creador - REFINADO (Bandera de Guyana) */
        .creator-badge {
            position: fixed; bottom: 25px; left: 25px; z-index: 100;
            background: rgba(0,0,0,0.9);
            padding: 5px; border-radius: 50px; display: flex; align-items: center;
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer;
            max-width: 50px; white-space: nowrap; overflow: hidden;
        }
        
        .creator-badge:hover { 
            max-width: 200px; 
            padding-right: 20px;
            border-color: var(--gy-gold);
        }
        
        .flag-container {
            width: 38px; height: 38px; min-width: 38px;
            border-radius: 50%; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid rgba(255,255,255,0.2);
            box-shadow: 0 0 15px rgba(252, 209, 22, 0.2);
        }
        
        .flag-img { width: 150%; height: 150%; object-fit: cover; }

        .creator-name {
            margin-left: 12px;
            font-family: 'Syncopate', sans-serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 1px; color: #fff;
            text-transform: uppercase;
        }

        /* Grid y Posters */
        .poster-card { 
            transition: all 0.4s ease; aspect-ratio: 2/3; border-radius: 20px; 
            overflow: hidden; background: #111; border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; position: relative;
        }
        .poster-card:hover { transform: scale(1.05); border-color: var(--gy-green); box-shadow: 0 15px 40px rgba(0, 158, 73, 0.3); }

        /* Modal */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.98); backdrop-filter: blur(30px); 
            z-index: 1000; flex-direction: column; 
        }
        .modal.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .gy-gradient-text {
            background: linear-gradient(90deg, var(--gy-red), var(--gy-gold), var(--gy-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .tab-active { 
            color: var(--gy-gold); border-bottom: 3px solid var(--gy-gold);
            filter: drop-shadow(0 0 5px var(--gy-gold));
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-24 pb-10">

    <div class="creator-badge group" onclick="window.open('https://wa.me/5927005167', '_blank')">
        <div class="flag-container">
            <img src="https://flagcdn.com/gy.svg" alt="Guyana" class="flag-img">
        </div>
        <span class="creator-name">José <span class="text-yellow-400">Vival</span></span>
    </div>

    <nav class="flex items-center justify-between p-6 fixed top-0 w-full bg-black/80 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex flex-col cursor-pointer" onclick="location.reload()">
            <h1 class="text-white font-black text-xl italic uppercase tracking-tighter leading-none">Guyana Digital</h1>
            <span class="text-[9px] font-bold text-green-500 tracking-[0.2em] uppercase">Cinema Pro</span>
        </div>
        <div class="relative w-1/2">
            <input type="text" id="search" oninput="searchMedia()" placeholder="Buscar..." class="w-full bg-white/5 rounded-2xl py-3 px-12 text-xs border border-white/10 outline-none focus:border-green-500 transition-all text-white">
            <i data-lucide="search" class="absolute left-4 top-3.5 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-10 px-8 py-6 mt-4">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-xs font-black uppercase tracking-[0.2em]">Películas</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-600 text-xs font-black uppercase tracking-[0.2em]">Series TV</button>
    </div>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 p-6"></main>

    <a href="https://wa.me/5927005167" target="_blank" class="fixed bottom-[25px] right-[25px] w-[60px] h-[60px] bg-[#25d366] rounded-full flex items-center justify-center z-[100] shadow-2xl animate-bounce">
        <i data-lucide="message-circle" class="text-white w-8 h-8"></i>
    </a>

    <div id="player-modal" class="modal overflow-y-auto no-scrollbar">
        <div class="p-6 flex items-center justify-between sticky top-0 bg-black/90 backdrop-blur-lg z-50">
            <button onclick="closePlayer()" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
            <div class="flex flex-col items-center">
                <span class="font-black text-[10px] uppercase tracking-[0.3em] text-green-500" id="m-title">REPRODUCIENDO</span>
            </div>
            <div class="w-12"></div>
        </div>
        
        <div class="w-full aspect-video bg-black relative">
            <div id="video-container" class="w-full h-full"></div>
        </div>

        <div class="p-8 max-w-5xl mx-auto w-full">
            <div id="series-controls" class="hidden mb-10 grid grid-cols-2 gap-4">
                <select id="season" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-4 rounded-2xl text-sm text-white"></select>
                <select id="episode" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-4 rounded-2xl text-sm text-white"></select>
            </div>

            <div class="mb-10">
                <p class="text-[10px] font-black text-green-500 uppercase tracking-[0.4em] mb-5">Servidores Disponibles:</p>
                <div id="servers" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar"></div>
            </div>
            
            <p id="m-desc" class="text-base text-zinc-400 leading-relaxed font-light italic border-l-4 border-red-600 pl-6 bg-white/5 py-6 rounded-r-2xl"></p>
            
            <footer class="mt-20 text-center pb-12">
                <div class="w-24 h-1 bg-gradient-to-r from-red-600 via-yellow-400 to-green-600 mx-auto mb-6 rounded-full"></div>
                <p class="text-[10px] text-zinc-600 uppercase font-black tracking-[0.8em] mb-2">Developed in Guyana by</p>
                <p class="text-2xl font-black italic tracking-tighter gy-gradient-text uppercase">José Vival</p>
            </footer>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [];
        let currentMode = 'movie';
        let activeId = null;

        async function load() {
            try {
                const endpoint = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${endpoint}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { 
                document.getElementById('grid').innerHTML = "<p class='col-span-full text-center py-20 text-zinc-500'>Cargando contenido...</p>";
            }
        }

        function draw(list) {
            document.getElementById('grid').innerHTML = list.map(m => `
                <div class="poster-card group" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function searchMedia() {
            const query = document.getElementById('search').value.toLowerCase();
            const filtered = localData.filter(m => (m.title || m.name || "").toLowerCase().includes(query));
            draw(filtered);
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'tab-active text-xs font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-xs font-black uppercase tracking-[0.2em]';
            document.getElementById('btn-tv').className = m === 'tv' ? 'tab-active text-xs font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-xs font-black uppercase tracking-[0.2em]';
            load();
        }

        async function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id);
            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "Sin descripción.";
            
            if(currentMode === 'tv') {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:20}, (_,i)=>`<option value="${i+1}">Temporada ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:50}, (_,i)=>`<option value="${i+1}">Episodio ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }
            updateContent();
            document.getElementById('player-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateContent() {
            const s = currentMode === 'tv' ? document.getElementById('season').value : 1;
            const e = currentMode === 'tv' ? document.getElementById('episode').value : 1;
            const providers = [
                { n: "⚡ SERVER PREMIUM", u: currentMode === 'movie' ? `https://www.2embed.cc/embed/${activeId}` : `https://www.2embed.cc/embedtv/${activeId}&s=${s}&e=${e}` },
                { n: "🌐 SERVER GLOBAL", u: currentMode === 'movie' ? `https://moviesapi.club/movie/${activeId}` : `https://moviesapi.club/tv/${activeId}-${s}-${e}` }
            ];
            document.getElementById('servers').innerHTML = providers.map((pv, i) => `
                <button onclick="play('${pv.u}', this)" class="px-8 py-4 rounded-2xl text-[10px] font-black uppercase border transition-all ${i===0?'bg-green-600 border-green-600 text-white shadow-lg':'bg-zinc-900 border-white/5 text-zinc-500'}">
                    ${pv.n}
                </button>
            `).join('');
            play(providers[0].u);
        }

        function play(url, btn) {
            if(btn) {
                document.querySelectorAll('#servers button').forEach(b => {
                    b.classList.remove('bg-green-600', 'text-white');
                    b.classList.add('bg-zinc-900', 'text-zinc-500');
                });
                btn.classList.add('bg-green-600', 'text-white');
            }
            document.getElementById('video-container').innerHTML = `<iframe src="${url}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>`;
        }

        function closePlayer() { 
            document.getElementById('player-modal').classList.remove('active'); 
            document.getElementById('video-container').innerHTML = ""; 
            document.body.style.overflow = 'auto';
        }

        window.onload = load;
    </script>
</body>
</html>
