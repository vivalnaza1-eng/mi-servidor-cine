<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap');
        
        :root {
            --gy-red: #ce1126;
            --gy-gold: #fcd116;
            --gy-green: #009e49;
        }

        body { 
            background: radial-gradient(circle at top right, #1a1a1a 0%, #000 100%); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }

        /* Botón Flotante del Creador (Esquina) */
        .creator-badge {
            position: fixed; top: 20px; left: 20px; z-index: 100;
            background: rgba(0,0,0,0.8); border: 1.5px solid var(--gy-gold);
            padding: 8px 15px; border-radius: 50px; display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(252, 209, 22, 0.3);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            max-width: 45px; white-space: nowrap; overflow: hidden;
        }
        .creator-badge:hover { max-width: 200px; border-color: var(--gy-green); }
        .creator-dot { width: 10px; height: 10px; background: var(--gy-red); border-radius: 50%; animation: blink 1.5s infinite; }

        @keyframes blink { 50% { opacity: 0.3; } }

        /* Efectos Visuales */
        .poster-card { 
            transition: all 0.4s ease; aspect-ratio: 2/3; border-radius: 20px; 
            overflow: hidden; background: #111; border: 1px solid rgba(255,255,255,0.05);
        }
        .poster-card:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(0, 158, 73, 0.3); border-color: var(--gy-green); }

        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(25px); 
            z-index: 1000; flex-direction: column; 
        }
        .modal.active { display: flex; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .gy-gradient-text {
            background: linear-gradient(90deg, var(--gy-red), var(--gy-gold), var(--gy-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Syncopate', sans-serif;
        }

        .tab-active { 
            color: var(--gy-gold); border-bottom: 3px solid var(--gy-gold);
            filter: drop-shadow(0 0 5px var(--gy-gold));
        }

        .floating-support {
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background: #25d366; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-20 pb-10">

    <div class="creator-badge group">
        <div class="creator-dot"></div>
        <span class="text-[10px] font-black uppercase tracking-widest text-white opacity-0 group-hover:opacity-100 transition-opacity">
            Created by <span class="text-yellow-400">José Vival</span>
        </span>
    </div>

    <div id="ad-layer">
        <div class="text-center p-10 bg-black/40 border border-white/10 rounded-[40px] backdrop-blur-3xl">
            <h2 class="text-3xl font-black gy-gradient-text mb-2 italic">DIGITAL CINEMA</h2>
            <p class="text-[10px] text-zinc-500 uppercase tracking-[0.5em] mb-8">Guyana Premium Network</p>
            <button id="skip-btn" onclick="closeAd()" class="bg-white text-black px-14 py-4 rounded-full font-black text-xs uppercase hover:bg-yellow-400 transition-colors">Wait...</button>
        </div>
    </div>

    <nav class="flex items-center justify-between p-6 fixed top-0 w-full bg-black/40 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex flex-col" onclick="location.reload()">
            <h1 class="text-white font-black text-xl italic uppercase tracking-tighter leading-none">Guyana Digital</h1>
            <span class="text-[9px] font-bold text-yellow-500 tracking-[0.2em] uppercase">Cinema Pro</span>
        </div>
        <div class="relative w-1/2">
            <input type="text" id="search" placeholder="Search title..." class="w-full bg-white/5 rounded-2xl py-3 px-12 text-xs border border-white/10 outline-none focus:border-green-500 transition-all">
            <i data-lucide="search" class="absolute left-4 top-3.5 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-10 px-8 py-6">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-xs font-black uppercase tracking-[0.2em]">Movies</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-600 text-xs font-black uppercase tracking-[0.2em]">TV Series</button>
    </div>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-4"></main>

    <a href="https://wa.me/5927005167" target="_blank" class="floating-support animate-bounce">
        <i data-lucide="message-circle" class="text-white w-8 h-8"></i>
    </a>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-6 flex items-center justify-between">
            <button onclick="closePlayer()" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
            <div class="flex flex-col items-center">
                <img src="https://flagcdn.com/gy.svg" class="w-8 h-5 rounded shadow-lg mb-1" alt="Guyana">
                <span class="font-black text-[9px] uppercase tracking-widest text-zinc-500" id="m-title">PLAYING NOW</span>
            </div>
            <div class="w-12"></div>
        </div>
        
        <div class="w-full aspect-video bg-black shadow-[0_0_100px_rgba(0,0,0,1)]">
            <div id="video-container" class="w-full h-full"></div>
        </div>

        <div class="p-8 max-w-4xl mx-auto w-full">
            <div id="series-controls" class="hidden mb-10 grid grid-cols-2 gap-6">
                <select id="season" onchange="updateContent()" class="bg-zinc-900/50 border border-white/10 p-5 rounded-3xl text-sm outline-none focus:border-yellow-500 appearance-none"></select>
                <select id="episode" onchange="updateContent()" class="bg-zinc-900/50 border border-white/10 p-5 rounded-3xl text-sm outline-none focus:border-yellow-500 appearance-none"></select>
            </div>

            <div class="mb-10">
                <p class="text-[10px] font-black text-green-500 uppercase tracking-[0.4em] mb-5">Digital Guyana Nodes:</p>
                <div id="servers" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar"></div>
            </div>
            
            <p id="m-desc" class="text-base text-zinc-400 leading-relaxed font-light italic border-l-2 border-red-600 pl-6"></p>
            
            <footer class="mt-20 text-center pb-10">
                <div class="w-20 h-1 bg-gradient-to-r from-red-600 via-yellow-400 to-green-600 mx-auto mb-6"></div>
                <p class="text-[10px] text-zinc-600 uppercase font-black tracking-[0.8em] mb-2">Lead Developer</p>
                <p class="text-2xl font-black italic tracking-tighter gy-gradient-text uppercase">José Vival</p>
            </footer>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [];
        let currentMode = 'movie';
        let activeId = null;

        async function load() {
            try {
                const endpoint = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${endpoint}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error("Error loading"); }
        }

        function draw(list) {
            document.getElementById('grid').innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'tab-active text-xs font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-xs font-black uppercase tracking-[0.2em]';
            document.getElementById('btn-tv').className = m === 'tv' ? 'tab-active text-xs font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-xs font-black uppercase tracking-[0.2em]';
            load();
        }

        async function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id);
            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "No description provided.";
            
            if(currentMode === 'tv') {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:15}, (_,i)=>`<option value="${i+1}">SEASON ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:50}, (_,i)=>`<option value="${i+1}">EPISODE ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }

            await launchAd();
            updateContent();
            document.getElementById('player-modal').classList.add('active');
        }

        function updateContent() {
            const s = currentMode === 'tv' ? document.getElementById('season').value : 1;
            const e = currentMode === 'tv' ? document.getElementById('episode').value : 1;
            
            const providers = [
                { n: "⚡ GY-SERVER PRO", u: currentMode === 'movie' ? `https://www.2embed.cc/embed/${activeId}` : `https://www.2embed.cc/embedtv/${activeId}&s=${s}&e=${e}` },
                { n: "🌐 GLOBAL V2", u: currentMode === 'movie' ? `https://moviesapi.club/movie/${activeId}` : `https://moviesapi.club/tv/${activeId}-${s}-${e}` }
            ];

            document.getElementById('servers').innerHTML = providers.map((pv, i) => `
                <button onclick="play('${pv.u}', this)" class="px-10 py-5 rounded-3xl text-[10px] font-black uppercase border transition-all whitespace-nowrap ${i===0?'bg-green-600 border-green-600 text-white shadow-xl shadow-green-900/40':'bg-zinc-900 border-white/5 text-zinc-500'}">
                    ${pv.n}
                </button>
            `).join('');
            
            play(providers[0].u);
        }

        function play(url, btn) {
            if(btn) {
                document.querySelectorAll('#servers button').forEach(b => {
                    b.classList.remove('bg-green-600', 'border-green-600', 'text-white', 'shadow-xl');
                    b.classList.add('bg-zinc-900', 'border-white/5', 'text-zinc-500');
                });
                btn.classList.replace('bg-zinc-900', 'bg-green-600');
                btn.classList.add('text-white', 'shadow-xl');
            }
            document.getElementById('video-container').innerHTML = `
                <div id="v-load" class="flex flex-col items-center justify-center h-full bg-black">
                    <div class="w-14 h-14 border-4 border-green-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-6 text-[10px] font-black uppercase text-green-500 tracking-[0.5em]">Digitalizing Stream...</p>
                </div>
                <iframe src="${url}" class="w-full h-full hidden" frameborder="0" allowfullscreen onload="this.classList.remove('hidden'); document.getElementById('v-load').remove();"></iframe>
            `;
        }

        async function launchAd() {
            return new Promise(async (res) => {
                try {
                    const r = await fetch(`${API_URL}/get-ads`);
                    const d = await r.json();
                    if(d.enabled) {
                        window.open(d.video_ad_start, '_blank');
                        document.getElementById('ad-layer').style.display = 'flex';
                        let t = 4;
                        const it = setInterval(() => {
                            document.getElementById('skip-btn').innerText = `READY IN ${t}S`;
                            t--;
                            if(t < 0) { clearInterval(it); document.getElementById('skip-btn').innerText = "WATCH NOW"; window.resAd = res; }
                        }, 1000);
                    } else res();
                } catch(e) { res(); }
            });
        }

        function closeAd() { if(window.resAd) { document.getElementById('ad-layer').style.display = 'none'; window.resAd(); } }
        function closePlayer() { document.getElementById('player-modal').classList.remove('active'); document.getElementById('video-container').innerHTML = ""; }

        window.onload = load;
    </script>
</body>
</html>
