<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineApp | Nazareth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .movie-card { aspect-ratio: 2/3; cursor: pointer; transition: 0.3s; position: relative; border-radius: 12px; overflow: hidden; background: #1e293b; }
        #movie-details { position: fixed; inset: 0; background: #0f172a; transform: translateY(100%); transition: 0.4s ease; z-index: 100; overflow-y: auto; }
        #movie-details.open { transform: translateY(0); }
        .signature { font-size: 10px; color: rgba(255, 255, 255, 0.4); text-align: right; margin-top: 5px; }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #ef4444; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="pb-10">

    <header class="p-4 sticky top-0 bg-[#0f172a] z-50">
        <div class="relative">
            <input type="text" id="search-input" placeholder="Escribe el nombre de la película..." 
                class="w-full bg-slate-800 rounded-xl py-3 px-4 pl-10 outline-none border border-slate-700 focus:border-red-500">
            <i data-lucide="search" class="absolute left-3 top-3.5 text-slate-400 w-4 h-4"></i>
        </div>
        <div class="signature">by Nazareth</div>
    </header>

    <main class="p-4">
        <div id="status-msg" class="text-center text-slate-500 text-sm mb-4">Escribe algo para buscar películas</div>
        <div id="grid-peliculas" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
    </main>

    <div id="movie-details">
        <div class="relative w-full aspect-video bg-black">
            <button onclick="cerrarDetalles()" class="absolute top-4 right-4 z-[110] bg-black/50 p-2 rounded-full"><i data-lucide="x"></i></button>
            <div id="player-container" class="w-full h-full"></div>
        </div>
        
        <div class="p-4">
            <h2 id="detail-title" class="text-2xl font-bold"></h2>
            <div class="mt-4 flex flex-wrap gap-2" id="server-options">
                </div>
            <p class="mt-6 text-slate-400 text-sm">Si el video no carga, prueba con otro servidor. Algunos servidores pueden contener publicidad propia del reproductor.</p>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('search-input');
        const grid = document.getElementById('grid-peliculas');
        const statusMsg = document.getElementById('status-msg');
        let searchTimeout;

        // Función para buscar en una base de datos pública y abierta
        async function buscarPeliculas(query) {
            grid.innerHTML = '<div class="col-span-full"><div class="loader"></div></div>';
            statusMsg.innerText = "Buscando...";

            try {
                // Usamos el buscador de una API abierta (OMDb o similar que no requiere registro complejo)
                // O mejor aún, usamos un truco: buscamos directamente en el catálogo de los servidores
                const response = await fetch(`https://www.omdbapi.com/?s=${encodeURIComponent(query)}&apikey=93f066b6`);
                const data = await response.json();

                if (data.Response === "True") {
                    statusMsg.innerText = `Se encontraron ${data.Search.length} resultados`;
                    grid.innerHTML = data.Search.map(item => `
                        <div class="movie-card" onclick="verPelicula('${item.imdbID}', '${item.Title.replace(/'/g, "")}')">
                            <img src="${item.Poster !== 'N/A' ? item.Poster : 'https://via.placeholder.com/300x450?text=Sin+Poster'}" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent p-3 flex items-end">
                                <span class="text-xs font-bold leading-tight">${item.Title}</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    grid.innerHTML = "";
                    statusMsg.innerText = "No se encontró nada con ese nombre.";
                }
            } catch (error) {
                statusMsg.innerText = "Error de conexión.";
            }
            lucide.createIcons();
        }

        function verPelicula(id, titulo) {
            document.getElementById('detail-title').innerText = titulo;
            const container = document.getElementById('player-container');
            const serverOptions = document.getElementById('server-options');
            
            // Servidores directos usando el ID de IMDB
            const sources = [
                { name: "Servidor Principal", url: `https://vidsrc.me/embed/movie?imdb=${id}` },
                { name: "Servidor 2", url: `https://embed.su/embed/movie/${id}` },
                { name: "Servidor 3 (Alternativo)", url: `https://vidsrc.to/embed/movie/${id}` }
            ];

            serverOptions.innerHTML = sources.map((s, i) => `
                <button onclick="cargarIframe('${s.url}', this)" 
                    class="px-4 py-2 rounded-lg text-xs font-bold ${i===0 ? 'bg-red-600' : 'bg-slate-700'}">
                    ${s.name}
                </button>
            `).join('');

            cargarIframe(sources[0].url);
            document.getElementById('movie-details').classList.add('open');
        }

        function cargarIframe(url, btn) {
            if(btn) {
                document.querySelectorAll('#server-options button').forEach(b => b.classList.replace('bg-red-600', 'bg-slate-700'));
                btn.classList.replace('bg-slate-700', 'bg-red-600');
            }
            document.getElementById('player-container').innerHTML = `
                <iframe src="${url}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            `;
        }

        function cerrarDetalles() {
            document.getElementById('movie-details').classList.remove('open');
            document.getElementById('player-container').innerHTML = '';
        }

        searchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            const val = e.target.value.trim();
            if (val.length > 2) {
                searchTimeout = setTimeout(() => buscarPeliculas(val), 600);
            }
        });

        lucide.createIcons();
    </script>
</body>
</html>
