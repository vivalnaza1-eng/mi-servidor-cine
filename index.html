<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nazareth Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .poster-card { transition: transform 0.3s ease; aspect-ratio: 2/3; border-radius: 8px; overflow: hidden; background: #111; }
        .poster-card:active { transform: scale(0.95); }
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        .modal.active { display: flex; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <nav class="flex items-center justify-between p-5 sticky top-0 bg-black/90 backdrop-blur-md z-50">
        <h1 class="text-red-600 font-black text-2xl tracking-tighter">NAZARETH <span class="text-white font-light text-sm">PRO</span></h1>
        <div class="relative w-2/3">
            <input type="text" id="search" placeholder="Busca tu película..." 
                class="w-full bg-zinc-800 rounded-full py-2 px-10 text-sm outline-none focus:ring-1 focus:ring-red-600">
            <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-zinc-400"></i>
        </div>
    </nav>

    <div id="loading" class="text-center py-20 hidden"><div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-red-600"></div></div>
    
    <div id="grid" class="grid grid-cols-3 gap-3 p-3">
        </div>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-4 flex items-center justify-between border-b border-zinc-800">
            <button onclick="closePlayer()" class="p-2"><i data-lucide="chevron-left"></i></button>
            <span class="font-bold truncate px-4 text-sm" id="m-title">Cargando...</span>
            <div class="w-10"></div>
        </div>
        
        <div class="w-full aspect-video bg-zinc-900 shadow-2xl">
            <div id="video-container" class="w-full h-full"></div>
        </div>

        <div class="p-5">
            <h3 class="text-zinc-400 text-xs font-bold uppercase mb-3">Servidores Disponibles</h3>
            <div id="servers" class="flex gap-2 overflow-x-auto pb-4"></div>
            
            <h3 class="text-zinc-400 text-xs font-bold uppercase mt-4 mb-2">Sinopsis</h3>
            <p id="m-desc" class="text-sm text-zinc-300 leading-relaxed"></p>
        </div>
    </div>

    <script>
        // CAMBIA ESTO POR TU URL DE RENDER
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localMovies = [];

        async function init() {
            showLoading(true);
            try {
                const r = await fetch(`${API_URL}/populares`);
                localMovies = await r.json();
                drawMovies(localMovies);
            } catch (e) { console.error("Error inicial"); }
            showLoading(false);
        }

        function drawMovies(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w342${m.poster_path}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
            lucide.createIcons();
        }

        // BUSCADOR EN TIEMPO REAL
        let timer;
        document.getElementById('search').addEventListener('input', (e) => {
            clearTimeout(timer);
            const q = e.target.value;
            if (q.length < 3) return;
            timer = setTimeout(async () => {
                showLoading(true);
                const r = await fetch(`${API_URL}/buscar?q=${q}`);
                const data = await r.json();
                localMovies = [...localMovies, ...data];
                drawMovies(data);
                showLoading(false);
            }, 600);
        });

        function openPlayer(id) {
            const movie = localMovies.find(m => m.id == id);
            if (!movie) return;

            document.getElementById('m-title').innerText = movie.title;
            document.getElementById('m-desc').innerText = movie.overview || "No hay descripción disponible.";
            document.getElementById('player-modal').classList.add('active');

            const options = [
                { n: "Latino", u: `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1` },
                { n: "Castellano", u: `https://vidsrc.me/embed/movie?tmdb=${id}` },
                { n: "VIP", u: `https://embed.su/embed/movie/${id}` }
            ];

            document.getElementById('servers').innerHTML = options.map((s, i) => `
                <button onclick="play('${s.u}', this)" class="px-5 py-2 rounded-full text-[11px] font-bold border border-zinc-700 whitespace-nowrap ${i==0?'bg-red-600 border-red-600':''}">
                    ${s.n}
                </button>
            `).join('');

            play(options[0].u);
        }

        function play(url, btn) {
            if (btn) {
                document.querySelectorAll('#servers button').forEach(b => b.classList.remove('bg-red-600', 'border-red-600'));
                btn.classList.add('bg-red-600', 'border-red-600');
            }
            document.getElementById('video-container').innerHTML = `<iframe src="${url}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>`;
        }

        function closePlayer() {
            document.getElementById('player-modal').classList.remove('active');
            document.getElementById('video-container').innerHTML = "";
        }

        function showLoading(s) { document.getElementById('loading').style.display = s ? 'block' : 'none'; }

        window.onload = init;
    </script>
</body>
</html>
