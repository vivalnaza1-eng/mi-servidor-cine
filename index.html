<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMaster AI - Películas Gratis</title>
    <style>
        /* Diseño Base Estilo Cine */
        body {
            background-color: #0f0f0f;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 { color: #e50914; margin-bottom: 30px; }

        .pelicula-card {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
            margin: 10px auto;
            max-width: 400px;
            border: 1px solid #333;
        }

        .btn-play {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        /* --- CAPA DEL ANUNCIO (INTERSTITIAL) --- */
        #capa-anuncio {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 99999;
        }

        /* Botón de cerrar fijo arriba */
        .btn-cerrar-ad {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff0000;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 50px;
            z-index: 100000;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.5);
        }

        #ad-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Contenedor del Reproductor de Video */
        #reproductor-container {
            display: none;
            margin-top: 20px;
        }

        iframe.video-player {
            width: 100%;
            max-width: 800px;
            height: 450px;
            border: 2px solid #e50914;
        }
    </style>
</head>
<body>

    <h1>CineMaster AI 🍿</h1>

    <div class="pelicula-card">
        <h3>Película de Estreno 2026</h3>
        <p>Acción | Ciencia Ficción</p>
        <button class="btn-play" onclick="mostrarPublicidad('URL_DE_TU_VIDEO_AQUI')">▶️ VER AHORA</button>
    </div>

    <div id="reproductor-container">
        <h2 id="titulo-reproduciendo">Reproduciendo...</h2>
        <iframe id="main-video" class="video-player" src="" allowfullscreen></iframe>
    </div>

    <div id="capa-anuncio">
        <button class="btn-cerrar-ad" onclick="quitarPublicidad()">CERRAR ANUNCIO [X]</button>
        <iframe id="ad-frame" src=""></iframe>
    </div>

    <script>
        // CONFIGURACIÓN
        const MI_LINK_ADSTERRA = "TU_LINK_DE_ADSTERRA_AQUI"; // <-- PEGA AQUÍ TU DIRECT LINK
        let videoPendiente = "";

        function mostrarPublicidad(urlVideo) {
            videoPendiente = urlVideo; // Guardamos el video para después
            
            const capa = document.getElementById('capa-anuncio');
            const frame = document.getElementById('ad-frame');

            // Cargamos el anuncio de Adsterra
            frame.src = MI_LINK_ADSTERRA;
            capa.style.display = "block";
            
            console.log("Mostrando anuncio antes de: " + urlVideo);
        }

        function quitarPublicidad() {
            // Ocultamos la capa y limpiamos el frame del anuncio
            document.getElementById('capa-anuncio').style.display = "none";
            document.getElementById('ad-frame').src = "";

            // Ahora mostramos el reproductor con el video real
            const repoContainer = document.getElementById('reproductor-container');
            const mainVideo = document.getElementById('main-video');

            repoContainer.style.display = "block";
            mainVideo.src = videoPendiente;

            // Scroll automático al reproductor
            window.scrollTo(0, document.body.scrollHeight);
        }
    </script>

</body>
</html>
