<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap');
        
        :root {
            --gy-red: #ce1126;
            --gy-gold: #fcd116;
            --gy-green: #009e49;
        }

        body { 
            background: radial-gradient(circle at top right, #1a1a1a 0%, #000 100%); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
            margin: 0;
        }

        nav {
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .poster-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            aspect-ratio: 2/3; border-radius: 20px; 
            overflow: hidden; background: #111; 
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }
        .poster-card:hover { transform: scale(1.05); border-color: var(--gy-green); box-shadow: 0 15px 40px rgba(0, 158, 73, 0.3); }

        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.98); backdrop-filter: blur(35px); 
            z-index: 1000; flex-direction: column; 
        }
        .modal.active { display: flex; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .gy-gradient-text {
            background: linear-gradient(90deg, var(--gy-red), var(--gy-gold), var(--gy-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .tab-active { 
            color: var(--gy-gold); border-bottom: 3px solid var(--gy-gold);
            filter: drop-shadow(0 0 5px var(--gy-gold));
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        iframe { background: #000; border: none; }
    </style>
</head>
<body class="pt-28 pb-10">

    <nav class="flex items-center justify-between p-5 fixed top-0 w-full z-50">
        <div class="flex flex-col cursor-pointer" onclick="location.reload()">
            <h1 class="text-white font-black text-xl italic uppercase tracking-tighter leading-none">Guyana Digital</h1>
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-bold text-green-500 tracking-[0.2em] uppercase">Cinema Pro</span>
                <span class="text-[8px] text-zinc-600 font-bold uppercase tracking-widest border-l border-zinc-800 pl-2">by José Vival</span>
            </div>
        </div>
        <div class="relative w-1/2 max-w-[300px]">
            <input type="text" id="search" oninput="searchMedia()" placeholder="Search more movies..." class="w-full bg-white/5 rounded-2xl py-3 px-11 text-xs border border-white/10 outline-none focus:border-green-500 transition-all text-white">
            <i data-lucide="search" class="absolute left-4 top-3 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-10 px-8 py-4 sticky top-[80px] z-40 bg-black/50 backdrop-blur-sm">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] font-black uppercase tracking-[0.2em] transition-all">Movies</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.2em] transition-all">Series TV</button>
    </div>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 p-6"></main>

    <div id="player-modal" class="modal overflow-y-auto no-scrollbar">
        <div class="p-6 flex items-center justify-between sticky top-0 bg-black/90 backdrop-blur-xl z-50">
            <button onclick="closePlayer()" class="w-11 h-11 bg-white/5 rounded-xl flex items-center justify-center hover:bg-white/10 transition-colors">
                <i data-lucide="chevron-left" class="w-6 h-6"></i>
            </button>
            <div class="flex flex-col items-center">
                <img src="https://flagcdn.com/gy.svg" class="w-6 rounded-sm mb-1 opacity-80" alt="GY">
                <span class="font-black text-[10px] uppercase tracking-[0.2em] text-zinc-400" id="m-title">Loading...</span>
            </div>
            <div class="w-11"></div>
        </div>
        
        <div class="w-full aspect-video bg-black shadow-2xl">
            <div id="video-container" class="w-full h-full"></div>
        </div>

        <div class="p-8 max-w-5xl mx-auto w-full">
            <div id="series-controls" class="hidden mb-10 grid grid-cols-2 gap-4">
                <select id="season" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-4 rounded-2xl text-xs text-white appearance-none outline-none focus:border-yellow-500"></select>
                <select id="episode" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-4 rounded-2xl text-xs text-white appearance-none outline-none focus:border-yellow-500"></select>
            </div>

            <div class="mb-10">
                <p class="text-[9px] font-black text-green-500 uppercase tracking-[0.4em] mb-4 opacity-70">Multiple Providers:</p>
                <div id="servers" class="flex gap-3 overflow-x-auto pb-2 no-scrollbar"></div>
            </div>
            
            <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                <p id="m-desc" class="text-sm text-zinc-400 leading-relaxed font-light italic border-l-2 border-red-600 pl-4"></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [];
        let currentMode = 'movie';
        let activeId = null;

        // ESTRATEGIA: Carga masiva de múltiples páginas de tu servidor
        async function load() {
            try {
                const endpoint = currentMode === 'movie' ? '/populares' : '/series';
                // Intentamos traer varias páginas para tener "más películas"
                const pages = [1, 2, 3]; 
                const requests = pages.map(p => fetch(`${API_URL}${endpoint}?page=${p}`).then(res => res.json()));
                const results = await Promise.all(requests);
                
                // Unimos todos los resultados en una sola lista gigante
                localData = results.flat();
                draw(localData);
            } catch (e) { 
                console.error("Error cargando múltiples fuentes");
            }
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function searchMedia() {
            const q = document.getElementById('search').value.toLowerCase();
            const f = localData.filter(m => (m.title || m.name || "").toLowerCase().includes(q));
            draw(f);
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'tab-active text-[10px] font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-[10px] font-black uppercase tracking-[0.2em]';
            document.getElementById('btn-tv').className = m === 'tv' ? 'tab-active text-[10px] font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-[10px] font-black uppercase tracking-[0.2em]';
            load();
        }

        async function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id);
            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "No description.";
            
            if(currentMode === 'tv') {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:30}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:100}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }
            updateContent();
            document.getElementById('player-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateContent() {
            const s = currentMode === 'tv' ? document.getElementById('season').value : 1;
            const e = currentMode === 'tv' ? document.getElementById('episode').value : 1;
            
            // ESTRATEGIA: Implementación de 4 PROVEEDORES distintos
            const providers = [
                { n: "🚀 SERVER ULTRA", u: currentMode === 'movie' ? `https://www.2embed.cc/embed/${activeId}` : `https://www.2embed.cc/embedtv/${activeId}&s=${s}&e=${e}` },
                { n: "🌐 SERVER GLOBAL", u: currentMode === 'movie' ? `https://autoembed.to/movie/tmdb/${activeId}` : `https://autoembed.to/tv/tmdb/${activeId}/${s}/${e}` },
                { n: "💎 PREMIUM VIP", u: currentMode === 'movie' ? `https://moviesapi.club/movie/${activeId}` : `https://moviesapi.club/tv/${activeId}-${s}-${e}` },
                { n: "📡 MIRROR HD", u: currentMode === 'movie' ? `https://vidsrc.me/embed/movie?tmdb=${activeId}` : `https://vidsrc.me/embed/tv?tmdb=${activeId}&sea=${s}&epi=${e}` }
            ];

            document.getElementById('servers').innerHTML = providers.map((pv, i) => `
                <button onclick="play('${pv.u}', this)" class="whitespace-nowrap px-6 py-3 rounded-xl text-[9px] font-black uppercase border transition-all ${i===0?'bg-green-600 border-green-600 text-white shadow-lg shadow-green-900/40':'bg-zinc-900 border-white/5 text-zinc-500'}">
                    ${pv.n}
                </button>
            `).join('');
            play(providers[0].u);
        }

        function play(url, btn) {
            if(btn) {
                document.querySelectorAll('#servers button').forEach(b => {
                    b.classList.remove('bg-green-600', 'text-white');
                    b.classList.add('bg-zinc-900', 'text-zinc-500');
                });
                btn.classList.add('bg-green-600', 'text-white');
            }
            document.getElementById('video-container').innerHTML = `<iframe src="${url}" class="w-full h-full" allowfullscreen sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>`;
        }

        function closePlayer() { 
            document.getElementById('player-modal').classList.remove('active'); 
            document.getElementById('video-container').innerHTML = ""; 
            document.body.style.overflow = 'auto';
        }

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
