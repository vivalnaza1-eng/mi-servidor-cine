<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --accent-cyan: #00f2ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* BOTÓN FLOTANTE MMG MEJORADO */
        .btn-mmg { position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; background: white; border-radius: 22px; z-index: 1000; display: flex; align-items: center; justify-center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); border: 3px solid var(--accent-cyan); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); animation: float 3s ease-in-out infinite; }
        .btn-mmg:active { transform: scale(0.85); }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* POSTERS */
        .poster-card { transition: all 0.4s ease; aspect-ratio: 2/3; border-radius: 18px; overflow: hidden; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; position: relative; }
        .poster-card:hover { transform: scale(1.05); border-color: var(--accent-cyan); box-shadow: 0 0 25px rgba(0, 242, 255, 0.2); }
        
        .tab-active { color: var(--accent-cyan) !important; position: relative; font-weight: 800; }
        .tab-active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: var(--accent-cyan); border-radius: 10px; box-shadow: 0 0 10px var(--accent-cyan); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); animation: fadeIn 0.3s ease; }
        .modal.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .skeleton { background: linear-gradient(90deg, #0f0f0f 25%, #1a1a1a 50%, #0f0f0f 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pt-44 pb-24">

    <div id="pwa-container" class="fixed top-24 left-0 w-full px-5 z-[60] hidden">
        <button onclick="triggerInstall()" class="w-full bg-white text-black py-3 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] flex items-center justify-center gap-2 shadow-xl">
            <i data-lucide="download" class="w-4 h-4"></i> Install Guyana Cinema App
        </button>
    </div>

    <button onclick="openDonation()" class="btn-mmg">
        <img src="mmg.svg" class="w-12 h-12 p-1" alt="MMG">
    </button>

    <div id="donation-modal" class="modal px-6" onclick="closeDonation()">
        <div class="bg-zinc-900 border border-white/10 p-10 rounded-[40px] text-center max-w-xs w-full shadow-2xl" onclick="event.stopPropagation()">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center">
                <img src="mmg.svg" class="w-14 h-14">
            </div>
            <p class="text-[10px] font-black uppercase tracking-widest text-zinc-500 mb-2">MMG Merchant Number</p>
            <h2 class="text-5xl font-black italic tracking-tighter text-white mb-6">7005167</h2>
            <div class="h-[1px] w-full bg-white/5 mb-6"></div>
            <button onclick="closeDonation()" class="w-full py-4 bg-cyan-500 text-black rounded-2xl font-black text-[10px] uppercase tracking-widest">Done</button>
        </div>
    </div>

    <div class="fixed top-0 w-full z-[100] bg-zinc-950/95 backdrop-blur-md border-b border-white/10 py-3 px-4 text-center">
        <p class="text-[9px] md:text-[10px] font-medium text-zinc-300 italic tracking-wide uppercase">
            <span class="text-cyan-400 font-black mr-2 tracking-tighter">System Status:</span> High Performance Active ⚡
        </p>
    </div>

    <nav class="p-5 fixed top-11 w-full z-50 flex flex-col gap-6 bg-zinc-950/80 backdrop-blur-xl"> 
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-cyan-500 rounded-xl flex items-center justify-center">
                    <i data-lucide="clapperboard" class="text-black w-6 h-6"></i>
                </div>
                <div>
                    <h1 class="font-black text-xl italic tracking-tighter text-white uppercase leading-none">Guyana Digital</h1>
                    <p class="text-[8px] font-bold text-cyan-400 uppercase tracking-[0.2em] mt-1">Essequibo Is Guyana</p>
                </div>
            </div>
            <div class="relative max-w-[140px] w-full">
                <input type="text" id="search" oninput="debounceSearch()" placeholder="Search titles..." class="w-full bg-zinc-900 border border-white/5 rounded-xl py-2.5 px-9 text-[10px] outline-none focus:border-cyan-500 transition-all text-white">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-3.5 h-3.5 text-zinc-500"></i>
            </div>
        </div>
        <div class="flex gap-8 overflow-x-auto no-scrollbar items-center px-2">
            <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] uppercase whitespace-nowrap">Movies</button>
            <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">TV Series</button>
            <button onclick="changeMode('upcoming')" id="btn-upcoming" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">Upcoming</button>
            <button onclick="changeMode('fav')" id="btn-fav" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">My List</button>
        </div>
    </nav>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5 p-6"></main>

    <div id="player-modal" class="modal !justify-start !p-0">
        <div class="p-5 flex items-center justify-between w-full bg-black/90 backdrop-blur-2xl z-50">
            <button onclick="closePlayer()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full border border-white/5"><i data-lucide="chevron-left"></i></button>
            <span class="font-black text-[10px] uppercase tracking-widest truncate px-4 max-w-[200px]" id="m-title">Loading...</span>
            <button onclick="toggleFavorite()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full border border-white/5"><i data-lucide="heart" id="fav-icon" class="w-4 h-4"></i></button>
        </div>
        <div id="video-area" class="w-full aspect-video bg-black shadow-2xl">
            <div id="iframe-slot" class="w-full h-full"></div>
        </div>
        <div class="p-8 max-w-xl mx-auto w-full">
            <div id="series-controls" class="hidden grid grid-cols-2 gap-4 mb-8">
                <select id="season" class="bg-zinc-900 text-white p-4 rounded-2xl text-[10px] font-bold border border-white/5 outline-none"></select>
                <select id="episode" class="bg-zinc-900 text-white p-4 rounded-2xl text-[10px] font-bold border border-white/5 outline-none"></select>
            </div>
            <button onclick="initPlay()" class="w-full py-5 rounded-2xl text-[10px] font-black uppercase bg-cyan-400 text-black shadow-[0_10px_30px_rgba(0,242,255,0.3)] mb-10 tracking-widest">Start Streaming</button>
            <h3 class="text-[10px] font-black uppercase text-cyan-500 mb-3 tracking-widest">Overview</h3>
            <p id="m-desc" class="text-xs text-zinc-400 leading-relaxed bg-white/5 p-5 rounded-2xl italic border border-white/5"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [], favorites = JSON.parse(localStorage.getItem('gy_favs')) || [], currentMode = 'movie', activeId = null, searchTimer;

        // SISTEMA PWA
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Solo muestra el botón si NO está en modo app
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                document.getElementById('pwa-container').classList.remove('hidden');
            }
        });

        async function triggerInstall() {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') document.getElementById('pwa-container').classList.add('hidden');
                deferredPrompt = null;
            }
        }

        async function load() {
            const grid = document.getElementById('grid');
            grid.innerHTML = Array(10).fill('<div class="poster-card skeleton"></div>').join('');
            if(currentMode === 'fav') return draw(favorites);
            try {
                const ep = currentMode === 'upcoming' ? '/proximamente' : (currentMode === 'movie' ? '/populares' : '/series');
                const r = await fetch(`${API_URL}${ep}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { grid.innerHTML = "<p class='col-span-full text-center py-20 text-zinc-600 uppercase text-[10px] font-black'>API Connection Failed</p>"; }
        }

        // BUSCADOR MEJORADO (BUSCA EN TODA LA API)
        function debounceSearch() {
            clearTimeout(searchTimer);
            searchTimer = setTimeout(performGlobalSearch, 500);
        }

        async function performGlobalSearch() {
            const query = document.getElementById('search').value.toLowerCase().trim();
            const grid = document.getElementById('grid');
            if(!query) return load();

            grid.innerHTML = Array(4).fill('<div class="poster-card skeleton"></div>').join('');

            try {
                // Buscamos en el endpoint de búsqueda global de tu API
                const r = await fetch(`${API_URL}/buscar?q=${query}`);
                const results = await r.json();
                draw(results);
            } catch (e) {
                // Fallback a búsqueda local si falla la API
                const filtered = localData.filter(item => (item.title || item.name || "").toLowerCase().includes(query));
                draw(filtered);
            }
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            if(!list.length) { grid.innerHTML = "<p class='col-span-full text-center py-20 text-zinc-600 text-[10px] uppercase font-black italic'>No Titles Found</p>"; return; }
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id}, '${m.title ? 'movie' : 'tv'}')">
                    <img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w500'+m.poster_path : 'no-poster.png'}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
        }

        function openDonation() { document.getElementById('donation-modal').classList.add('active'); }
        function closeDonation() { document.getElementById('donation-modal').classList.remove('active'); }

        async function openPlayer(id, type) {
            activeId = id;
            grid.innerHTML = ""; // Limpiar busqueda al abrir
            const item = [...localData, ...favorites].find(m => m.id == id) || await fetchItemDetails(id, type);
            if(!item) return;

            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "No summary available for this title.";
            
            const isTV = type === 'tv' || item.name;
            document.getElementById('series-controls').classList.toggle('hidden', !isTV);
            
            if(isTV) {
                document.getElementById('season').innerHTML = Array.from({length:20}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:50}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            }
            document.getElementById('player-modal').classList.add('active');
            updateFavIcon();
            lucide.createIcons();
        }

        async function fetchItemDetails(id, type) {
            try {
                const r = await fetch(`${API_URL}/detalles/${type}/${id}`);
                return await r.json();
            } catch(e) { return null; }
        }

        function initPlay() {
            const s = document.getElementById('season').value || 1, e = document.getElementById('episode').value || 1;
            const isTV = !document.getElementById('series-controls').classList.contains('hidden');
            const src = `https://vidsrc.xyz/embed/${isTV?'tv':'movie'}?tmdb=${activeId}${isTV?`&season=${s}&episode=${e}`:''}`;
            document.getElementById('iframe-slot').innerHTML = `<iframe src="${src}" allowfullscreen class="w-full h-full border-0 rounded-b-2xl"></iframe>`;
        }

        function changeMode(m) {
            currentMode = m;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-zinc-500'));
            document.getElementById(`btn-${m}`).classList.add('tab-active');
            load();
        }

        function closePlayer() { document.getElementById('player-modal').classList.remove('active'); document.getElementById('iframe-slot').innerHTML = ""; }
        
        function toggleFavorite() {
            const item = localData.find(m => m.id == activeId);
            const idx = favorites.findIndex(f => f.id == activeId);
            if(idx > -1) favorites.splice(idx, 1); else if(item) favorites.push(item);
            localStorage.setItem('gy_favs', JSON.stringify(favorites));
            updateFavIcon();
        }

        function updateFavIcon() {
            const isFav = favorites.some(f => f.id == activeId);
            const icon = document.getElementById('fav-icon');
            icon.style.fill = isFav ? "#00f2ff" : "none";
            icon.style.color = isFav ? "#00f2ff" : "white";
        }

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
