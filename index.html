<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nazareth Pro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        
        :root { 
            --gy-gold: #fcd116; 
            --gy-red: #ce1126;
            --bg-black: #080808;
            --card-bg: #121212;
        }

        body { 
            background-color: var(--bg-black); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        nav { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .poster-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            aspect-ratio: 2/3; 
            border-radius: 12px; 
            overflow: hidden; 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            position: relative;
        }

        .poster-card:hover { 
            transform: scale(1.03) translateY(-5px); 
            border-color: var(--gy-gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .skeleton {
            background: linear-gradient(90deg, #121212 25%, #1a1a1a 50%, #121212 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: var(--bg-black); 
            z-index: 1000; 
            flex-direction: column; 
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal.active { display: flex; }

        #iframe-slot { position: relative; width: 100%; height: 100%; background: black; }
        #iframe-slot iframe { width: 100%; height: 100%; border: none; }

        #creator-credits {
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(15, 15, 15, 0.8);
            backdrop-filter: blur(15px);
            padding: 10px 14px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tab-active { color: white; border-bottom: 3px solid var(--gy-red); font-weight: 800; }

        #install-btn {
            display: none;
            position: fixed;
            bottom: 90px;
            right: 20px;
            z-index: 1001;
            background: var(--gy-red);
            padding: 12px 20px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 11px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% {transform: translateY(0);}
            50% {transform: translateY(-10px);}
        }
    </style>
</head>
<body class="pt-24">

    <nav class="flex items-center justify-between p-6 fixed top-0 w-full z-50">
        <div class="cursor-pointer" onclick="location.reload()">
            <h1 class="text-white font-black text-2xl italic tracking-tighter leading-none">GUYANA DIGITAL</h1>
            <span class="text-[10px] font-bold text-green-500 tracking-[0.3em] uppercase">Nazareth Cinema Pro</span>
        </div>
        <div class="relative w-44 md:w-64">
            <input type="text" id="search" oninput="debounceSearch()" placeholder="Search movies..." class="w-full bg-white/10 rounded-md py-2 px-10 text-xs border border-transparent focus:border-white/20 outline-none text-white">
            <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-8 px-8 py-4 sticky top-[80px] z-40 bg-black/80 backdrop-blur-md">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-xs uppercase tracking-widest">Movies</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-xs uppercase tracking-widest hover:text-white transition-colors">TV Shows</button>
    </div>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-6"></main>

    <div id="player-modal" class="modal overflow-y-auto no-scrollbar">
        <div class="p-4 flex items-center justify-between sticky top-0 bg-black/90 z-50 border-bottom border-white/10">
            <button onclick="closePlayer()" class="p-2 hover:bg-white/10 rounded-full transition-colors"><i data-lucide="arrow-left"></i></button>
            <span class="font-bold text-xs uppercase tracking-widest" id="m-title">Loading...</span>
            <div class="w-10"></div>
        </div>
        
        <div class="w-full aspect-video bg-black relative shadow-2xl" id="video-container">
            <div id="iframe-slot"></div>
        </div>
        
        <div class="p-8 max-w-4xl mx-auto w-full">
            <div id="series-controls" class="hidden mb-8 grid grid-cols-2 gap-4">
                <select id="season" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-4 rounded-lg text-sm text-white outline-none"></select>
                <select id="episode" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-4 rounded-lg text-sm text-white outline-none"></select>
            </div>
            
            <div class="mb-6">
                <h2 class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.2em] mb-3">Play Option</h2>
                <div id="servers" class="flex gap-3"></div>
            </div>
            
            <div class="bg-zinc-900/40 p-6 rounded-xl border border-white/5">
                <p id="m-desc" class="text-sm text-zinc-400 leading-relaxed font-light mb-4"></p>
                <div class="w-full h-[100px] bg-zinc-900 rounded-lg flex items-center justify-center overflow-hidden border border-white/5">
                    <iframe src="https://mi-servidor-cine.onrender.com/publicidad" style="width:100%; height:100%; border:none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <button id="install-btn" class="flex items-center gap-2">
        <i data-lucide="download" class="w-4 h-4"></i> INSTALL APP
    </button>

    <div id="creator-credits">
        <img src="https://flagcdn.com/w40/gy.png" alt="Guyana" class="w-6 h-4 object-cover rounded-sm">
        <div class="flex flex-col">
            <span class="text-[8px] font-black text-[#fcd116] uppercase">Nazareth Pro</span>
            <span class="text-[10px] font-bold text-white">By José Vival</span>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        const ADS_URL = "https://www.profitablecpmratenetwork.com/jpp1ah70?key=2362ad52be7ddb0ad6207c0ceb1443af";
        
        let localData = [];
        let currentMode = 'movie';
        let activeId = null;
        let searchTimeout;
        let deferredPrompt;

        // Inicializar Animaciones
        AOS.init({ duration: 800, once: true });

        async function load() {
            const grid = document.getElementById('grid');
            // 1. SKELETON LOADERS
            grid.innerHTML = Array(12).fill(0).map(() => `
                <div class="poster-card skeleton"></div>
            `).join('');

            try {
                const endpoint = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${endpoint}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error("API Error"); }
        }

        async function searchGlobal() {
            const q = document.getElementById('search').value;
            if(q.length < 2) return load();
            try {
                const r = await fetch(`${API_URL}/buscar?q=${encodeURIComponent(q)}&type=${currentMode}`);
                const results = await r.json();
                localData = results;
                draw(results);
            } catch (e) { console.error("Search Error"); }
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(searchGlobal, 500);
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            if(!list.length) { grid.innerHTML = '<div class="col-span-full text-center py-20">No results found.</div>'; return; }
            
            grid.innerHTML = list.map((m, i) => `
                <div class="poster-card" 
                     data-aos="fade-up" 
                     data-aos-delay="${(i % 6) * 100}" 
                     onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover" loading="lazy">
                    <div class="absolute bottom-0 left-0 w-full p-2 bg-gradient-to-t from-black to-transparent">
                        <p class="text-[10px] font-bold truncate">${m.title || m.name}</p>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'tab-active text-xs uppercase tracking-widest' : 'text-zinc-500 text-xs uppercase tracking-widest hover:text-white';
            document.getElementById('btn-tv').className = m === 'tv' ? 'tab-active text-xs uppercase tracking-widest' : 'text-zinc-500 text-xs uppercase tracking-widest hover:text-white';
            load();
        }

        async function openPlayer(id) {
            // 2. VIBRACIÓN HÁPTICA
            if (navigator.vibrate) navigator.vibrate(40);

            activeId = id;
            const item = localData.find(m => m.id == id);
            if(!item) return;

            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "No description available.";
            
            if(currentMode === 'tv') {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:15}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:40}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }
            updateContent();
            document.getElementById('player-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateContent() {
            const s = currentMode === 'tv' ? document.getElementById('season').value : 1;
            const e = currentMode === 'tv' ? document.getElementById('episode').value : 1;
            
            const mirrorUrl = currentMode === 'movie' 
                ? `https://vidsrc.me/embed/movie?tmdb=${activeId}` 
                : `https://vidsrc.me/embed/tv?tmdb=${activeId}&sea=${s}&epi=${e}`;

            document.getElementById('servers').innerHTML = `
                <button onclick="play('${mirrorUrl}')" class="w-full py-4 rounded-xl text-xs font-black uppercase bg-white text-black flex items-center justify-center gap-3 active:scale-95 transition-transform shadow-xl">
                    <i data-lucide="play" class="w-4 h-4 fill-current"></i> Start Movie
                </button>
            `;
            lucide.createIcons();
        }

        function play(url) {
            // 3. PUBLICIDAD LIMPIA
            const adTrigger = document.createElement('a');
            adTrigger.href = ADS_URL;
            adTrigger.target = "_blank";
            adTrigger.rel = "noopener noreferrer";
            adTrigger.click();

            const container = document.getElementById('video-container');
            document.getElementById('iframe-slot').innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay; encrypted-media"></iframe>`;
            
            setTimeout(() => {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            }, 500);
        }

        function closePlayer() { 
            document.getElementById('player-modal').classList.remove('active'); 
            document.getElementById('iframe-slot').innerHTML = ""; 
            document.body.style.overflow = 'auto';
        }

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
