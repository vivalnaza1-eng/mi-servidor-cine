<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        :root { --gy-gold: #fcd116; --gy-red: #ce1126; --bg-black: #080808; }

        body { background-color: var(--bg-black); color: white; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Glass Navbar */
        nav { background: rgba(8, 8, 8, 0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }

        .poster-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            aspect-ratio: 2/3; border-radius: 12px; overflow: hidden; 
            background: #121212; border: 1px solid rgba(255,255,255,0.05);
        }
        .poster-card:hover { transform: scale(1.03); border-color: var(--gy-gold); }

        .tab-active { color: white; border-bottom: 3px solid var(--gy-red); font-weight: 800; }
        
        .modal { display: none; position: fixed; inset: 0; background: var(--bg-black); z-index: 1000; flex-direction: column; animation: slideUp 0.4s ease; }
        .modal.active { display: flex; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .upcoming-badge {
            background: var(--gy-red);
            color: white;
            font-size: 8px;
            padding: 2px 6px;
            border-radius: 4px;
            position: absolute;
            top: 8px;
            right: 8px;
            font-weight: 900;
            text-transform: uppercase;
        }
    </style>
</head>
<body class="pt-28">

    <nav class="p-4 fixed top-0 w-full z-50 flex flex-col gap-4">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="https://flagcdn.com/w40/gy.png" class="w-6 h-4 rounded-sm shadow-md">
                <h1 class="font-black text-xl italic italic">GUYANA DIGITAL</h1>
            </div>
            <div class="relative w-40">
                <input type="text" id="search" oninput="debounceSearch()" placeholder="Search..." class="w-full bg-white/10 rounded-full py-2 px-8 text-xs outline-none focus:bg-white/20 transition-all">
                <i data-lucide="search" class="absolute left-2.5 top-2.5 w-3.5 h-3.5 text-zinc-500"></i>
            </div>
        </div>
        
        <div class="flex gap-6 overflow-x-auto no-scrollbar border-t border-white/5 pt-3">
            <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] uppercase tracking-widest whitespace-nowrap">Movies</button>
            <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-[10px] uppercase tracking-widest whitespace-nowrap">TV Shows</button>
            <button onclick="changeMode('upcoming')" id="btn-upcoming" class="text-zinc-500 text-[10px] uppercase tracking-widest whitespace-nowrap flex items-center gap-2">
                <i data-lucide="calendar" class="w-3 h-3"></i> Upcoming
            </button>
            <button onclick="changeMode('fav')" id="btn-fav" class="text-zinc-500 text-[10px] uppercase tracking-widest whitespace-nowrap flex items-center gap-2">
                <i data-lucide="heart" class="w-3 h-3"></i> My List
            </button>
        </div>
    </nav>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-6"></main>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-4 flex items-center justify-between sticky top-0 bg-black/90 z-50 border-b border-white/10">
            <button onclick="closePlayer()" class="p-2"><i data-lucide="arrow-left"></i></button>
            <span class="font-bold text-[10px] uppercase tracking-widest truncate max-w-[150px]" id="m-title">Loading...</span>
            <button id="fav-toggle-btn" class="p-2"><i data-lucide="heart" id="fav-icon"></i></button>
        </div>

        <div id="video-area" class="w-full aspect-video bg-black relative shadow-2xl">
            <div id="iframe-slot" class="w-full h-full"></div>
        </div>

        <div class="p-6 max-w-2xl mx-auto w-full">
            <div id="play-ui">
                <div id="series-controls" class="hidden grid grid-cols-2 gap-4 mb-6">
                    <select id="season" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-3 rounded-xl text-xs text-white"></select>
                    <select id="episode" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-3 rounded-xl text-xs text-white"></select>
                </div>
                
                <div class="flex gap-2 mb-6" id="server-list">
                    <button onclick="setServer(0)" class="flex-1 bg-white text-black text-[10px] font-bold py-3 rounded-xl active:scale-95 transition-all">SERVER 1</button>
                    <button onclick="setServer(1)" class="flex-1 bg-zinc-800 text-white text-[10px] font-bold py-3 rounded-xl active:scale-95 transition-all">SERVER 2</button>
                </div>

                <button onclick="initPlay()" class="w-full py-4 rounded-2xl text-xs font-black uppercase bg-white text-black flex items-center justify-center gap-3 mb-6 shadow-xl active:scale-95 transition-all">
                    <i data-lucide="play" class="w-4 h-4 fill-current"></i> Play Now
                </button>
            </div>

            <div id="upcoming-ui" class="hidden text-center py-6">
                <div class="inline-block px-4 py-2 bg-zinc-900 border border-gy-gold/30 rounded-full mb-4">
                    <span class="text-gy-gold text-[10px] font-black uppercase tracking-tighter">Coming Soon to Guyana Digital</span>
                </div>
                <p class="text-zinc-500 text-xs mb-2">Expected Release Date:</p>
                <p id="release-date" class="text-white font-bold text-lg mb-6"></p>
            </div>
            
            <div class="bg-zinc-900/40 p-5 rounded-2xl border border-white/5">
                <p id="m-desc" class="text-xs text-zinc-400 leading-relaxed font-light"></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [];
        let favorites = JSON.parse(localStorage.getItem('gy_favs')) || [];
        let currentMode = 'movie';
        let activeId = null;

        AOS.init({ duration: 600 });

        async function load() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-zinc-500 text-xs uppercase animate-pulse">Loading...</div>';
            
            if(currentMode === 'fav') { draw(favorites); return; }

            try {
                // Si el modo es upcoming, usamos una ruta de "estrenos" o "populares"
                const endpoint = currentMode === 'upcoming' ? '/populares' : (currentMode === 'movie' ? '/populares' : '/series');
                const r = await fetch(`${API_URL}${endpoint}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { grid.innerHTML = "Error."; }
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            if(!list.length) { grid.innerHTML = "Empty."; return; }
            
            grid.innerHTML = list.map((m, i) => `
                <div class="poster-card relative" data-aos="fade-up" onclick="openPlayer(${m.id}, ${list === favorites})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover">
                    ${currentMode === 'upcoming' ? '<span class="upcoming-badge">Soon</span>' : ''}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function openPlayer(id, fromFavs) {
            activeId = id;
            const item = fromFavs ? favorites.find(m => m.id == id) : localData.find(m => m.id == id);
            
            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview;
            
            // Lógica UI para "Upcoming"
            if(currentMode === 'upcoming') {
                document.getElementById('play-ui').classList.add('hidden');
                document.getElementById('upcoming-ui').classList.remove('hidden');
                document.getElementById('release-date').innerText = item.release_date || "Coming Soon 2026";
            } else {
                document.getElementById('play-ui').classList.remove('hidden');
                document.getElementById('upcoming-ui').classList.add('hidden');
            }

            document.getElementById('player-modal').classList.add('active');
        }

        function changeMode(m) {
            currentMode = m;
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`btn-${m}`).classList.add('tab-active');
            load();
        }

        function closePlayer() {
            document.getElementById('player-modal').classList.remove('active');
            document.getElementById('iframe-slot').innerHTML = "";
        }

        window.onload = load;
    </script>
</body>
</html>
