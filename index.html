<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nazareth Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .poster-card { transition: all 0.3s ease; aspect-ratio: 2/3; border-radius: 12px; overflow: hidden; background: #111; }
        .poster-card:active { transform: scale(0.95); }
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column; }
        .modal.active { display: flex; }
        #ad-layer { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        ::-webkit-scrollbar { display: none; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active { color: #ef4444; border-bottom: 2px solid #ef4444; }
    </style>
</head>
<body class="pb-10">

    <div id="ad-layer">
        <div class="text-center p-6">
            <i data-lucide="shield-check" class="w-16 h-16 text-red-600 mx-auto mb-4 animate-pulse"></i>
            <h2 class="text-xl font-black uppercase italic">Verificando Acceso</h2>
            <button id="skip-btn" onclick="closeAd()" class="bg-white text-black px-10 py-3 rounded-full font-black mt-6">CARGANDO...</button>
        </div>
    </div>

    <nav class="flex items-center justify-between p-5 sticky top-0 bg-black/95 backdrop-blur-md z-50">
        <h1 onclick="location.reload()" class="text-red-600 font-black text-2xl italic uppercase cursor-pointer">Nazareth</h1>
        <div class="relative w-3/5">
            <input type="text" id="search" placeholder="Buscar..." class="w-full bg-zinc-900 rounded-full py-2 px-10 text-sm border border-zinc-800 outline-none focus:border-red-600">
            <i data-lucide="search" class="absolute left-3.5 top-2.5 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-6 px-5 py-2 sticky top-[72px] bg-black z-40 border-b border-zinc-900">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active pb-1 text-[10px] font-black uppercase tracking-widest">Películas</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 pb-1 text-[10px] font-black uppercase tracking-widest">Series</button>
    </div>

    <div class="flex gap-2 px-5 py-4 overflow-x-auto no-scrollbar">
        <button onclick="filterGenre(28)" class="bg-zinc-900 border border-zinc-800 px-4 py-1.5 rounded-full text-[9px] font-bold uppercase whitespace-nowrap">Acción</button>
        <button onclick="filterGenre(27)" class="bg-zinc-900 border border-zinc-800 px-4 py-1.5 rounded-full text-[9px] font-bold uppercase whitespace-nowrap">Terror</button>
        <button onclick="filterGenre(35)" class="bg-zinc-900 border border-zinc-800 px-4 py-1.5 rounded-full text-[9px] font-bold uppercase whitespace-nowrap">Comedia</button>
        <button onclick="filterGenre(878)" class="bg-zinc-900 border border-zinc-800 px-4 py-1.5 rounded-full text-[9px] font-bold uppercase whitespace-nowrap">Sci-Fi</button>
    </div>

    <div id="loading" class="text-center py-20"><div class="animate-spin rounded-full h-8 w-8 border-t-2 border-red-600 mx-auto"></div></div>
    <main id="grid" class="grid grid-cols-3 gap-2 p-2"></main>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-4 flex items-center bg-zinc-950 border-b border-zinc-900">
            <button onclick="closePlayer()" class="p-2 bg-zinc-900 rounded-full"><i data-lucide="chevron-left"></i></button>
            <span class="font-bold truncate px-4 text-xs uppercase italic" id="m-title">Cargando...</span>
        </div>
        
        <div class="w-full aspect-video bg-black relative shadow-2xl">
            <div id="video-container" class="w-full h-full"></div>
        </div>

        <div class="p-6">
            <div class="flex items-start gap-3 mb-6 bg-red-600/10 p-4 rounded-xl border border-red-600/20">
                <i data-lucide="help-circle" class="w-5 h-5 text-red-500 shrink-0"></i>
                <p class="text-[11px] text-zinc-300 font-medium leading-tight">
                    <span class="text-red-500 font-black uppercase block mb-1">¿Video lento o caído?</span>
                    Usa el <strong class="text-white italic underline">botón flotante azul/blanco</strong> que aparece dentro del video para cambiar de servidor al instante.
                </p>
            </div>

            <div id="series-controls" class="hidden mb-6 grid grid-cols-2 gap-3">
                <div>
                    <label class="text-[8px] text-zinc-500 font-black uppercase mb-1 block">Temporada</label>
                    <select id="season" onchange="updateContent()" class="w-full bg-zinc-900 border border-zinc-800 p-2 rounded-lg text-xs outline-none focus:border-red-600"></select>
                </div>
                <div>
                    <label class="text-[8px] text-zinc-500 font-black uppercase mb-1 block">Episodio</label>
                    <select id="episode" onchange="updateContent()" class="w-full bg-zinc-900 border border-zinc-800 p-2 rounded-lg text-xs outline-none focus:border-red-600"></select>
                </div>
            </div>

            <div id="servers" class="flex gap-2 overflow-x-auto mb-6 no-scrollbar"></div>
            <hr class="border-zinc-900 mb-6">
            <p id="m-desc" class="text-sm text-zinc-400 leading-relaxed font-medium"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [];
        let currentMode = 'movie';
        let activeId = null;

        async function load() {
            const endpoint = currentMode === 'movie' ? '/populares' : '/series';
            const r = await fetch(`${API_URL}${endpoint}`);
            localData = await r.json();
            draw(localData);
            document.getElementById('loading').style.display = 'none';
        }

        function draw(list) {
            document.getElementById('grid').innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w342${m.poster_path}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/342x513?text=Sin+Imagen'">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'tab-active pb-1 text-[10px] font-black uppercase' : 'text-zinc-500 pb-1 text-[10px] font-black uppercase';
            document.getElementById('btn-tv').className = m === 'tv' ? 'tab-active pb-1 text-[10px] font-black uppercase' : 'text-zinc-500 pb-1 text-[10px] font-black uppercase';
            load();
        }

        async function filterGenre(id) {
            const r = await fetch(`${API_URL}/genero/${id}?type=${currentMode}`);
            localData = await r.json();
            draw(localData);
        }

        async function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id);
            document.getElementById('m-title').innerText = item.title || item.name;
            document.getElementById('m-desc').innerText = item.overview || "Sin descripción disponible.";
            
            if(currentMode === 'tv') {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:15}, (_,i)=>`<option value="${i+1}">Temporada ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:40}, (_,i)=>`<option value="${i+1}">Episodio ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }

            await launchAd();
            updateContent();
            document.getElementById('player-modal').classList.add('active');
        }

        function updateContent() {
            const s = currentMode === 'tv' ? document.getElementById('season').value : 1;
            const e = currentMode === 'tv' ? document.getElementById('episode').value : 1;
            
            // SOLO DEJAMOS EL SERVIDOR PRINCIPAL
            const mainServer = currentMode === 'movie' 
                ? `https://multiembed.mov/directstream.php?video_id=${activeId}&tmdb=1` 
                : `https://multiembed.mov/directstream.php?video_id=${activeId}&tmdb=1&s=${s}&e=${e}`;

            document.getElementById('servers').innerHTML = `
                <button class="px-8 py-3 rounded-xl text-[10px] font-black uppercase bg-red-600 border border-red-600 shadow-lg shadow-red-600/20 whitespace-nowrap">
                    LATINO PRO ACTIVADO
                </button>
                <a href="https://wa.me/5927005167" class="px-8 py-3 rounded-xl text-[10px] font-black uppercase bg-green-600/10 text-green-500 border border-green-600 whitespace-nowrap">
                    REPORTAR ERROR
                </a>
            `;
            
            play(mainServer);
            lucide.createIcons();
        }

        function play(url) {
            document.getElementById('video-container').innerHTML = `
                <div id="v-l" class="flex flex-col items-center justify-center h-full bg-zinc-950 text-center">
                    <div class="animate-spin rounded-full h-6 w-6 border-t-2 border-red-600 mb-3"></div>
                    <p class="text-[10px] font-bold uppercase italic tracking-tighter text-zinc-500">Sincronizando flujo 😘</p>
                </div>
                <iframe src="${url}" class="w-full h-full hidden" frameborder="0" allowfullscreen onload="this.classList.remove('hidden'); document.getElementById('v-l').remove();"></iframe>
            `;
        }

        async function launchAd() {
            return new Promise(async (res) => {
                try {
                    const r = await fetch(`${API_URL}/get-ads`);
                    const d = await r.json();
                    if(d.enabled) {
                        window.open(d.video_ad_start, '_blank');
                        document.getElementById('ad-layer').style.display = 'flex';
                        let t = 5;
                        const it = setInterval(() => {
                            document.getElementById('skip-btn').innerText = `DESBLOQUEANDO EN ${t}S`;
                            t--;
                            if(t < 0) { clearInterval(it); document.getElementById('skip-btn').innerText = "IR AL CONTENIDO"; window.resAd = res; }
                        }, 1000);
                    } else res();
                } catch(e) { res(); }
            });
        }

        function closeAd() { if(window.resAd) { document.getElementById('ad-layer').style.display = 'none'; window.resAd(); } }
        function closePlayer() { document.getElementById('player-modal').classList.remove('active'); document.getElementById('video-container').innerHTML = ""; }

        window.onload = load;
    </script>
</body>
</html>
