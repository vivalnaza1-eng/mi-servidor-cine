<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMaster AI</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            padding: 20px;
            text-align: center;
            background: linear-gradient(to bottom, #e50914, #050505);
        }

        .container {
            padding: 20px;
            width: 90%;
            max-width: 500px;
        }

        .movie-card {
            background: #141414;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #222;
        }

        .movie-info { padding: 15px; }

        .btn-play {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
        }

        /* CAPA DE ANUNCIO (INTERSTITIAL) */
        #ad-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 99999;
        }

        .close-ad-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff0000;
            color: white;
            border: 2px solid #fff;
            padding: 10px 25px;
            font-weight: bold;
            border-radius: 30px;
            z-index: 100000;
        }

        iframe#ad-frame {
            width: 100%;
            height: 100%;
            border: none;
        }

        #video-player-section {
            display: none;
            width: 100%;
            margin-top: 20px;
        }

        iframe#video-frame {
            width: 100%;
            height: 300px;
            border: 1px solid #e50914;
        }
    </style>
</head>
<body>

    <header>
        <h1>CineMaster AI</h1>
    </header>

    <div class="container">
        <div class="movie-card">
            <div class="movie-info">
                <h3>Película Recomendada</h3>
                <p>Haz clic abajo para reproducir el contenido.</p>
                <button class="btn-play" onclick="activarFlujo('https://www.youtube.com/embed/dQw4w9WgXcQ')">▶ REPRODUCIR</button>
            </div>
        </div>

        <div id="video-player-section">
            <h3>Ahora reproduciendo:</h3>
            <iframe id="video-frame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div id="ad-overlay">
        <button class="close-ad-btn" onclick="cerrarAd()">CERRAR ANUNCIO [X]</button>
        <iframe id="ad-frame" src=""></iframe>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        // Aquí debes poner el Direct Link que te dio Adsterra
        const LINK_ADSTERRA = "TU_DIRECT_LINK_DE_ADSTERRA_AQUI"; 
        
        let urlVideoDestino = "";

        function activarFlujo(urlVideo) {
            urlVideoDestino = urlVideo;
            
            // 1. Mostrar la capa de publicidad
            const overlay = document.getElementById('ad-overlay');
            const adFrame = document.getElementById('ad-frame');
            
            adFrame.src = LINK_ADSTERRA;
            overlay.style.display = "block";
        }

        function cerrarAd() {
            // 1. Ocultar publicidad
            document.getElementById('ad-overlay').style.display = "none";
            document.getElementById('ad-frame').src = "";

            // 2. Mostrar y cargar el video
            const videoSection = document.getElementById('video-player-section');
            const videoFrame = document.getElementById('video-frame');

            videoSection.style.display = "block";
            videoFrame.src = urlVideoDestino;

            // Bajar automáticamente al video
            videoSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
