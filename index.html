<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | No Ads</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap');
        
        :root { --gy-red: #ce1126; --gy-gold: #fcd116; --gy-green: #009e49; }

        body { 
            background: #000; color: #fff; font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; overflow-x: hidden; margin: 0;
        }

        /* Nav Glassmorphism Premium */
        nav { background: rgba(0,0,0,0.9); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.08); }

        .poster-card { 
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); 
            aspect-ratio: 2/3; border-radius: 15px; overflow: hidden; 
            background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .poster-card:hover { transform: scale(1.03); border-color: var(--gy-gold); box-shadow: 0 10px 30px rgba(252, 209, 22, 0.2); }

        .modal { 
            display: none; position: fixed; inset: 0; background: #000; 
            z-index: 1000; flex-direction: column; 
        }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .gy-gradient-text {
            background: linear-gradient(90deg, var(--gy-red), var(--gy-gold), var(--gy-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .tab-active { color: var(--gy-gold); border-bottom: 2px solid var(--gy-gold); }

        iframe { border: none; background: #000; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-28 pb-10">

    <nav class="flex items-center justify-between p-5 fixed top-0 w-full z-50">
        <div class="flex flex-col cursor-pointer" onclick="location.reload()">
            <h1 class="text-white font-black text-xl italic uppercase tracking-tighter leading-none">Guyana Digital</h1>
            <div class="flex items-center gap-2">
                <span class="text-[9px] font-bold text-green-500 tracking-[0.2em] uppercase">Cinema Pro</span>
                <span class="text-[8px] text-zinc-600 font-bold uppercase tracking-widest border-l border-zinc-800 pl-2">by José Vival</span>
            </div>
        </div>
        <div class="relative w-1/2 max-w-[400px]">
            <input type="text" id="search" onkeydown="if(event.key==='Enter') searchGlobal()" placeholder="Buscar Dragon Ball, Marvel..." class="w-full bg-white/5 rounded-full py-3 px-11 text-xs border border-white/10 outline-none focus:border-yellow-500 transition-all text-white">
            <i data-lucide="search" onclick="searchGlobal()" class="absolute left-4 top-3 w-4 h-4 text-zinc-500 cursor-pointer hover:text-white"></i>
        </div>
    </nav>

    <div class="flex gap-10 px-8 py-4 sticky top-[85px] z-40 bg-black">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] font-black uppercase tracking-[0.2em]">Películas</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.2em]">Series TV</button>
    </div>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-5 p-5"></main>

    <a href="https://wa.me/5927005167" target="_blank" class="fixed bottom-6 right-6 w-14 h-14 bg-[#25d366] rounded-full flex items-center justify-center z-50 shadow-2xl">
        <i data-lucide="message-circle" class="text-white w-7 h-7"></i>
    </a>

    <div id="player-modal" class="modal overflow-y-auto no-scrollbar">
        <div class="p-4 flex items-center justify-between bg-black border-b border-white/5">
            <button onclick="closePlayer()" class="p-2 hover:bg-white/5 rounded-full transition-colors">
                <i data-lucide="x" class="w-6 h-6 text-zinc-400"></i>
            </button>
            <span class="font-black text-[10px] uppercase tracking-[0.2em] text-zinc-500" id="m-title">Reproduciendo</span>
            <div class="w-10"></div>
        </div>
        
        <div class="w-full aspect-video bg-black">
            <div id="video-container" class="w-full h-full"></div>
        </div>

        <div class="p-6 max-w-5xl mx-auto w-full">
            <div id="series-controls" class="hidden mb-8 grid grid-cols-2 gap-3">
                <select id="season" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-4 rounded-xl text-xs text-white outline-none"></select>
                <select id="episode" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-4 rounded-xl text-xs text-white outline-none"></select>
            </div>

            <div class="mb-8">
                <p class="text-[9px] font-bold text-yellow-500 uppercase tracking-widest mb-3">Servidores Premium (Sin Ads):</p>
                <div id="servers" class="flex gap-3 overflow-x-auto pb-2 no-scrollbar"></div>
            </div>
            
            <div class="bg-zinc-900/50 p-6 rounded-2xl">
                <p id="m-desc" class="text-sm text-zinc-400 leading-relaxed italic border-l-2 border-green-600 pl-4"></p>
            </div>
            
            <footer class="mt-16 text-center pb-10">
                <p class="text-[9px] text-zinc-700 uppercase font-bold tracking-[0.5em] mb-2">Guyana Digital Cinema Pro</p>
                <p class="text-lg font-bold tracking-widest text-white uppercase" style="font-family: 'Syncopate', sans-serif;">by <span class="gy-gradient-text">José Vival</span></p>
            </footer>
        </div>
    </div>

    <script>
        // API KEY de TMDB para búsqueda ilimitada (puedes usar esta o la tuya)
        const TMDB_KEY = "ead4764062402287c2b60882e9b04751"; 
        let currentMode = 'movie';
        let activeId = null;

        // Carga inicial (Contenido popular)
        async function loadInitial() {
            const type = currentMode === 'movie' ? 'movie' : 'tv';
            const r = await fetch(`https://api.themoviedb.org/3/${type}/popular?api_key=${TMDB_KEY}&language=es-MX&page=1`);
            const data = await r.json();
            draw(data.results);
        }

        // BUSCADOR ILIMITADO (Busca en toda la base de datos de TMDB)
        async function searchGlobal() {
            const query = document.getElementById('search').value;
            if(!query) return loadInitial();
            
            const type = currentMode === 'movie' ? 'movie' : 'tv';
            const r = await fetch(`https://api.themoviedb.org/3/search/${type}?api_key=${TMDB_KEY}&query=${query}&language=es-MX`);
            const data = await r.json();
            draw(data.results);
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id}, '${(m.title || m.name).replace(/'/g, "")}', '${(m.overview || "").replace(/'/g, "")}')">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/500x750?text=No+Image'">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'tab-active text-[10px] font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-[10px] font-black uppercase tracking-[0.2em]';
            document.getElementById('btn-tv').className = m === 'tv' ? 'tab-active text-[10px] font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-[10px] font-black uppercase tracking-[0.2em]';
            loadInitial();
        }

        function openPlayer(id, title, desc) {
            activeId = id;
            document.getElementById('m-title').innerText = title.toUpperCase();
            document.getElementById('m-desc').innerText = desc || "Sin descripción disponible.";
            
            if(currentMode === 'tv') {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:30}, (_,i)=>`<option value="${i+1}">Temporada ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:100}, (_,i)=>`<option value="${i+1}">Episodio ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }
            updateContent();
            document.getElementById('player-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function updateContent() {
            const s = currentMode === 'tv' ? document.getElementById('season').value : 1;
            const e = currentMode === 'tv' ? document.getElementById('episode').value : 1;
            
            // Servidores limpios de publicidad agresiva
            const providers = [
                { n: "🚀 SERVER ULTRA (RECOMENDADO)", u: currentMode === 'movie' ? `https://autoembed.to/movie/tmdb/${activeId}` : `https://autoembed.to/tv/tmdb/${activeId}/${s}/${e}` },
                { n: "💎 PREMIUM LINE", u: currentMode === 'movie' ? `https://www.2embed.cc/embed/${activeId}` : `https://www.2embed.cc/embedtv/${activeId}&s=${s}&e=${e}` }
            ];

            document.getElementById('servers').innerHTML = providers.map((pv, i) => `
                <button onclick="play('${pv.u}', this)" class="px-6 py-3 rounded-xl text-[9px] font-black uppercase border transition-all ${i===0?'bg-yellow-600 border-yellow-600 text-black shadow-lg':'bg-zinc-900 border-white/5 text-zinc-500'}">
                    ${pv.n}
                </button>
            `).join('');
            play(providers[0].u);
        }

        function play(url, btn) {
            if(btn) {
                document.querySelectorAll('#servers button').forEach(b => {
                    b.classList.remove('bg-yellow-600', 'text-black');
                    b.classList.add('bg-zinc-900', 'text-zinc-500');
                });
                btn.classList.add('bg-yellow-600', 'text-black');
            }
            // Agregamos sandbox para restringir popups de publicidad
            document.getElementById('video-container').innerHTML = `
                <iframe src="${url}" class="w-full h-full" allowfullscreen 
                sandbox="allow-forms allow-pointer-lock allow-same-origin allow-scripts allow-top-navigation"></iframe>`;
        }

        function closePlayer() { 
            document.getElementById('player-modal').classList.remove('active'); 
            document.getElementById('video-container').innerHTML = ""; 
            document.body.style.overflow = 'auto';
        }

        window.onload = () => { loadInitial(); lucide.createIcons(); };
    </script>
</body>
</html>
