<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nazareth Pro">
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        
        :root { 
            --gy-gold: #fcd116; 
            --gy-red: #ce1126;
            --bg-black: #050505;
            --card-bg: #111111;
        }

        body { 
            background-color: var(--bg-black); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Nav Reforzada contra anuncios */
        nav { 
            background: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 100%);
            backdrop-filter: blur(20px);
            z-index: 10000 !important;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .poster-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            aspect-ratio: 2/3; 
            border-radius: 16px; 
            overflow: hidden; 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.03);
            animation: fadeInUp 0.6s ease-out forwards;
            opacity: 0;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .poster-card:hover { 
            transform: translateY(-10px) scale(1.03); 
            border-color: var(--gy-gold);
            box-shadow: 0 15px 40px rgba(252, 209, 22, 0.2);
        }

        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 20000 !important; /* Por encima de cualquier anuncio */
            flex-direction: column; 
        }
        .modal.active { display: flex; }

        /* Botón Instalar Animado */
        #install-btn {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 15000 !important;
            background: linear-gradient(135deg, var(--gy-red), #ff4d4d);
            color: white;
            padding: 14px 24px;
            border-radius: 100px;
            font-weight: 900;
            font-size: 13px;
            letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(206, 17, 38, 0.5);
            border: none;
            align-items: center;
            gap: 10px;
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(206, 17, 38, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(206, 17, 38, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(206, 17, 38, 0); }
        }

        .tab-active { color: var(--gy-gold); border-bottom: 3px solid var(--gy-gold); font-weight: 900; }

        /* Bloqueador de interacción para el index cuando el modal está activo */
        body.modal-open #grid, body.modal-open nav {
            pointer-events: none;
            filter: blur(5px);
        }
    </style>
</head>
<body class="pt-24">

    <nav class="flex items-center justify-between p-6 fixed top-0 w-full">
        <div class="cursor-pointer" onclick="location.reload()">
            <h1 class="text-white font-black text-2xl italic tracking-tighter leading-none">NAZARETH <span class="text-yellow-400 font-black">PRO</span></h1>
            <span class="text-[9px] font-black text-green-500 tracking-[0.4em] uppercase opacity-80">Guyana Digital Cinema</span>
        </div>
        <div class="relative w-44 md:w-80">
            <input type="text" id="search" oninput="debounceSearch()" placeholder="Search movies, TV shows..." class="w-full bg-white/5 rounded-full py-3 px-12 text-xs border border-white/10 focus:border-yellow-400/50 outline-none text-white transition-all">
            <i data-lucide="search" class="absolute left-4 top-3 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-10 px-10 py-6 sticky top-[80px] z-40 bg-black/50 backdrop-blur-xl border-b border-white/5">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-xs uppercase tracking-[0.2em]">Movies</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-xs uppercase tracking-[0.2em] hover:text-white transition-all">TV Shows</button>
    </div>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 xl:grid-cols-7 gap-6 p-8"></main>

    <div id="player-modal" class="modal overflow-y-auto no-scrollbar">
        <div class="p-6 flex items-center justify-between sticky top-0 bg-black/95 z-[20001]">
            <button onclick="closePlayer()" class="bg-white/10 p-3 rounded-full hover:bg-white/20 transition-all"><i data-lucide="chevron-left"></i></button>
            <span class="font-black text-sm uppercase tracking-widest text-yellow-400" id="m-title">Loading...</span>
            <div class="w-10"></div>
        </div>
        
        <div class="w-full aspect-video bg-black relative shadow-2xl overflow-hidden" id="video-container">
            <button id="close-fullscreen" onclick="exitFull()" class="z-[20002]"><i data-lucide="minimize"></i></button>
            <div id="iframe-slot" class="h-full w-full"></div>
        </div>
        
        <div class="p-10 max-w-5xl mx-auto w-full">
            <div id="series-controls" class="hidden mb-10 grid grid-cols-2 gap-6">
                <select id="season" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-5 rounded-2xl text-sm font-bold text-white outline-none focus:border-yellow-400 transition-all"></select>
                <select id="episode" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-5 rounded-2xl text-sm font-bold text-white outline-none focus:border-yellow-400 transition-all"></select>
            </div>
            
            <div class="mb-10">
                <h2 class="text-zinc-600 text-[10px] font-black uppercase tracking-[0.3em] mb-4">Select Server</h2>
                <div id="servers" class="flex gap-4 overflow-x-auto no-scrollbar"></div>
            </div>
            
            <div class="bg-white/5 p-8 rounded-3xl border border-white/10 backdrop-blur-md">
                <p id="m-desc" class="text-base text-zinc-300 leading-relaxed font-normal mb-6"></p>
                <div class="ad-container border-yellow-400/20">
                    <iframe src="https://mi-servidor-cine.onrender.com/publicidad" style="width:100%; height:120px; border:none;"></iframe>
                </div>
            </div>
        </div>
    </div>

    <button id="install-btn"><i data-lucide="plus-circle"></i> Install Nazareth Pro</button>

    <div id="creator-credits" class="hover:scale-105 transition-transform cursor-default">
        <img src="https://flagcdn.com/w40/gy.png" alt="Guyana" class="rounded-full w-6 h-6 object-cover border border-white/20 shadow-lg">
        <div class="credit-info">
            <span class="role">Directing</span>
            <span class="name text-yellow-400">José & Aaron</span>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        const ADS_URL = "https://www.profitablecpmratenetwork.com/jpp1ah70?key=2362ad52be7ddb0ad6207c0ceb1443af";
        
        let localData = [];
        let currentMode = 'movie';
        let activeId = null;
        let searchTimeout;
        let deferredPrompt;

        async function load() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '<div class="col-span-full text-center py-40 text-zinc-700 animate-pulse font-black text-sm tracking-[0.5em]">PREPARING CINEMA...</div>';
            try {
                const endpoint = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${endpoint}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error("API Error"); }
        }

        async function searchGlobal() {
            const q = document.getElementById('search').value;
            if(q.length < 2) return load();
            try {
                const r = await fetch(`${API_URL}/buscar?q=${encodeURIComponent(q)}&type=${currentMode}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error("Search Error"); }
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(searchGlobal, 500);
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            if(!list.length) { grid.innerHTML = '<div class="col-span-full text-center py-20 text-zinc-500">No content found in Guyana.</div>'; return; }
            grid.innerHTML = list.map((m, i) => `
                <div class="poster-card" style="animation-delay: ${i * 0.03}s" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'tab-active text-xs uppercase tracking-[0.2em]' : 'text-zinc-500 text-xs uppercase tracking-[0.2em] hover:text-white';
            document.getElementById('btn-tv').className = m === 'tv' ? 'tab-active text-xs uppercase tracking-[0.2em]' : 'text-zinc-500 text-xs uppercase tracking-[0.2em] hover:text-white';
            load();
        }

        async function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id);
            if(!item) return;

            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "Join the cinematic experience at Nazareth Pro.";
            
            if(currentMode === 'tv') {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:30}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:60}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }
            updateContent();
            document.getElementById('player-modal').classList.add('active');
            document.body.classList.add('modal-open');
            document.body.style.overflow = 'hidden';
        }

        function updateContent() {
            const s = currentMode === 'tv' ? document.getElementById('season').value : 1;
            const e = currentMode === 'tv' ? document.getElementById('episode').value : 1;
            
            const mirrorUrl = currentMode === 'movie' 
                ? `https://vidsrc.me/embed/movie?tmdb=${activeId}` 
                : `https://vidsrc.me/embed/tv?tmdb=${activeId}&sea=${s}&epi=${e}`;

            document.getElementById('servers').innerHTML = `
                <button onclick="play('${mirrorUrl}')" class="bg-white text-black px-10 py-4 rounded-2xl font-black uppercase text-[11px] shadow-2xl hover:scale-105 active:scale-95 transition-all flex items-center gap-3">
                    <i data-lucide="play-circle" class="w-5 h-5 fill-current text-red-600"></i> Server Premium
                </button>
            `;
            lucide.createIcons();
        }

        function play(url) {
            // Protección contra secuestro de App: Abrimos el anuncio pero forzamos el foco en nuestra app
            const adWindow = window.open(ADS_URL, 'NazarethAds', 'width=300,height=300');
            
            const container = document.getElementById('video-container');
            document.getElementById('iframe-slot').innerHTML = `<iframe src="${url}" allowfullscreen allow="autoplay"></iframe>`;
            
            // Auto-Fullscreen para "atrapar" al usuario en la peli y no en el anuncio
            setTimeout(() => {
                if (container.requestFullscreen) { container.requestFullscreen(); }
                else if (container.webkitRequestFullscreen) { container.webkitRequestFullscreen(); }
            }, 1000);
        }

        function exitFull() {
            if (document.exitFullscreen) { document.exitFullscreen(); }
            else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
        }

        function closePlayer() { 
            document.getElementById('player-modal').classList.remove('active'); 
            document.body.classList.remove('modal-open');
            document.getElementById('iframe-slot').innerHTML = ""; 
            document.body.style.overflow = 'auto';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-btn').style.display = 'flex';
        });

        document.getElementById('install-btn').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('install-btn').style.display = 'none';
            }
        });

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
