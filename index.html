<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineApp | Nazareth Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .movie-card { aspect-ratio: 2/3; cursor: pointer; transition: 0.3s; background: #1e293b; border-radius: 12px; overflow: hidden; }
        .movie-card:active { transform: scale(0.95); }
        #movie-details { position: fixed; inset: 0; background: #0f172a; transform: translateY(100%); transition: 0.4s ease; z-index: 100; overflow-y: auto; }
        #movie-details.open { transform: translateY(0); }
        .loader { border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid #ef4444; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .signature { font-size: 10px; color: rgba(255, 255, 255, 0.4); text-align: right; margin-top: 5px; }
        #ad-layer { display: none; position: fixed; inset: 0; background: black; z-index: 9999; }
    </style>
</head>
<body class="pb-10">

    <div id="ad-layer">
        <button onclick="cerrarAd()" class="fixed top-4 right-4 bg-red-600 px-4 py-2 rounded-full font-bold border-2 border-white z-[10000]">CERRAR ANUNCIO [X]</button>
        <iframe id="ad-frame" class="w-full h-full border-none"></iframe>
    </div>

    <header class="p-4 sticky top-0 bg-[#0f172a] z-50">
        <input type="text" id="search-input" placeholder="Buscar película..." 
            class="w-full bg-slate-800 rounded-xl py-3 px-4 outline-none border border-slate-700 focus:border-red-500">
        <div class="signature">by Nazareth</div>
    </header>

    <main class="p-4">
        <div id="grid-peliculas" class="grid grid-cols-2 md:grid-cols-3 gap-4">
            </div>
    </main>

    <div id="movie-details">
        <div class="relative w-full aspect-video bg-black">
            <button onclick="cerrarDetalles()" class="absolute top-4 right-4 z-[110] bg-black/50 p-2 rounded-full"><i data-lucide="x"></i></button>
            <div id="player-container" class="w-full h-full"></div>
        </div>
        <div class="p-4">
            <h2 id="detail-title" class="text-xl font-bold mb-4">Reproduciendo</h2>
            <div class="flex flex-wrap gap-2" id="server-options"></div>
        </div>
    </div>

    <script>
        // Extraemos la lógica: Usamos los IDs que ya vienen en los posters de tu servidor de Render
        const API_RENDER = "https://mi-servidor-cine.onrender.com";
        let todasLasPelis = [];

        // 1. Cargar tendencias al abrir
        async function cargarTendencias() {
            try {
                const res = await fetch(`${API_RENDER}/populares`);
                const data = await res.json();
                todasLasPelis = data;
                renderizar(data);
            } catch (e) { console.error("Error al cargar populares"); }
        }

        function renderizar(lista) {
            const grid = document.getElementById('grid-peliculas');
            grid.innerHTML = lista.map(p => `
                <div class="movie-card" onclick="abrirPlayer('${p.id}', '${p.title.replace(/'/g, "")}')">
                    <img src="https://image.tmdb.org/t/p/w500${p.poster_path}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black p-3 flex items-end">
                        <span class="text-[10px] font-bold">${p.title}</span>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }

        // 2. Buscador integrado (Ataca la ruta de búsqueda de tu server)
        document.getElementById('search-input').addEventListener('input', async (e) => {
            const q = e.target.value.trim();
            if (q.length < 3) return;
            try {
                const res = await fetch(`${API_RENDER}/buscar?q=${encodeURIComponent(q)}`);
                const data = await res.json();
                renderizar(data);
                // Guardamos en memoria para que el reproductor sepa qué peli es
                todasLasPelis = [...todasLasPelis, ...data];
            } catch (e) { }
        });

        // 3. El Reproductor (Sin pasar por la limpieza de Render para evitar el 404)
        function abrirPlayer(id, titulo) {
            document.getElementById('detail-title').innerText = titulo;
            const servers = [
                { name: "Latino/Esp", url: `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1` },
                { name: "Servidor 2", url: `https://vidsrc.me/embed/movie?tmdb=${id}` },
                { name: "Servidor 3", url: `https://embed.su/embed/movie/${id}` }
            ];

            const serverDiv = document.getElementById('server-options');
            serverDiv.innerHTML = servers.map((s, i) => `
                <button onclick="cambiarServer('${s.url}', this)" class="px-3 py-2 rounded-lg text-[10px] font-bold ${i===0?'bg-red-600':'bg-slate-700'}">
                    ${s.name}
                </button>
            `).join('');

            // Lanzar anuncio antes de reproducir
            lanzarAnuncio();
            cambiarServer(servers[0].url);
            document.getElementById('movie-details').classList.add('open');
        }

        function cambiarServer(url, btn) {
            if(btn) {
                document.querySelectorAll('#server-options button').forEach(b => b.classList.replace('bg-red-600', 'bg-slate-700'));
                btn.classList.replace('bg-slate-700', 'bg-red-600');
            }
            document.getElementById('player-container').innerHTML = `
                <iframe src="${url}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            `;
        }

        async function lanzarAnuncio() {
            try {
                const res = await fetch(`${API_RENDER}/get-ads`);
                const data = await res.json();
                if(data.enabled) {
                    document.getElementById('ad-frame').src = data.video_ad_start;
                    document.getElementById('ad-layer').style.display = 'block';
                }
            } catch (e) { }
        }

        function cerrarAd() {
            document.getElementById('ad-layer').style.display = 'none';
            document.getElementById('ad-frame').src = '';
        }

        function cerrarDetalles() {
            document.getElementById('movie-details').classList.remove('open');
            document.getElementById('player-container').innerHTML = '';
        }

        window.onload = cargarTendencias;
    </script>
</body>
</html>
