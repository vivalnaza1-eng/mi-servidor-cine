<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --accent-cyan: #00f2ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        nav { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        .btn-pulse { animation: pulse-cyan 2s infinite; box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
        @keyframes pulse-cyan {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 242, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }

        /* Estilo para el botón flotante de MMG */
        .btn-mmg { position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; background: white; border-radius: 22px; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); border: 3px solid var(--accent-cyan); transition: 0.3s; }
        .btn-mmg:active { transform: scale(0.9); }

        .poster-card { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); aspect-ratio: 2/3; border-radius: 16px; overflow: hidden; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .poster-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(0, 242, 255, 0.1); border-color: var(--accent-cyan); }
        
        .tab-active { color: var(--accent-cyan) !important; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
        
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; color: white; padding: 12px 24px; border-radius: 99px; transition: 0.5s; z-index: 3000; font-size: 10px; font-weight: 800; border: 1px solid var(--accent-cyan); box-shadow: 0 0 20px rgba(0, 242, 255, 0.2); }
        #toast.show { transform: translateX(-50%) translateY(0); }
        .skeleton { background: linear-gradient(90deg, #0f0f0f 25%, #1a1a1a 50%, #0f0f0f 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pt-48 pb-24">

    <button onclick="openDonation()" class="btn-mmg flex flex-col gap-0.5">
        <img src="mmg.svg" class="w-8 h-8" alt="MMG">
        <span class="text-[8px] font-black text-black uppercase">Donate</span>
    </button>

    <div id="donation-modal" class="modal px-6" onclick="closeDonation()">
        <div class="bg-zinc-900 border border-white/10 p-10 rounded-[40px] text-center max-w-xs w-full shadow-2xl" onclick="event.stopPropagation()">
            <div class="w-20 h-20 bg-white rounded-3xl mx-auto mb-6 flex items-center justify-center">
                <img src="mmg.svg" class="w-14 h-14">
            </div>
            <h3 class="text-white font-black uppercase text-xs tracking-widest mb-3">Support the Project</h3>
            <p class="text-[11px] text-zinc-400 italic mb-8 leading-relaxed">
                "Small acts make a huge difference. Help us keep this cinema alive and free for everyone."
            </p>
            <p class="text-[10px] font-black uppercase tracking-widest text-cyan-500 mb-1">MMG Number</p>
            <h2 class="text-5xl font-black italic tracking-tighter text-white mb-10">7005167</h2>
            <button onclick="closeDonation()" class="w-full py-4 bg-white text-black rounded-2xl font-black text-[10px] uppercase">Close</button>
        </div>
    </div>

    <div class="fixed top-0 w-full z-[100] bg-zinc-950/95 backdrop-blur-md border-b border-white/10 py-3 px-4 text-center">
        <p class="text-[9px] md:text-[10px] font-medium text-zinc-300 italic tracking-wide">
            <span class="text-cyan-400 font-black mr-2 uppercase">STATUS:</span> Guyana Cinema is Online 🎬
        </p>
    </div>

    <nav class="p-5 fixed top-11 w-full z-50 flex flex-col gap-5"> 
        <div class="flex items-center justify-between">
            <div class="flex flex-col">
                <div class="flex items-center gap-3">
                    <img src="mapa-guyana.png" class="w-8 h-8" alt="Logo">
                    <div>
                        <h1 class="font-black text-lg italic tracking-tighter text-white uppercase leading-none">Guyana Digital</h1>
                        <p class="text-[8px] font-bold text-cyan-400 uppercase tracking-[0.15em] mt-1">Essequibo belongs to Guyana</p>
                    </div>
                </div>
            </div>
            <div class="relative max-w-[130px]">
                <input type="text" id="search" oninput="debounceSearch()" placeholder="Search..." class="w-full bg-zinc-900/50 rounded-xl py-2 px-8 text-[10px] outline-none border border-white/5 text-white">
                <i data-lucide="search" class="absolute left-2.5 top-2.5 w-3 h-3 text-zinc-500"></i>
            </div>
        </div>
        <div class="flex gap-6 overflow-x-auto no-scrollbar items-center">
            <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] font-bold uppercase text-zinc-400 whitespace-nowrap">Movies</button>
            <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">TV Series</button>
            <button onclick="changeMode('upcoming')" id="btn-upcoming" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">Upcoming</button>
            <button onclick="changeMode('fav')" id="btn-fav" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">My List</button>
            <button onclick="openUpdates()" class="btn-pulse text-white text-[10px] font-black uppercase flex items-center gap-1 bg-cyan-500 px-4 py-1.5 rounded-full whitespace-nowrap">
                <i data-lucide="sparkles" class="w-3 h-3"></i> Updates
            </button>
        </div>
    </nav>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-6"></main>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        const BOT_TOKEN = "8744010693:AAGsGx90BSJSs1VWW9IhHC40RsKIV24X0lc"; 
        const CHAT_ID = "8026826478";
        
        let localData = [], favorites = JSON.parse(localStorage.getItem('gy_favs')) || [], currentMode = 'movie', activeId = null, selectedServer = 0;

        // FUNCIONES DE DONACIÓN
        function openDonation() { document.getElementById('donation-modal').classList.add('active'); }
        function closeDonation() { document.getElementById('donation-modal').classList.remove('active'); }

        async function load() {
            const grid = document.getElementById('grid');
            grid.innerHTML = Array(8).fill('<div class="poster-card skeleton"></div>').join('');
            if(currentMode === 'fav') return draw(favorites);
            try {
                const ep = currentMode === 'upcoming' ? '/proximamente' : (currentMode === 'movie' ? '/populares' : '/series');
                const r = await fetch(`${API_URL}${ep}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { grid.innerHTML = "<p class='col-span-full text-center py-20 text-zinc-600 text-[10px] uppercase text-zinc-400'>Connection Error</p>"; }
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            if(!list.length) { grid.innerHTML = "<p class='col-span-full text-center py-20 text-zinc-600 text-[10px] uppercase text-zinc-400'>No content found</p>"; return; }
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id}, ${list === favorites})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
        }

        // ... [El resto de tus funciones initPlay, reportError, etc., se mantienen intactas] ...

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
