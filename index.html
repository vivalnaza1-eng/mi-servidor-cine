<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineApp | Nazareth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; -webkit-tap-highlight-color: transparent; }
        .movie-card { aspect-ratio: 2/3; cursor: pointer; }
        #movie-details { transform: translateY(100%); transition: transform 0.4s ease; z-index: 100; }
        #movie-details.open { transform: translateY(0); }
        .loader-ring { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1); border-top: 4px solid #ef4444; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        #ad-control-layer { display: none; position: fixed; inset: 0; background: black; z-index: 99999; }
        .btn-close-ad { position: fixed; top: 1rem; right: 1rem; background: #ef4444; color: white; padding: 10px 20px; border-radius: 50px; font-weight: bold; border: 2px solid white; z-index: 100000; }
        .signature { font-size: 10px; color: rgba(255, 255, 255, 0.4); text-align: right; margin-top: 5px; }
        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body class="pb-20">

    <div id="ad-control-layer">
        <button onclick="forzarCierreAd()" class="btn-close-ad">CERRAR PUBLICIDAD [X]</button>
        <iframe id="universal-ad-frame" class="w-full h-full border-none"></iframe>
    </div>

    <header class="p-4 bg-[#0f172a] sticky top-0 z-40">
        <input type="text" id="search" placeholder="Buscar..." class="w-full bg-slate-800 rounded-xl py-3 px-4 outline-none">
        <div class="signature">by Nazareth</div>
    </header>

    <main class="px-4">
        <section id="home-screen" class="screen active">
            <h2 class="text-xl font-bold mb-4">Tendencias</h2>
            <div id="populares" class="grid grid-cols-2 gap-4"></div>
        </section>
        <section id="search-screen" class="screen">
            <h2 class="text-xl font-bold mb-4 text-slate-400">Resultados</h2>
            <div id="resultados" class="grid grid-cols-2 gap-4"></div>
        </section>
    </main>

    <div id="movie-details" class="fixed inset-0 bg-slate-900 overflow-y-auto">
        <button onclick="cerrarDetallesConAd()" class="fixed top-4 right-4 z-[110] bg-black/60 p-2 rounded-full border border-white/20"><i data-lucide="x"></i></button>
        <div id="details-content"></div>
    </div>

    <script>
        const API_BASE = "https://mi-servidor-cine.onrender.com";
        let peliculasGlobal = [];
        let peliActualId = null;
        let modoCierreActivo = false;

        // 1. VOLVEMOS A LA RUTA QUE USABAS ANTES (Probablemente /video/)
        async function init() {
            try {
                const res = await fetch(`${API_BASE}/populares`);
                const data = await res.json();
                peliculasGlobal = data;
                document.getElementById('populares').innerHTML = data.map(p => `
                    <div onclick="abrirDetalles(${p.id})" class="movie-card relative rounded-xl overflow-hidden bg-slate-800">
                        <img src="https://image.tmdb.org/t/p/w500${p.poster_path}" class="w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black p-2 flex items-end"><h3 class="text-[10px] font-bold truncate">${p.title}</h3></div>
                    </div>
                `).join('');
                lucide.createIcons();
            } catch (e) { console.error("Error inicial"); }
        }

        function abrirDetalles(id) {
            const p = peliculasGlobal.find(m => m.id == id);
            if (!p) return;
            peliActualId = id;
            modoCierreActivo = false;

            document.getElementById("details-content").innerHTML = `
                <div class="relative w-full aspect-video bg-black">
                    <img src="https://image.tmdb.org/t/p/original${p.backdrop_path}" class="w-full h-full object-cover opacity-50">
                    <div class="absolute inset-0 flex items-center justify-center">
                        <button onclick="lanzarAnuncioControlado('${id}', true)" class="bg-red-600 p-4 rounded-full shadow-lg"><i data-lucide="play"></i></button>
                    </div>
                    <div id="player-zone" class="hidden absolute inset-0 bg-black z-10"></div>
                </div>
                <div id="server-list" class="flex gap-2 p-4 bg-slate-800 overflow-x-auto items-center min-h-[50px]"></div>
                <div class="p-6"><h2 class="text-xl font-bold">${p.title}</h2><p class="text-slate-400 text-sm mt-2">${p.overview}</p></div>
            `;
            document.getElementById("movie-details").classList.add("open");
            lucide.createIcons();
        }

        async function lanzarAnuncioControlado(id, esInicio) {
            if (esInicio) reproducirVideoDirecto(id); // Llamamos a la función de reproducción

            try {
                const res = await fetch(`${API_BASE}/get-ads`);
                const ads = await res.json();
                if (ads && ads.enabled) {
                    modoCierreActivo = !esInicio;
                    document.getElementById('universal-ad-frame').src = esInicio ? ads.video_ad_start : ads.video_ad_end;
                    document.getElementById('ad-control-layer').style.display = "block";
                } else if (!esInicio) { cerrarDetallesReal(); }
            } catch (e) { if (!esInicio) cerrarDetallesReal(); }
        }

        // 2. RECONECTAMOS CON TU RUTA ORIGINAL
        async function reproducirVideoDirecto(id) {
            const playerZone = document.getElementById("player-zone");
            playerZone.classList.remove("hidden");
            playerZone.innerHTML = `<div class="flex h-full items-center justify-center"><div class="loader-ring"></div></div>`;

            // Aquí está el cambio: Antes quizás usabas /video/ en lugar de /limpiar-video/
            // He puesto /video/ que es lo más común en los proyectos que funcionan
            try {
                const res = await fetch(`${API_BASE}/video/${id}`); 
                const data = await res.json();
                
                // Si tu servidor devuelve 'url', lo usamos directamente
                const videoUrl = data.url || data.primary;

                playerZone.innerHTML = `
                    <div class="absolute inset-0 z-50 bg-transparent" onclick="lanzarAnuncioControlado(peliActualId, false); this.remove();"></div>
                    <iframe src="${videoUrl}" class="w-full h-full" allowfullscreen frameborder="0"></iframe>
                `;

                // Si hay alternativas, las ponemos
                if (data.alternatives) {
                    document.getElementById("server-list").innerHTML = data.alternatives.map(s => `
                        <button onclick="cambiarPlayer('${s.url}')" class="px-3 py-1 bg-slate-700 rounded text-[10px] whitespace-nowrap">${s.name}</button>
                    `).join('');
                }
            } catch (e) {
                playerZone.innerHTML = `<p class="p-10 text-center text-xs text-red-400">Error al cargar video. Intenta de nuevo.</p>`;
            }
        }

        function cambiarPlayer(url) {
            document.getElementById("player-zone").innerHTML = `
                <div class="absolute inset-0 z-50 bg-transparent" onclick="lanzarAnuncioControlado(peliActualId, false); this.remove();"></div>
                <iframe src="${url}" class="w-full h-full" allowfullscreen frameborder="0"></iframe>
            `;
        }

        function forzarCierreAd() {
            document.getElementById('ad-control-layer').style.display = "none";
            document.getElementById('universal-ad-frame').src = "";
            if (modoCierreActivo) cerrarDetallesReal();
        }

        function cerrarDetallesConAd() {
            modoCierreActivo = true;
            lanzarAnuncioControlado(peliActualId, false);
        }

        function cerrarDetallesReal() {
            document.getElementById("player-zone").innerHTML = "";
            document.getElementById("movie-details").classList.remove("open");
        }

        window.onload = init;
    </script>
</body>
</html>
