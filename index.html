<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nazareth Cinema Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        .poster-card { 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            aspect-ratio: 2/3; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #111;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        
        .poster-card:active { transform: scale(0.92); }
        
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 1000; 
            flex-direction: column; 
        }
        
        .modal.active { display: flex; }

        #ad-layer {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #skip-btn:disabled {
            background: #222;
            color: #555;
            border-color: #333;
            cursor: not-allowed;
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <div id="ad-layer">
        <div class="text-center p-6">
            <div class="inline-block animate-pulse mb-6">
                <i data-lucide="shield-check" class="w-16 h-16 text-red-600"></i>
            </div>
            <h2 class="text-2xl font-black mb-2 uppercase italic">Verificando Acceso</h2>
            <p class="text-zinc-500 text-xs mb-8">Tu anuncio se abrió en una pestaña nueva.<br>Espera para continuar.</p>
            
            <button id="skip-btn" onclick="closeAd()" class="bg-white text-black px-12 py-4 rounded-full font-black shadow-2xl active:scale-95 transition-transform uppercase text-sm tracking-widest border-2 border-transparent">
                Cargando...
            </button>
        </div>
    </div>

    <nav class="flex items-center justify-between p-5 sticky top-0 bg-black/95 backdrop-blur-xl z-50">
        <div onclick="location.reload()" class="cursor-pointer active:scale-95 transition-transform">
            <h1 class="text-red-600 font-black text-2xl tracking-tighter uppercase italic">Nazareth</h1>
            <p class="text-[8px] text-zinc-500 tracking-[0.3em] font-bold uppercase">Digital Cinema</p>
        </div>
        
        <div class="relative w-3/5">
            <input type="text" id="search" placeholder="Buscar película..." 
                class="w-full bg-zinc-900 rounded-full py-2.5 px-10 text-sm outline-none focus:ring-2 focus:ring-red-600 transition-all border border-zinc-800">
            <i data-lucide="search" class="absolute left-3.5 top-3 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div id="loading" class="text-center py-20">
        <div class="inline-block animate-spin rounded-full h-10 w-10 border-t-2 border-red-600 border-r-2 border-transparent"></div>
        <p id="loading-text" class="text-zinc-500 text-xs mt-4 font-bold uppercase tracking-widest">Sincronizando...</p>
    </div>
    
    <main id="grid" class="grid grid-cols-3 gap-3 p-3 opacity-0 transition-opacity duration-500"></main>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-4 flex items-center border-b border-zinc-900 bg-zinc-950/50">
            <button onclick="closePlayer()" class="p-2 bg-zinc-900 rounded-full active:scale-75 transition-transform">
                <i data-lucide="chevron-left"></i>
            </button>
            <span class="font-bold truncate px-5 text-sm uppercase tracking-tight" id="m-title">Cargando...</span>
        </div>
        
        <div class="w-full aspect-video bg-black shadow-2xl">
            <div id="video-container" class="w-full h-full"></div>
        </div>

        <div class="p-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.2em]">Seleccionar Servidor</h3>
                <span class="bg-red-600/10 text-red-500 text-[9px] px-2 py-0.5 rounded font-bold uppercase">ULTRA HD</span>
            </div>
            <div id="servers" class="flex gap-2 overflow-x-auto pb-6"></div>
            <hr class="border-zinc-900 mb-6">
            <h3 class="text-zinc-500 text-[10px] font-black uppercase tracking-[0.2em] mb-3">Sinopsis</h3>
            <p id="m-desc" class="text-sm text-zinc-400 leading-relaxed font-medium"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localMovies = [];

        async function init(retries = 3) {
            const grid = document.getElementById('grid');
            const loading = document.getElementById('loading');
            const lText = document.getElementById('loading-text');

            try {
                const base = API_URL.replace(/\/$/, "");
                const r = await fetch(`${base}/populares`);
                if (!r.ok) throw new Error("Error");
                const data = await r.json();
                if (data && data.length > 0) {
                    localMovies = data;
                    drawMovies(localMovies);
                    grid.classList.replace('opacity-0', 'opacity-100');
                    loading.style.display = 'none';
                }
            } catch (e) { 
                if (retries > 0) {
                    lText.innerText = `Reintentando... (${retries})`;
                    setTimeout(() => init(retries - 1), 3000);
                } else {
                    loading.innerHTML = `<p class='text-red-500 text-[10px] font-bold'>Error de Conexión</p>`;
                }
            }
        }

        function drawMovies(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w342${m.poster_path}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/342x513?text=Sin+Imagen'">
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function openPlayer(id) {
            const movie = localMovies.find(m => m.id == id);
            if (!movie) return;

            document.getElementById('m-title').innerText = movie.title;
            document.getElementById('m-desc').innerText = movie.overview || "Sin descripción disponible.";
            
            // MONETIZACIÓN INFINITA: Siempre lanza el anuncio
            await launchAd();

            const options = [
                { n: "Latino Pro", u: `https://multiembed.mov/directstream.php?video_id=${id}&tmdb=1` },
                { n: "Server VIP", u: `https://embed.su/embed/movie/${id}` }
            ];

            document.getElementById('servers').innerHTML = options.map((s, i) => `
                <button onclick="play('${s.u}', this)" class="px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest border border-zinc-800 whitespace-nowrap transition-all ${i==0?'bg-red-600 border-red-600 shadow-lg shadow-red-600/20':'bg-zinc-900'}">
                    ${s.n}
                </button>
            `).join('');

            play(options[0].u);
            document.getElementById('player-modal').classList.add('active');
        }

        async function launchAd() {
            return new Promise(async (resolve) => {
                try {
                    const res = await fetch(`${API_URL}/get-ads`);
                    const data = await res.json();
                    
                    if(data.enabled && data.video_ad_start) {
                        const adLayer = document.getElementById('ad-layer');
                        const skipBtn = document.getElementById('skip-btn');
                        
                        // Abre tu Direct Link de Adsterra
                        window.open(data.video_ad_start, '_blank');
                        
                        adLayer.style.display = 'flex';

                        let timeLeft = 5;
                        skipBtn.disabled = true;
                        const counter = setInterval(() => {
                            skipBtn.innerText = `DESBLOQUEANDO EN ${timeLeft}s`;
                            timeLeft--;
                            if(timeLeft < 0) {
                                clearInterval(counter);
                                skipBtn.disabled = false;
                                skipBtn.innerText = "IR A LA PELÍCULA";
                                window.currentResolve = resolve;
                            }
                        }, 1000);
                    } else { resolve(); }
                } catch (e) { resolve(); }
            });
        }

        function closeAd() {
            document.getElementById('ad-layer').style.display = 'none';
            if(window.currentResolve) window.currentResolve();
        }

        function play(url, btn) {
            if (btn) {
                document.querySelectorAll('#servers button').forEach(b => b.className = "px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest border border-zinc-800 bg-zinc-900");
                btn.className = "px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest border border-red-600 bg-red-600 shadow-lg shadow-red-600/20";
            }
            document.getElementById('video-container').innerHTML = `<iframe src="${url}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>`;
        }

        function closePlayer() {
            document.getElementById('player-modal').classList.remove('active');
            document.getElementById('video-container').innerHTML = "";
        }

        window.onload = init;
    </script>
</body>
</html>
