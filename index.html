<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        
        :root { 
            --gy-gold: #fcd116; 
            --gy-red: #ce1126; 
            --bg-black: #080808; 
        }

        body { 
            background-color: var(--bg-black); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        nav { 
            background: rgba(8, 8, 8, 0.95); 
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        .poster-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            aspect-ratio: 2/3; 
            border-radius: 12px; 
            overflow: hidden; 
            background: #121212; 
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; 
            position: relative;
        }
        
        .poster-card:hover { 
            transform: scale(1.03); 
            border-color: var(--gy-gold); 
        }

        .skeleton {
            background: linear-gradient(90deg, #121212 25%, #1a1a1a 50%, #121212 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .tab-active { 
            color: white; 
            border-bottom: 3px solid var(--gy-red); 
            font-weight: 800; 
        }
        
        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: var(--bg-black); 
            z-index: 1000; 
            flex-direction: column; 
            animation: slideUp 0.4s ease; 
        }
        
        .modal.active { display: flex; }
        
        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .footer-credit {
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            font-weight: 600;
        }

        /* Efecto de pulso suave al logo */
        .logo-container:active img {
            transform: scale(0.9);
            transition: 0.2s;
        }
    </style>
</head>
<body class="pt-32 pb-10">

    <nav class="p-4 fixed top-0 w-full z-50 flex flex-col gap-4">
        <div class="flex items-center justify-between gap-2">
            
            <div class="logo-container cursor-pointer flex items-center gap-3" onclick="location.reload()">
                <img src="mapa-guyana.png" class="w-10 h-10 object-contain drop-shadow-[0_0_8px_rgba(252,209,22,0.3)]" alt="Guyana Logo">
                
                <div class="flex flex-col">
                    <h1 class="font-black text-lg italic tracking-tighter leading-none">GUYANA DIGITAL</h1>
                    <span class="text-[7px] text-gy-gold font-bold tracking-[2px] uppercase">Cinema Pro</span>
                </div>
            </div>

            <div class="relative flex-1 max-w-[140px] md:max-w-64">
                <input type="text" id="search" oninput="debounceSearch()" placeholder="Search..." class="w-full bg-white/10 rounded-full py-2 px-8 text-[10px] outline-none focus:bg-white/20 transition-all border border-transparent focus:border-white/10">
                <i data-lucide="search" class="absolute left-3 top-2.5 w-3 h-3 text-zinc-500"></i>
            </div>
        </div>
