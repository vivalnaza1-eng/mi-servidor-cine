<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap');
        
        :root {
            --gy-red: #ce1126;
            --gy-gold: #fcd116;
            --gy-green: #009e49;
        }

        body { 
            background: radial-gradient(circle at top right, #1a1a1a 0%, #000 100%); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }

        /* Botón Flotante del Creador (Lobo de Guyana) */
        .creator-badge {
            position: fixed; bottom: 25px; left: 25px; z-index: 100;
            background: rgba(0,0,0,0.9); 
            border: 2px solid transparent;
            background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                              linear-gradient(90deg, var(--gy-red), var(--gy-gold), var(--gy-green));
            background-origin: border-box;
            background-clip: padding-box, border-box;
            padding: 5px 15px 5px 5px; border-radius: 50px; display: flex; align-items: center; gap: 12px;
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer;
            max-width: 54px; white-space: nowrap; overflow: hidden;
        }
        .creator-badge:hover { max-width: 240px; }
        
        /* Contenedor del Lobo */
        .wolf-container {
            width: 40px; height: 40px; min-width: 40px;
            background: linear-gradient(45deg, var(--gy-red), var(--gy-gold));
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            overflow: hidden; border: 1.5px solid rgba(255,255,255,0.2);
            animation: pulse-wolf 2s infinite;
        }
        .wolf-icon { width: 100%; height: 100%; object-fit: cover; }

        @keyframes pulse-wolf {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(252, 209, 22, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(252, 209, 22, 0); }
            100% { transform: scale(1); }
        }

        .poster-card { 
            transition: all 0.4s ease; aspect-ratio: 2/3; border-radius: 20px; 
            overflow: hidden; background: #111; border: 1px solid rgba(255,255,255,0.05);
        }
        .poster-card:hover { transform: scale(1.05); box-shadow: 0 15px 40px rgba(0, 158, 73, 0.3); border-color: var(--gy-green); }

        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.95); backdrop-filter: blur(25px); 
            z-index: 1000; flex-direction: column; 
        }
        .modal.active { display: flex; animation: slideUp 0.4s ease-out; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .gy-gradient-text {
            background: linear-gradient(90deg, var(--gy-red), var(--gy-gold), var(--gy-green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-family: 'Syncopate', sans-serif;
        }

        .tab-active { 
            color: var(--gy-gold); border-bottom: 3px solid var(--gy-gold);
            filter: drop-shadow(0 0 5px var(--gy-gold));
        }

        .floating-support {
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background: #25d366; border-radius: 50%; display: flex; align-items: center; 
            justify-content: center; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pt-24 pb-10">

    <div class="creator-badge group">
        <div class="wolf-container">
            <img src="https://api.dicebear.com/7.x/bottts-neutral/svg?seed=wolf&backgroundColor=fcd116" alt="Wolf" class="wolf-icon">
        </div>
        <div class="flex flex-col opacity-0 group-hover:opacity-100 transition-opacity duration-300">
            <span class="text-[8px] text-zinc-500 font-bold uppercase tracking-tighter">Creator & Developer</span>
            <span class="text-[11px] font-black uppercase text-white">José <span class="text-yellow-400">Vival</span></span>
        </div>
    </div>

    <nav class="flex items-center justify-between p-6 fixed top-0 w-full bg-black/60 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex flex-col" onclick="location.reload()">
            <h1 class="text-white font-black text-xl italic uppercase tracking-tighter leading-none">Guyana Digital</h1>
            <span class="text-[9px] font-bold text-green-500 tracking-[0.2em] uppercase">Cinema Pro</span>
        </div>
        <div class="relative w-1/2">
            <input type="text" id="search" placeholder="Buscar película..." class="w-full bg-white/5 rounded-2xl py-3 px-12 text-xs border border-white/10 outline-none focus:border-green-500 transition-all">
            <i data-lucide="search" class="absolute left-4 top-3.5 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-10 px-8 py-6">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-xs font-black uppercase tracking-[0.2em]">Películas</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-600 text-xs font-black uppercase tracking-[0.2em]">Series TV</button>
    </div>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-4"></main>

    <a href="https://wa.me/5927005167" target="_blank" class="floating-support animate-bounce">
        <i data-lucide="message-circle" class="text-white w-8 h-8"></i>
    </a>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-6 flex items-center justify-between">
            <button onclick="closePlayer()" class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
            <div class="flex flex-col items-center">
                <img src="https://flagcdn.com/gy.svg" class="w-8 h-5 rounded shadow-lg mb-1" alt="Guyana">
                <span class="font-black text-[9px] uppercase tracking-widest text-zinc-500" id="m-title">REPRODUCIENDO</span>
            </div>
            <div class="w-12"></div>
        </div>
        
        <div class="w-full aspect-video bg-black shadow-2xl">
            <div id="video-container" class="w-full h-full"></div>
        </div>

        <div class="p-8 max-w-4xl mx-auto w-full">
            <div id="series-controls" class="hidden mb-10 grid grid-cols-2 gap-6">
                <select id="season" onchange="updateContent()" class="bg-zinc-900/50 border border-white/10 p-5 rounded-3xl text-sm outline-none focus:border-yellow-500 appearance-none"></select>
                <select id="episode" onchange="updateContent()" class="bg-zinc-900/50 border border-white/10 p-5 rounded-3xl text-sm outline-none focus:border-yellow-500 appearance-none"></select>
            </div>

            <div class="mb-10">
                <p class="text-[10px] font-black text-green-500 uppercase tracking-[0.4em] mb-5">Servidores Guyana Digital:</p>
                <div id="servers" class="flex gap-4 overflow-x-auto pb-4 no-scrollbar"></div>
            </div>
            
            <p id="m-desc" class="text-base text-zinc-400 leading-relaxed font-light italic border-l-2 border-red-600 pl-6"></p>
            
            <footer class="mt-20 text-center pb-10">
                <div class="w-20 h-1 bg-gradient-to-r from-red-600 via-yellow-400 to-green-600 mx-auto mb-6"></div>
                <p class="text-[10px] text-zinc-600 uppercase font-black tracking-[0.8em] mb-2">Desarrollador Principal</p>
                <p class="text-2xl font-black italic tracking-tighter gy-gradient-text uppercase">José Vival</p>
            </footer>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [];
        let currentMode = 'movie';
        let activeId = null;

        async function load() {
            try {
                const endpoint = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${endpoint}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error("Error al cargar"); }
        }

        function draw(list) {
            document.getElementById('grid').innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'tab-active text-xs font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-xs font-black uppercase tracking-[0.2em]';
            document.getElementById('btn-tv').className = m === 'tv' ? 'tab-active text-xs font-black uppercase tracking-[0.2em]' : 'text-zinc-600 text-xs font-black uppercase tracking-[0.2em]';
            load();
        }

        async function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id);
            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "Descripción no disponible.";
            
            if(currentMode === 'tv') {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:15}, (_,i)=>`<option value="${i+1}">TEMPORADA ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:50}, (_,i)=>`<option value="${i+1}">EPISODIO
