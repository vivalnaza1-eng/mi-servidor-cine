<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --accent-cyan: #00f2ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        nav { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        .btn-pulse { animation: pulse-cyan 2s infinite; box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
        @keyframes pulse-cyan {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 242, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }

        #install-banner { display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(10, 10, 10, 0.95); border: 1px solid var(--accent-cyan); border-radius: 20px; padding: 15px; z-index: 5000; backdrop-filter: blur(20px); animation: slideUp 0.6s ease; }

        .poster-card { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); aspect-ratio: 2/3; border-radius: 16px; overflow: hidden; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .poster-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--accent-cyan); }
        
        .tab-active { color: var(--accent-cyan) !important; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--accent-cyan); }
        
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; animation: slideUp 0.5s ease; }
        .modal.active { display: flex; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; color: white; padding: 12px 24px; border-radius: 99px; transition: 0.5s; z-index: 3000; font-size: 10px; font-weight: 800; border: 1px solid var(--accent-cyan); }
        #toast.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body class="pt-48 pb-24">

    <div id="install-banner" class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <i data-lucide="download" class="text-cyan-400 w-5 h-5"></i>
            <p class="text-[9px] text-zinc-400 italic">For a better experience, install the App.</p>
        </div>
        <button id="install-button" class="bg-cyan-400 text-black px-4 py-2 rounded-lg text-[9px] font-black uppercase">Install</button>
    </div>

    <div class="fixed top-0 w-full z-[100] bg-zinc-950/95 backdrop-blur-md border-b border-white/10 py-3 px-4 text-center">
        <p class="text-[9px] md:text-[10px] font-medium text-zinc-300 italic tracking-wide">
            <span class="text-cyan-400 font-black mr-2 uppercase">STATUS:</span> Guyana Cinema is Online 🎬
        </p>
    </div>

    <nav class="p-5 fixed top-11 w-full z-50 flex flex-col gap-5"> 
        <div class="flex items-center justify-between">
            <div class="flex flex-col">
                <div class="flex items-center gap-3">
                    <img src="mapa-guyana.png" class="w-8 h-8" alt="Logo">
                    <div>
                        <h1 class="font-black text-lg italic tracking-tighter text-white uppercase leading-none">Guyana Digital</h1>
                        <p class="text-[8px] font-bold text-cyan-400 uppercase tracking-[0.15em] mt-1">Essequibo belongs to Guyana</p>
                    </div>
                </div>
            </div>
            <div class="relative max-w-[130px]">
                <input type="text" id="search" oninput="debounceSearch()" placeholder="Search..." class="w-full bg-zinc-900/50 rounded-xl py-2 px-8 text-[10px] outline-none border border-white/5 text-white">
                <i data-lucide="search" class="absolute left-2.5 top-2.5 w-3 h-3 text-zinc-500"></i>
            </div>
        </div>
        <div class="flex gap-6 overflow-x-auto no-scrollbar items-center">
            <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] font-bold uppercase text-zinc-400 whitespace-nowrap">Movies</button>
            <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">Series</button>
            <button onclick="changeMode('fav')" id="btn-fav" class="text-zinc-500 text-[10px] font-bold uppercase whitespace-nowrap">My List</button>
        </div>
    </nav>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-6"></main>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-5 flex items-center justify-between sticky top-0 bg-black/80 backdrop-blur-xl z-50">
            <button onclick="closePlayer()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full"><i data-lucide="chevron-left"></i></button>
            <span class="font-black text-[10px] uppercase truncate px-4" id="m-title">Loading...</span>
            <button onclick="toggleFavorite()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full"><i data-lucide="heart" id="fav-icon" class="w-4 h-4"></i></button>
        </div>
        <div id="video-area" class="w-full aspect-video bg-black">
            <div id="iframe-slot" class="w-full h-full"></div>
        </div>
        <div class="p-6 max-w-xl mx-auto">
            <div id="series-controls" class="hidden grid grid-cols-2 gap-3 mb-6">
                <select id="season" class="bg-zinc-900 text-white p-3 rounded-xl text-xs outline-none border border-white/5"></select>
                <select id="episode" class="bg-zinc-900 text-white p-3 rounded-xl text-xs outline-none border border-white/5"></select>
            </div>
            <button onclick="initPlay()" class="btn-pulse w-full py-4 rounded-2xl text-xs font-black uppercase bg-cyan-400 text-black mb-8">PLAY NOW</button>
            
            <div class="mt-8 pt-6 border-t border-white/5">
                <p class="text-[9px] font-black text-cyan-500 uppercase mb-3 text-center tracking-widest">Report Issue</p>
                <textarea id="error-msg" placeholder="Describe the problem in English..." class="w-full bg-zinc-900/50 border border-white/5 rounded-xl p-4 text-[11px] text-white outline-none focus:border-cyan-500 h-24 resize-none mb-3"></textarea>
                <button onclick="reportError()" class="w-full py-3 rounded-xl text-[9px] font-bold uppercase bg-zinc-900 text-zinc-400 border border-white/10 hover:border-cyan-500 transition-all">Submit Report</button>
            </div>
            <p id="m-desc" class="text-xs text-zinc-400 leading-relaxed bg-white/5 p-4 rounded-xl mt-6"></p>
        </div>
    </div>

    <div id="toast">REPORT SENT! ✅</div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        const BOT_TOKEN = "8744010693:AAGsGx90BSJSs1VWW9IhHC40RsKIV24X0lc"; 
        const CHAT_ID = "8026826478";
        
        let localData = [], favorites = JSON.parse(localStorage.getItem('gy_favs')) || [], currentMode = 'movie', activeId = null, searchTimer, deferredPrompt;

        // PWA Install Logic
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('install-banner').style.display = 'flex'; });
        document.getElementById('install-button').addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; document.getElementById('install-banner').style.display = 'none'; } });

        // Search Logic
        function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(performGlobalSearch, 500); }
        async function performGlobalSearch() {
            const query = document.getElementById('search').value.trim();
            if(!query) return load();
            try {
                const r = await fetch(`${API_URL}/buscar?q=${query}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error(e); }
        }

        async function load() {
            const grid = document.getElementById('grid');
            if(currentMode === 'fav') return draw(favorites);
            try {
                const ep = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${ep}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { grid.innerHTML = "<p class='col-span-full text-center py-20 text-zinc-600 uppercase'>Connection Error</p>"; }
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
        }

        function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id) || favorites.find(m => m.id == id);
            if(!item) return;

            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "No description available.";
            
            const isTV = (item.name && !item.title) || currentMode === 'tv';
            if(isTV) {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:15}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:30}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }

            document.getElementById('player-modal').classList.add('active');
            updateFavIcon();
            lucide.createIcons();
        }

        function initPlay() {
            const s = document.getElementById('season').value || 1, e = document.getElementById('episode').value || 1;
            const isTV = !document.getElementById('series-controls').classList.contains('hidden');
            const src = `https://vidsrc.xyz/embed/${isTV?'tv':'movie'}?tmdb=${activeId}${isTV?`&season=${s}&episode=${e}`:''}`;
            document.getElementById('iframe-slot').innerHTML = `<iframe src="${src}" allowfullscreen class="w-full h-full border-0"></iframe>`;
        }

        async function reportError() {
            const msg = document.getElementById('error-msg').value;
            if(!msg.trim()) return alert("Describe the issue.");
            const title = document.getElementById('m-title').innerText;
            const text = `🚨 *REPORT* 🚨\n🎬 *Title:* ${title}\n💬 *Issue:* ${msg}`;
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
            document.getElementById('toast').classList.add('show');
            setTimeout(()=> document.getElementById('toast').classList.remove('show'), 3000);
            document.getElementById('error-msg').value = "";
        }

        function closePlayer() { document.getElementById('player-modal').classList.remove('active'); document.getElementById('iframe-slot').innerHTML = ""; }
        
        function toggleFavorite() {
            const item = localData.find(m => m.id == activeId) || favorites.find(m => m.id == activeId);
            const idx = favorites.findIndex(f => f.id == activeId);
            if(idx > -1) favorites.splice(idx, 1); else if(item) favorites.push(item);
            localStorage.setItem('gy_favs', JSON.stringify(favorites));
            updateFavIcon();
        }

        function updateFavIcon() {
            const isFav = favorites.some(f => f.id == activeId);
            const icon = document.getElementById('fav-icon');
            if(icon) { icon.style.fill = isFav ? "#00f2ff" : "none"; icon.style.color = isFav ? "#00f2ff" : "white"; }
        }

        function changeMode(m) {
            currentMode = m;
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active'));
            if(document.getElementById(`btn-${m}`)) document.getElementById(`btn-${m}`).classList.add('tab-active');
            load();
        }

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
