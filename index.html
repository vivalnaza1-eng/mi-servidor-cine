<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Cinema</title>
    <style>
        /* Estilo general */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #111;
            color: #fff;
            transition: background-image 0.5s ease-in-out;
        }

        /* Barra de navegación */
        nav {
            padding: 10px 20px;
            background-color: #000;
        }

        #search-btn {
            color: #fff;
            background-color: transparent;
            border: 1px solid #fff;
            border-radius: 25px;
            padding: 8px 20px;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Estilo para el overlay de búsqueda */
        #search-overlay {
            display: none;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            padding: 20px;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 9999;
        }

        #ultra-search {
            color: #fff;
            background: transparent;
            border: none;
            border-bottom: 2px solid #fff;
            padding: 12px;
            font-size: 1.5rem;
        }

        #search-results {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .poster-card {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
            transition: box-shadow 0.3s ease-in-out;
        }

        .poster-card img {
            max-width: 100%;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .poster-card:hover {
            box-shadow: 0 0 25px rgba(250, 204, 21, 0.4);
        }

        /* Fondo dinámico */
        .content {
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Barra de navegación -->
    <nav>
        <input id="search-btn" onclick="openSearch()" placeholder="Buscar..." class="bg-zinc-900 px-3 py-1 rounded cursor-pointer">
    </nav>

    <!-- Overlay de búsqueda -->
    <div id="search-overlay" class="hidden fixed inset-0 bg-black/90 backdrop-blur-2xl z-[9999] flex flex-col p-6">
        <input id="ultra-search" placeholder="Busca películas, series..." class="w-full text-2xl bg-transparent border-b border-white/20 outline-none p-4 mb-6">
        <div id="search-results" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
    </div>

    <!-- Contenido principal -->
    <div class="content">
        <h1>Bienvenido a Ultra Cinema</h1>
        <div id="poster-list" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-4">
            <!-- Aquí se cargan los posters dinámicamente -->
        </div>
    </div>

    <script>
        // Variables y configuración inicial
        const API = 'https://api.themoviedb.org/3'; // API base (puedes cambiarla)
        const API_KEY = 'tu_api_key';  // Tu clave de API de TMDB

        // Función para abrir el overlay de búsqueda
        function openSearch() {
            document.getElementById('search-overlay').classList.remove('hidden');
            document.getElementById('ultra-search').focus();
        }

        // Función para cerrar el overlay de búsqueda
        function closeSearch() {
            document.getElementById('search-overlay').classList.add('hidden');
        }

        // Cerrar con tecla ESC
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeSearch();
        });

        // Búsqueda en tiempo real
        document.getElementById('ultra-search').addEventListener('input', async (e) => {
            const query = e.target.value;
            if (!query) {
                document.getElementById('search-results').innerHTML = "";
                return;
            }

            const results = await fetch(`${API}/search/multi?api_key=${API_KEY}&query=${query}&language=es`);
            const data = await results.json();
            renderSearch(data.results);
            updateBackground(data.results);
        });

        // Función para renderizar los resultados de búsqueda
        function renderSearch(results) {
            const searchResults = document.getElementById('search-results');
            searchResults.innerHTML = results.slice(0, 12).map((item) => `
                <div class="poster-card" onclick="openFromSearch(${item.id})">
                    <img src="https://image.tmdb.org/t/p/w500${item.poster_path}" alt="${item.title || item.name}">
                    <p class="text-xs mt-1">${item.title || item.name}</p>
                </div>
            `).join('');
        }

        // Actualizar fondo dinámicamente basado en el primer resultado de búsqueda
        function updateBackground(results) {
            if (results[0]?.backdrop_path) {
                document.body.style.backgroundImage = `url(https://image.tmdb.org/t/p/original${results[0].backdrop_path})`;
                document.body.style.backgroundSize = 'cover';
                document.body.style.backgroundAttachment = 'fixed';
            }
        }

        // Función para abrir el player desde los resultados de búsqueda
        function openFromSearch(id) {
            closeSearch();
            openPlayer(id);
        }

        // Función de ejemplo para abrir un reproductor (puedes adaptarla)
        function openPlayer(id) {
            window.location.href = `/player.html?id=${id}`;
        }

        // Obtener posters iniciales de películas populares
        async function getPosters() {
            const res = await fetch(`${API}/movie/popular?api_key=${API_KEY}&language=es`);
            const data = await res.json();
            renderPosters(data.results);
        }

        // Renderizar los posters iniciales
        function renderPosters(movies) {
            const posterList = document.getElementById('poster-list');
            posterList.innerHTML = movies.slice(0, 12).map((movie) => `
                <div class="poster-card">
                    <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}" alt="${movie.title}">
                    <p class="text-xs mt-1">${movie.title}</p>
                </div>
            `).join('');
        }

        // Cargar los posters iniciales al cargar la página
        document.addEventListener('DOMContentLoaded', getPosters);
    </script>

</body>
</html>
