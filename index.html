<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nazareth Cinema | Guyana Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@300;600;900&display=swap');
        
        :root {
            --gy-red: #ce1126;
            --gy-gold: #fcd116;
            --gy-green: #009e49;
        }

        body { 
            background: radial-gradient(circle at top, #111 0%, #000 100%); 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            overflow-x: hidden;
        }

        /* Efecto de Brillo en Posters */
        .poster-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            aspect-ratio: 2/3; 
            border-radius: 16px; 
            overflow: hidden; 
            background: #111; 
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .poster-card:hover { transform: translateY(-8px); border-color: var(--gy-gold); box-shadow: 0 10px 30px rgba(252, 209, 22, 0.2); }
        .poster-card:active { transform: scale(0.92); }

        /* Modal con Glassmorphism */
        .modal { 
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); 
            z-index: 1000; flex-direction: column; 
        }
        .modal.active { display: flex; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: scale(1.1); } to { opacity: 1; transform: scale(1); } }

        /* Botones con los colores de Guyana */
        .tab-active { 
            color: var(--gy-gold); 
            border-bottom: 3px solid var(--gy-gold); 
            text-shadow: 0 0 10px rgba(252, 209, 22, 0.5);
        }

        .gy-gradient-text {
            background: linear-gradient(90deg, var(--gy-red), var(--gy-gold), var(--gy-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-family: 'Syncopate', sans-serif;
        }

        /* Burbuja Flotante Animada */
        .floating-support {
            position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px;
            background: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(37, 211, 102, 0.4); z-index: 100;
            animation: pulse-green 2s infinite;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
        }

        #ad-layer { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-10">

    <div id="ad-layer">
        <div class="text-center p-8 border border-zinc-800 rounded-3xl bg-zinc-900/50 backdrop-blur-xl">
            <div class="relative w-20 h-20 mx-auto mb-6">
                <div class="absolute inset-0 bg-red-600 blur-xl opacity-50 animate-pulse"></div>
                <i data-lucide="shield-check" class="relative w-20 h-20 text-red-600"></i>
            </div>
            <h2 class="text-2xl font-black uppercase tracking-tighter gy-gradient-text">Verifying Access</h2>
            <p class="text-[10px] text-zinc-500 uppercase mt-4 tracking-[0.3em]">Guyana High-Speed Network</p>
            <button id="skip-btn" onclick="closeAd()" class="bg-white text-black px-12 py-4 rounded-2xl font-black mt-8 tracking-widest text-xs uppercase transition-all active:scale-90">Please wait...</button>
        </div>
    </div>

    <nav class="flex items-center justify-between p-6 sticky top-0 bg-black/60 backdrop-blur-xl z-50 border-b border-white/5">
        <div class="flex flex-col" onclick="location.reload()">
            <h1 class="text-white font-black text-2xl italic uppercase tracking-tighter leading-none">Nazareth</h1>
            <span class="text-[8px] font-bold text-green-500 tracking-[0.4em] uppercase">Cinema Pro</span>
        </div>
        <div class="relative w-3/5">
            <input type="text" id="search" placeholder="Search title..." class="w-full bg-zinc-900/80 rounded-2xl py-3 px-12 text-xs border border-white/10 outline-none focus:border-yellow-500 transition-all">
            <i data-lucide="search" class="absolute left-4 top-3.5 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-8 px-6 py-4 sticky top-[85px] bg-black/80 backdrop-blur-md z-40">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[11px] font-black uppercase tracking-widest transition-all">Movies</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-600 text-[11px] font-black uppercase tracking-widest transition-all">TV Series</button>
    </div>

    <main id="grid" class="grid grid-cols-3 gap-3 p-3"></main>

    <a href="https://wa.me/5927005167" target="_blank" class="floating-support">
        <i data-lucide="message-circle" class="text-white w-8 h-8"></i>
    </a>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-5 flex items-center justify-between">
            <button onclick="closePlayer()" class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center backdrop-blur-md"><i data-lucide="x" class="w-5 h-5 text-white"></i></button>
            <div class="flex items-center gap-2">
                <img src="https://flagcdn.com/gy.svg" class="w-6 h-4 rounded-sm shadow-lg" alt="GY">
                <span class="font-black text-[10px] uppercase tracking-tighter text-zinc-300" id="m-title">STREAMING</span>
            </div>
            <div class="w-10"></div>
        </div>
        
        <div class="w-full aspect-video bg-black relative group">
            <div id="video-container" class="w-full h-full shadow-2xl"></div>
        </div>

        <div class="p-8 bg-gradient-to-b from-transparent to-black">
            <div id="series-controls" class="hidden mb-8 grid grid-cols-2 gap-4">
                <div>
                    <label class="text-[9px] text-zinc-500 font-black uppercase mb-2 block tracking-widest">Season</label>
                    <select id="season" onchange="updateContent()" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-2xl text-sm outline-none focus:border-green-500 appearance-none"></select>
                </div>
                <div>
                    <label class="text-[9px] text-zinc-500 font-black uppercase mb-2 block tracking-widest">Episode</label>
                    <select id="episode" onchange="updateContent()" class="w-full bg-zinc-900 border border-white/5 p-4 rounded-2xl text-sm outline-none focus:border-green-500 appearance-none"></select>
                </div>
            </div>

            <div class="mb-8">
                <p class="text-[10px] font-black text-yellow-500 uppercase tracking-[0.3em] mb-4">Choose Guyana Server:</p>
                <div id="servers" class="flex gap-3 overflow-x-auto pb-4 no-scrollbar"></div>
            </div>
            
            <p id="m-desc" class="text-sm text-zinc-400 leading-relaxed font-light italic mb-10"></p>
            
            <footer class="mt-10 text-center py-6 border-t border-white/5">
                <p class="text-[9px] text-zinc-600 uppercase font-black tracking-[0.5em] mb-2">Developed by</p>
                <p class="text-xl font-black italic tracking-tighter gy-gradient-text uppercase">José Vival</p>
            </footer>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [];
        let currentMode = 'movie';
        let activeId = null;

        async function load() {
            try {
                const endpoint = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${endpoint}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error("Network error"); }
        }

        function draw(list) {
            document.getElementById('grid').innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w342${m.poster_path}" class="w-full h-full object-cover">
                </div>
            `).join('');
            lucide.createIcons();
        }

        function changeMode(m) {
            currentMode = m;
            document.getElementById('btn-movie').className = m === 'movie' ? 'tab-active' : 'text-zinc-600 text-[11px] font-black uppercase tracking-widest';
            document.getElementById('btn-tv').className = m === 'tv' ? 'tab-active' : 'text-zinc-600 text-[11px] font-black uppercase tracking-widest';
            load();
        }

        async function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id);
            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "No description provided for this title.";
            
            if(currentMode === 'tv') {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:20}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:60}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }

            await launchAd();
            updateContent();
            document.getElementById('player-modal').classList.add('active');
        }

        function updateContent() {
            const s = currentMode === 'tv' ? document.getElementById('season').value : 1;
            const e = currentMode === 'tv' ? document.getElementById('episode').value : 1;
            
            // New Server List with GYSERVER
            const providers = [
                { n: "⚡ GY-SERVER PRO", u: currentMode === 'movie' ? `https://www.2embed.cc/embed/${activeId}` : `https://www.2embed.cc/embedtv/${activeId}&s=${s}&e=${e}` },
                { n: "🌐 GLOBAL NODE V2", u: currentMode === 'movie' ? `https://moviesapi.club/movie/${activeId}` : `https://moviesapi.club/tv/${activeId}-${s}-${e}` }
            ];

            document.getElementById('servers').innerHTML = providers.map((pv, i) => `
                <button onclick="play('${pv.u}', this)" class="px-8 py-4 rounded-2xl text-[10px] font-black uppercase border transition-all whitespace-nowrap ${i===0?'bg-yellow-500 border-yellow-500 text-black shadow-lg shadow-yellow-500/20':'bg-zinc-900 border-white/5 text-zinc-400'}">
                    ${pv.n}
                </button>
            `).join('');
            
            play(providers[0].u);
        }

        function play(url, btn) {
            if(btn) {
                document.querySelectorAll('#servers button').forEach(b => {
                    b.classList.remove('bg-yellow-500', 'border-yellow-500', 'text-black', 'shadow-lg');
                    b.classList.add('bg-zinc-900', 'border-white/5', 'text-zinc-400');
                });
                btn.classList.replace('bg-zinc-900', 'bg-yellow-500');
                btn.classList.add('text-black', 'shadow-lg');
            }
            document.getElementById('video-container').innerHTML = `
                <div id="v-load" class="flex flex-col items-center justify-center h-full bg-black">
                    <div class="w-12 h-12 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="mt-4 text-[10px] font-black uppercase text-yellow-500 tracking-[0.3em]">Connecting to GYSERVER...</p>
                </div>
                <iframe src="${url}" class="w-full h-full hidden" frameborder="0" allowfullscreen onload="this.classList.remove('hidden'); document.getElementById('v-load').remove();"></iframe>
            `;
        }

        async function launchAd() {
            return new Promise(async (res) => {
                try {
                    const r = await fetch(`${API_URL}/get-ads`);
                    const d = await r.json();
                    if(d.enabled) {
                        window.open(d.video_ad_start, '_blank');
                        document.getElementById('ad-layer').style.display = 'flex';
                        let t = 4;
                        const it = setInterval(() => {
                            document.getElementById('skip-btn').innerText = `ACCESS IN ${t}S`;
                            t--;
                            if(t < 0) { clearInterval(it); document.getElementById('skip-btn').innerText = "STREAM NOW"; window.resAd = res; }
                        }, 1000);
                    } else res();
                } catch(e) { res(); }
            });
        }

        function closeAd() { if(window.resAd) { document.getElementById('ad-layer').style.display = 'none'; window.resAd(); } }
        function closePlayer() { document.getElementById('player-modal').classList.remove('active'); document.getElementById('video-container').innerHTML = ""; }

        window.onload = load;
    </script>
</body>
</html>
