<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        :root { --accent-cyan: #00f2ff; --bg-dark: #050505; }
        body { background-color: var(--bg-dark); color: white; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        nav { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        .btn-pulse { animation: pulse-cyan 2s infinite; box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
        @keyframes pulse-cyan {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(0, 242, 255, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 242, 255, 0); }
        }

        .btn-mmg { position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; background: white; border-radius: 22px; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); border: 3px solid var(--accent-cyan); transition: 0.3s; }
        
        /* Banner de instalación */
        #install-banner { display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(10, 10, 10, 0.95); border: 1px solid var(--accent-cyan); border-radius: 20px; padding: 15px; z-index: 5000; backdrop-filter: blur(20px); animation: slideUp 0.6s ease; }

        .poster-card { transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); aspect-ratio: 2/3; border-radius: 16px; overflow: hidden; background: #0f0f0f; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .poster-card:hover { transform: translateY(-10px) scale(1.02); border-color: var(--accent-cyan); }
        
        .tab-active { color: var(--accent-cyan) !important; position: relative; }
        .tab-active::after { content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px; background: var(--accent-cyan); }
        
        .modal { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; flex-direction: column; animation: slideUp 0.5s ease; }
        .modal.active { display: flex; }
        
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #111; color: white; padding: 12px 24px; border-radius: 99px; transition: 0.5s; z-index: 3000; font-size: 10px; border: 1px solid var(--accent-cyan); }
        #toast.show { transform: translateX(-50%) translateY(0); }
        .skeleton { background: linear-gradient(90deg, #0f0f0f 25%, #1a1a1a 50%, #0f0f0f 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="pt-48 pb-24">

    <div id="install-banner" class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            <i data-lucide="download" class="text-cyan-400 w-5 h-5"></i>
            <p class="text-[9px] text-zinc-400 italic">For a better experience, install the App.</p>
        </div>
        <button id="install-button" class="bg-cyan-400 text-black px-4 py-2 rounded-lg text-[9px] font-black uppercase">Install</button>
    </div>

    <button onclick="openDonation()" class="btn-mmg flex flex-col gap-0.5">
        <img src="mmg.svg" class="w-8 h-8" alt="MMG">
        <span class="text-[8px] font-black text-black uppercase">Donate</span>
    </button>

    <nav class="p-5 fixed top-11 w-full z-50 flex flex-col gap-5"> 
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="mapa-guyana.png" class="w-8 h-8">
                <h1 class="font-black text-lg italic uppercase text-white">Guyana Digital</h1>
            </div>
            <div class="relative max-w-[130px]">
                <input type="text" id="search" oninput="debounceSearch()" placeholder="Search..." class="w-full bg-zinc-900 rounded-xl py-2 px-8 text-[10px] text-white">
                <i data-lucide="search" class="absolute left-2.5 top-2.5 w-3 h-3 text-zinc-500"></i>
            </div>
        </div>
        <div class="flex gap-6 overflow-x-auto no-scrollbar">
            <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] font-bold uppercase">Movies</button>
            <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-[10px] font-bold uppercase">Series</button>
            <button onclick="changeMode('fav')" id="btn-fav" class="text-zinc-500 text-[10px] font-bold uppercase">My List</button>
        </div>
    </nav>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-6"></main>

    <div id="player-modal" class="modal overflow-y-auto">
        <div class="p-5 flex items-center justify-between sticky top-0 bg-black/80 backdrop-blur-xl z-50">
            <button onclick="closePlayer()" class="w-10 h-10 flex items-center justify-center bg-zinc-900 rounded-full"><i data-lucide="chevron-left"></i></button>
            <span class="font-black text-[10px] uppercase truncate px-4" id="m-title">Loading...</span>
            <div class="w-10"></div>
        </div>
        <div id="video-area" class="w-full aspect-video bg-black">
            <div id="iframe-slot" class="w-full h-full"></div>
        </div>
        <div class="p-6 max-w-xl mx-auto">
            <div id="series-controls" class="hidden grid grid-cols-2 gap-3 mb-6">
                <select id="season" class="bg-zinc-900 text-white p-3 rounded-xl text-xs"></select>
                <select id="episode" class="bg-zinc-900 text-white p-3 rounded-xl text-xs"></select>
            </div>
            <button onclick="initPlay()" class="btn-pulse w-full py-4 rounded-2xl text-xs font-black uppercase bg-cyan-400 text-black mb-8">PLAY NOW</button>
            <p id="m-desc" class="text-xs text-zinc-400 leading-relaxed bg-white/5 p-4 rounded-xl"></p>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        let localData = [], favorites = JSON.parse(localStorage.getItem('gy_favs')) || [], currentMode = 'movie', activeId = null, searchTimer, deferredPrompt;

        // PWA Install
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('install-banner').style.display = 'flex'; });
        document.getElementById('install-button').addEventListener('click', async () => { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; document.getElementById('install-banner').style.display = 'none'; } });

        // Search Logic
        function debounceSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(performGlobalSearch, 500); }
        async function performGlobalSearch() {
            const query = document.getElementById('search').value.trim();
            if(!query) return load();
            try {
                const r = await fetch(`${API_URL}/buscar?q=${query}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error(e); }
        }

        async function load() {
            if(currentMode === 'fav') return draw(favorites);
            try {
                const ep = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${ep}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { console.error(e); }
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            grid.innerHTML = list.map(m => `
                <div class="poster-card" onclick="openPlayer(${m.id})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover">
                </div>
            `).join('');
        }

        function openPlayer(id) {
            activeId = id;
            const item = localData.find(m => m.id == id) || favorites.find(m => m.id == id);
            if(!item) return;

            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "No description available.";
            
            const isTV = (item.name && !item.title) || currentMode === 'tv';
            if(isTV) {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:10}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:24}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }

            document.getElementById('player-modal').classList.add('active');
            lucide.createIcons();
        }

        function initPlay() {
            const s = document.getElementById('season').value || 1, e = document.getElementById('episode').value || 1;
            const isTV = !document.getElementById('series-controls').classList.contains('hidden');
            const src = `https://vidsrc.xyz/embed/${isTV?'tv':'movie'}?tmdb=${activeId}${isTV?`&season=${s}&episode=${e}`:''}`;
            document.getElementById('iframe-slot').innerHTML = `<iframe src="${src}" allowfullscreen class="w-full h-full border-0"></iframe>`;
        }

        function closePlayer() { document.getElementById('player-modal').classList.remove('active'); document.getElementById('iframe-slot').innerHTML = ""; }
        function changeMode(m) { currentMode = m; load(); }

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
