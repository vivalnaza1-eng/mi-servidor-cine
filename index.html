<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GD Cinema">
    <link rel="apple-touch-icon" href="GYlogo.png">

    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root { 
            --accent-cyan: #00f2ff; 
            --bg-dark: #050505; 
            --card-bg: #0f0f0f;
        }

        body { 
            background-color: var(--bg-dark); 
            color: white; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        nav { 
            background: rgba(5, 5, 5, 0.8); 
            backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(255,255,255,0.03); 
        }

        .poster-card { 
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1); 
            aspect-ratio: 2/3; 
            border-radius: 16px; 
            overflow: hidden; 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; 
        }
        
        .poster-card:hover { 
            transform: translateY(-10px) scale(1.02); 
            box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 20px rgba(0, 242, 255, 0.1);
            border-color: var(--accent-cyan); 
        }

        .skeleton {
            background: linear-gradient(90deg, #0f0f0f 25%, #1a1a1a 50%, #0f0f0f 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .tab-active { color: var(--accent-cyan) !important; position: relative; }
        .tab-active::after {
            content: ''; position: absolute; bottom: -8px; left: 0; width: 100%; height: 2px;
            background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan);
        }
        
        .floating-donation {
            position: fixed; bottom: 25px; right: 25px; background: white; color: black;
            padding: 12px 20px; border-radius: 50px; display: flex; align-items: center;
            gap: 12px; box-shadow: 0 10px 30px rgba(255,255,255,0.1); z-index: 999;
            text-decoration: none; animation: pulse-glow 2s infinite;
        }

        @keyframes pulse-glow {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255, 0.4); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255,255,255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,255,255, 0);
