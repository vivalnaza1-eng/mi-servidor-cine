<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Guyana Digital Cinema | Nazareth Pro</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nazareth Pro">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/2503/2503508.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        
        :root { 
            --gy-gold: #fcd116; 
            --gy-red: #ce1126;
            --bg-black: #080808;
            --card-bg: #121212;
        }

        body { 
            background-color: var(--bg-black); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        nav { 
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .poster-card { 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            aspect-ratio: 2/3; 
            border-radius: 12px; 
            overflow: hidden; 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            position: relative;
        }

        .poster-card:hover { 
            transform: scale(1.03) translateY(-5px); 
            border-color: var(--gy-gold);
        }

        .skeleton {
            background: linear-gradient(90deg, #121212 25%, #1a1a1a 50%, #121212 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .modal { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: var(--bg-black); 
            z-index: 1000; 
            flex-direction: column; 
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal.active { display: flex; }

        #iframe-slot { position: relative; width: 100%; height: 100%; background: black; }
        #iframe-slot iframe { width: 100%; height: 100%; border: none; }

        .tab-active { color: white; border-bottom: 3px solid var(--gy-red); font-weight: 800; }

        .btn-server {
            background: #1a1a1a;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: bold;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
        }
        .btn-server.active {
            background: white;
            color: black;
            border-color: white;
        }
    </style>
</head>
<body class="pt-24">

    <nav class="flex items-center justify-between p-6 fixed top-0 w-full z-50">
        <div class="cursor-pointer" onclick="location.reload()">
            <h1 class="text-white font-black text-2xl italic tracking-tighter leading-none">GUYANA DIGITAL</h1>
            <span class="text-[10px] font-bold text-green-500 tracking-[0.3em] uppercase">Nazareth Cinema Pro</span>
        </div>
        <div class="relative w-44 md:w-64">
            <input type="text" id="search" oninput="debounceSearch()" placeholder="Search..." class="w-full bg-white/10 rounded-md py-2 px-10 text-xs outline-none text-white border border-transparent focus:border-white/20">
            <i data-lucide="search" class="absolute left-3 top-2.5 w-4 h-4 text-zinc-500"></i>
        </div>
    </nav>

    <div class="flex gap-6 px-8 py-4 sticky top-[80px] z-40 bg-black/80 backdrop-blur-md overflow-x-auto no-scrollbar">
        <button onclick="changeMode('movie')" id="btn-movie" class="tab-active text-[10px] uppercase tracking-widest whitespace-nowrap">Movies</button>
        <button onclick="changeMode('tv')" id="btn-tv" class="text-zinc-500 text-[10px] uppercase tracking-widest hover:text-white transition-colors whitespace-nowrap">TV Shows</button>
        <button onclick="changeMode('fav')" id="btn-fav" class="text-zinc-500 text-[10px] uppercase tracking-widest hover:text-white transition-colors whitespace-nowrap flex items-center gap-2">
            <i data-lucide="heart" class="w-3 h-3"></i> My List
        </button>
    </div>

    <main id="grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4 p-6"></main>

    <div id="player-modal" class="modal overflow-y-auto no-scrollbar">
        <div class="p-4 flex items-center justify-between sticky top-0 bg-black/90 z-50 border-b border-white/10">
            <button onclick="closePlayer()" class="p-2 hover:bg-white/10 rounded-full"><i data-lucide="arrow-left"></i></button>
            <span class="font-bold text-[10px] uppercase tracking-widest truncate max-w-[200px]" id="m-title">Loading...</span>
            <button id="fav-toggle-btn" class="p-2 rounded-full"><i data-lucide="heart" id="fav-icon"></i></button>
        </div>
        
        <div class="w-full aspect-video bg-black relative" id="video-container">
            <div id="iframe-slot"></div>
        </div>
        
        <div class="p-6 max-w-4xl mx-auto w-full">
            <div id="series-controls" class="hidden mb-6 grid grid-cols-2 gap-4">
                <select id="season" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-3 rounded-lg text-xs text-white outline-none"></select>
                <select id="episode" onchange="updateContent()" class="bg-zinc-900 border border-white/10 p-3 rounded-lg text-xs text-white outline-none"></select>
            </div>
            
            <div class="mb-6">
                <h2 class="text-zinc-500 text-[9px] font-black uppercase tracking-[0.2em] mb-3">Select Server</h2>
                <div class="flex gap-2" id="server-list">
                    <button onclick="setServer(0)" class="btn-server active" id="srv-0">Server 1</button>
                    <button onclick="setServer(1)" class="btn-server" id="srv-1">Server 2</button>
                    <button onclick="setServer(2)" class="btn-server" id="srv-2">Server 3</button>
                </div>
            </div>

            <button onclick="initPlay()" class="w-full py-4 rounded-xl text-xs font-black uppercase bg-white text-black flex items-center justify-center gap-3 mb-6 shadow-xl active:scale-95 transition-transform">
                <i data-lucide="play" class="w-4 h-4 fill-current"></i> Play Now
            </button>
            
            <div class="bg-zinc-900/40 p-5 rounded-xl border border-white/5">
                <p id="m-desc" class="text-xs text-zinc-400 leading-relaxed font-light"></p>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://mi-servidor-cine.onrender.com";
        const ADS_URL = "https://www.profitablecpmratenetwork.com/jpp1ah70?key=2362ad52be7ddb0ad6207c0ceb1443af";
        
        let localData = [];
        let favorites = JSON.parse(localStorage.getItem('gy_favs')) || [];
        let currentMode = 'movie';
        let activeId = null;
        let selectedServer = 0;
        let searchTimeout;

        AOS.init({ duration: 600, once: true });

        async function load() {
            const grid = document.getElementById('grid');
            if(currentMode === 'fav') {
                draw(favorites);
                return;
            }

            grid.innerHTML = Array(12).fill(0).map(() => `<div class="poster-card skeleton"></div>`).join('');
            try {
                const endpoint = currentMode === 'movie' ? '/populares' : '/series';
                const r = await fetch(`${API_URL}${endpoint}`);
                localData = await r.json();
                draw(localData);
            } catch (e) { grid.innerHTML = "Error loading content."; }
        }

        function draw(list) {
            const grid = document.getElementById('grid');
            if(!list.length) { grid.innerHTML = `<div class="col-span-full text-center py-20 text-zinc-500 text-xs uppercase">No items found</div>`; return; }
            
            grid.innerHTML = list.map((m, i) => `
                <div class="poster-card" data-aos="fade-up" data-aos-delay="${(i % 6) * 50}" onclick="openPlayer(${m.id}, ${list === favorites})">
                    <img src="https://image.tmdb.org/t/p/w500${m.poster_path}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function openPlayer(id, fromFavs = false) {
            if (navigator.vibrate) navigator.vibrate(30);
            activeId = id;
            const item = fromFavs ? favorites.find(m => m.id == id) : localData.find(m => m.id == id);
            if(!item) return;

            document.getElementById('m-title').innerText = (item.title || item.name).toUpperCase();
            document.getElementById('m-desc').innerText = item.overview || "No description.";
            
            // Lógica de Favoritos
            const isFav = favorites.some(f => f.id == id);
            document.getElementById('fav-icon').style.fill = isFav ? "#ce1126" : "none";
            document.getElementById('fav-icon').style.color = isFav ? "#ce1126" : "currentColor";
            document.getElementById('fav-toggle-btn').onclick = () => toggleFavorite(item);

            if(currentMode === 'tv' || item.name) {
                document.getElementById('series-controls').classList.remove('hidden');
                document.getElementById('season').innerHTML = Array.from({length:10}, (_,i)=>`<option value="${i+1}">Season ${i+1}</option>`).join('');
                document.getElementById('episode').innerHTML = Array.from({length:30}, (_,i)=>`<option value="${i+1}">Episode ${i+1}</option>`).join('');
            } else {
                document.getElementById('series-controls').classList.add('hidden');
            }

            document.getElementById('player-modal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function toggleFavorite(item) {
            const index = favorites.findIndex(f => f.id == item.id);
            if(index > -1) favorites.splice(index, 1);
            else favorites.push(item);
            localStorage.setItem('gy_favs', JSON.stringify(favorites));
            openPlayer(item.id); // Refresh modal icon
        }

        function setServer(idx) {
            selectedServer = idx;
            document.querySelectorAll('.btn-server').forEach((b, i) => {
                b.className = i === idx ? 'btn-server active' : 'btn-server';
            });
        }

        function initPlay() {
            const s = document.getElementById('season').value || 1;
            const e = document.getElementById('episode').value || 1;
            const isTV = !document.getElementById('series-controls').classList.contains('hidden');
            
            const servers = [
                isTV ? `https://vidsrc.me/embed/tv?tmdb=${activeId}&sea=${s}&epi=${e}` : `https://vidsrc.me/embed/movie?tmdb=${activeId}`,
                isTV ? `https://vidsrc.to/embed/tv/${activeId}/${s}/${e}` : `https://vidsrc.to/embed/movie/${activeId}`,
                isTV ? `https://embed.su/embed/tv/${activeId}/${s}/${e}` : `https://embed.su/embed/movie/${activeId}`
            ];

            // Abrir anuncio
            const ad = document.createElement('a');
            ad.href = ADS_URL; ad.target = "_blank"; ad.click();

            const container = document.getElementById('video-container');
            document.getElementById('iframe-slot').innerHTML = `<iframe src="${servers[selectedServer]}" allowfullscreen allow="autoplay"></iframe>`;
            
            setTimeout(() => {
                if (container.requestFullscreen) container.requestFullscreen();
                else if (container.webkitRequestFullscreen) container.webkitRequestFullscreen();
            }, 400);
        }

        function changeMode(m) {
            currentMode = m;
            ['movie', 'tv', 'fav'].forEach(mode => {
                document.getElementById(`btn-${mode}`).className = m === mode ? 'tab-active text-[10px] uppercase tracking-widest' : 'text-zinc-500 text-[10px] uppercase tracking-widest hover:text-white';
            });
            load();
        }

        function closePlayer() { 
            document.getElementById('player-modal').classList.remove('active'); 
            document.getElementById('iframe-slot').innerHTML = ""; 
            document.body.style.overflow = 'auto';
            if(currentMode === 'fav') load(); // Refresh list if removing from favs
        }

        async function searchGlobal() {
            const q = document.getElementById('search').value;
            if(q.length < 2) return load();
            const r = await fetch(`${API_URL}/buscar?q=${encodeURIComponent(q)}&type=${currentMode === 'fav' ? 'movie' : currentMode}`);
            localData = await r.json();
            draw(localData);
        }

        function debounceSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(searchGlobal, 500);
        }

        window.onload = () => { load(); lucide.createIcons(); };
    </script>
</body>
</html>
