<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineApp Master | Streaming AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: white;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #movie-details {
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #movie-details.open { transform: translateY(0); }

        .glass-nav {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .movie-card {
            aspect-ratio: 2/3;
            transition: all 0.2s;
            cursor: pointer;
        }
        .movie-card:active { transform: scale(0.95); }

        .loader-ring {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(239, 68, 68, 0.1);
            border-top: 4px solid #ef4444;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .server-btn {
            background: rgba(30, 41, 59, 0.8);
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
            white-space: nowrap;
        }
        .server-btn.active {
            background: #ef4444;
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        #ad-control-layer {
            display: none;
            position: fixed;
            inset: 0;
            background: black;
            z-index: 999999;
        }

        .btn-close-global {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: #ef4444;
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            font-weight: 800;
            border: 2px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 1000000;
        }

        .video-shield-v2 {
            position: absolute;
            inset: 0;
            z-index: 40;
            background: rgba(0,0,0,0.01);
        }
    </style>
</head>
<body class="pb-20">

    <div id="ad-control-layer">
        <button onclick="forzarCierreAd()" class="btn-close-global">
            CERRAR PUBLICIDAD [X]
        </button>
        <iframe id="universal-ad-frame" class="w-full h-full border-none"></iframe>
    </div>

    <header class="p-4 sticky top-0 z-40 bg-[#0f172a]">
        <div class="relative">
            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-5"></i>
            <input type="text" id="search" placeholder="Busca una peli..." class="w-full bg-slate-800 border-none rounded-2xl py-3 pl-10 pr-4 focus:ring-2 focus:ring-red-500 outline-none text-sm text-white">
        </div>
    </header>

    <main id="app-content" class="px-4">
        <section id="home" class="screen active">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="sparkles" class="text-yellow-500 w-5"></i> Tendencias</h2>
            <div id="populares" class="grid grid-cols-2 gap-4"></div>
        </section>
        <section id="search-results" class="screen">
            <h2 class="text-xl font-bold mb-4 text-slate-400">Resultados</h2>
            <div id="resultados" class="grid grid-cols-2 gap-4"></div>
        </section>
        <section id="favs" class="screen">
            <h2 class="text-xl font-bold mb-4 flex items-center gap-2"><i data-lucide="heart" class="text-red-500 w-5"></i> Guardadas</h2>
            <div id="favoritos" class="grid grid-cols-2 gap-4"><div class="col-span-full py-20 text-center opacity-50 text-sm">Próximamente</div></div>
        </section>
    </main>

    <div id="movie-details" class="fixed inset-0 z-[60] bg-slate-900 overflow-y-auto">
        <button onclick="cerrarDetalles()" class="fixed top-4 right-4 z-[100] bg-black/50 p-2 rounded-full backdrop-blur-md border border-white/10"><i data-lucide="x" class="w-6 h-6"></i></button>
        <div id="details-content"></div>
    </div>

    <nav class="glass-nav fixed bottom-0 left-0 right-0 px-8 py-3 flex justify-between items-center z-50">
        <button onclick="cambiarPantalla('home', this)" class="nav-btn flex flex-col items-center gap-1 text-red-500"><i data-lucide="home" class="w-6 h-6"></i><span class="text-[10px] font-bold">Inicio</span></button>
        <button onclick="cambiarPantalla('search-results', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400"><i data-lucide="compass" class="w-6 h-6"></i><span class="text-[10px] font-bold">Explorar</span></button>
        <button onclick="cambiarPantalla('favs', this)" class="nav-btn flex flex-col items-center gap-1 text-slate-400"><i data-lucide="heart" class="w-6 h-6"></i><span class="text-[10px] font-bold">Favoritos</span></button>
    </nav>

    <script>
        let peliculasGlobal = [];
        let searchTimeout = null;
        let peliActualId = null;
        let modoCierreActivo = false; // Nueva bandera para controlar el flujo de cierre
        const API_BASE = "https://mi-servidor-cine.onrender.com"; 

        lucide.createIcons();

        function cambiarPantalla(id, btn) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.getElementById(id).classList.add("active");
            document.querySelectorAll(".nav-btn").forEach(b => b.classList.replace("text-red-500", "text-slate-400"));
            btn.classList.replace("text-slate-400", "text-red-500");
        }

        async function api(endpoint) {
            try {
                const res = await fetch(`${API_BASE}${endpoint}`);
                return await res.json();
            } catch (e) { return null; }
        }

        function pintar(lista, contenedorId) {
            const cont = document.getElementById(contenedorId);
            if (!cont || !lista) return;
            cont.innerHTML = lista.map(p => `
                <div onclick="abrirDetalles(${p.id})" class="movie-card relative rounded-2xl overflow-hidden bg-slate-800">
                    <img src="https://image.tmdb.org/t/p/w500${p.poster_path}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-gradient-to-t from-black p-3 flex flex-col justify-end">
                        <p class="text-[10px] text-yellow-400 font-bold">⭐ ${p.vote_average.toFixed(1)}</p>
                        <h3 class="text-xs font-bold truncate">${p.title}</h3>
                    </div>
                </div>
            `).join('');
            peliculasGlobal = [...new Map([...peliculasGlobal, ...lista].map(m => [m.id, m])).values()];
        }

        function abrirDetalles(id) {
            const p = peliculasGlobal.find(m => m.id === id);
            if (!p) return;
            peliActualId = id;
            modoCierreActivo = false;

            document.getElementById("details-content").innerHTML = `
                <div class="relative w-full aspect-video bg-black">
                    <img src="https://image.tmdb.org/t/p/original${p.backdrop_path}" class="w-full h-full object-cover opacity-60">
                    <div id="play-overlay" class="absolute inset-0 flex items-center justify-center">
                        <button onclick="lanzarAnuncioControlado('${id}', true)" class="bg-red-600 p-5 rounded-full scale-125 shadow-xl">
                            <i data-lucide="play" class="fill-current w-6 h-6"></i>
                        </button>
                    </div>
                    <div id="video-player-container" class="hidden absolute inset-0 bg-black flex flex-col items-center justify-center z-10"></div>
                </div>
                <div id="server-selector" class="hidden flex gap-2 p-4 bg-slate-800 overflow-x-auto sticky top-0 z-50"></div>
                <div class="p-6">
                    <h2 class="text-2xl font-bold">${p.title}</h2>
                    <p class="text-slate-400 text-sm mt-4">${p.overview || 'Sin descripción.'}</p>
                </div>
            `;
            document.getElementById("movie-details").classList.add("open");
            lucide.createIcons();
        }

        async function lanzarAnuncioControlado(id, esInicio) {
            const adData = await api("/get-ads");
            if (adData && adData.enabled) {
                if (!esInicio) modoCierreActivo = true; // Estamos cerrando la peli
                
                const linkAd = esInicio ? (adData.video_ad_start || adData.start_link) : (adData.video_ad_end || adData.end_link);
                const layer = document.getElementById('ad-control-layer');
                const frame = document.getElementById('universal-ad-frame');
                
                frame.src = linkAd;
                layer.style.display = "block";
            } else {
                if(esInicio) cargarReproductor(id);
                else cerrarDetallesReal();
            }
        }

        function forzarCierreAd() {
            document.getElementById('ad-control-layer').style.display = "none";
            document.getElementById('universal-ad-frame').src = "";
            
            // Si estábamos cerrando la película, terminamos de cerrar todo
            if (modoCierreActivo) {
                cerrarDetallesReal();
            } else if(peliActualId) {
                cargarReproductor(peliActualId);
            }
        }

        async function cargarReproductor(id) {
            const container = document.getElementById("video-player-container");
            const serverNav = document.getElementById("server-selector");
            container.innerHTML = `<div class="loader-ring"></div>`;
            container.classList.remove("hidden");

            const data = await api(`/limpiar-video/${id}`);
            if (data) {
                serverNav.classList.remove("hidden");
                serverNav.innerHTML = data.alternatives.map((s, idx) => `
                    <button onclick="cambiarFuente('${s.url}', this)" class="server-btn ${idx === 0 ? 'active' : ''}">${s.name}</button>
                `).join('');

                container.innerHTML = `
                    <div class="video-shield-v2" onclick="lanzarAnuncioControlado('${id}', false); this.remove();"></div>
                    <iframe id="main-player" src="${data.primary}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
                `;
            }
        }

        function cambiarFuente(url, btn) {
            document.querySelectorAll(".server-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("video-player-container").innerHTML = `
                <div class="video-shield-v2" onclick="lanzarAnuncioControlado(peliActualId, false); this.remove();"></div>
                <iframe id="main-player" src="${url}" class="w-full h-full" frameborder="0" allowfullscreen></iframe>
            `;
        }

        function cerrarDetalles() {
            // Antes de mostrar el anuncio de salida, matamos el video
            matarReproductor();
            lanzarAnuncioControlado(peliActualId, false);
        }

        function matarReproductor() {
            const container = document.getElementById("video-player-container");
            const serverNav = document.getElementById("server-selector");
            if (container) {
                container.innerHTML = "";
                container.classList.add("hidden");
            }
            if (serverNav) serverNav.classList.add("hidden");
        }

        function cerrarDetallesReal() {
            matarReproductor();
            document.getElementById("movie-details").classList.remove("open");
            modoCierreActivo = false;
        }

        window.onload = async () => {
            const data = await api("/populares");
            if (data) pintar(data, "populares");
        };
    </script>
</body>
</html>
