<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineMaster AI - Stream</title>
    <style>
        /* Estilo General Oscuro */
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Helvetica', Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background-color: #e50914;
            width: 100%;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .main-content {
            padding: 20px;
            width: 90%;
            max-width: 600px;
        }

        .movie-card {
            background: #1a1a1a;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
            margin-top: 20px;
        }

        .btn-reproducir {
            background-color: #e50914;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
            transition: 0.3s;
        }

        /* CAPA DE PUBLICIDAD (EL BLOQUEADOR) */
        #capa-publicidad {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 100000;
        }

        .boton-cerrar-ad {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff0000;
            color: white;
            border: 2px solid white;
            padding: 12px 20px;
            font-weight: bold;
            border-radius: 50px;
            z-index: 100001;
            font-size: 1rem;
            box-shadow: 0 0 20px rgba(255,0,0,0.6);
        }

        iframe#slot-publicidad {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* REPRODUCTOR */
        #contenedor-video {
            display: none;
            width: 100%;
            margin-top: 20px;
        }

        #reproductor-iframe {
            width: 100%;
            height: 350px;
            border: 2px solid #e50914;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <header>CineMaster AI</header>

    <div class="main-content">
        <div class="movie-card">
            <img src="https://via.placeholder.com/150x220/1a1a1a/e50914?text=PELICULA" alt="Poster" style="border-radius: 8px;">
            <h3>Película Seleccionada</h3>
            <p>Disponible en Full HD</p>
            <button class="btn-reproducir" onclick="iniciarProceso('https://mi-servidor-cine.onrender.com')">▶️ REPRODUCIR AHORA</button>
        </div>

        <div id="contenedor-video">
            <h3>Disfruta la función:</h3>
            <iframe id="reproductor-iframe" src="" allowfullscreen></iframe>
        </div>
    </div>

    <div id="capa-publicidad">
        <button class="boton-cerrar-ad" onclick="finalizarAd()">CERRAR ANUNCIO Y VER PELÍCULA [X]</button>
        <iframe id="slot-publicidad" src=""></iframe>
    </div>

    <script>
        // Tus enlaces configurados
        const LINK_ADSTERRA = "https://thubanoa.com/asv/1234567"; // Tu Direct Link
        let videoDestino = "";

        function iniciarProceso(url) {
            videoDestino = url;
            
            // Abrimos la publicidad
            const capa = document.getElementById('capa-publicidad');
            const frameAd = document.getElementById('slot-publicidad');
            
            frameAd.src = LINK_ADSTERRA;
            capa.style.display = "block";
        }

        function finalizarAd() {
            // Quitamos la publicidad
            document.getElementById('capa-publicidad').style.display = "none";
            document.getElementById('slot-publicidad').src = "";

            // Cargamos el servidor de películas
            const contenedor = document.getElementById('contenedor-video');
            const reproductor = document.getElementById('reproductor-iframe');

            contenedor.style.display = "block";
            reproductor.src = videoDestino;

            // Scroll suave hacia el reproductor
            contenedor.scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
